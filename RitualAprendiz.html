<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ritual de Aprendiz - Colmena No. 8</title>
    <style>
        body { 
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; 
            line-height: 1.8; 
            color: #2c2c2c; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px; 
            background-color: #fdfaf3;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gGiMAEYIIwAXgAmgGkgAEAF3gD/ZkUAAAAAElFTkSuQmCC'); /* Sutil textura de papel */
        }
        h1 { 
            color: #7A4F35; 
            text-align: center; 
            border-bottom: 2px solid #D4A017; 
            padding-bottom: 20px;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Contenedor de diálogo con más espacio */
        dl { 
            margin-top: 40px; 
            background: white; 
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        /* Resaltado del Autor (VM∴, 1V∴, etc.) */
        dt { 
            font-weight: bold; 
            color: #D4A017; /* Color oro */
            margin-top: 25px;
            margin-bottom: 5px;
            font-size: 1.3em;
            letter-spacing: 1px;
            display: block; /* Asegura que el nombre esté arriba del texto */
        }
        
        /* Estilo del texto del diálogo */
        dd { 
            margin-left: 0; 
            margin-bottom: 25px; 
            font-style: italic; 
            font-size: 1.1em;
            color: #444;
            padding-left: 20px;
            border-left: 4px solid #D4A017;
        }
        
        /* Puntuación automática al final */
        dd::after { content: "."; } 
        
        .escena { 
            text-align: center; 
            font-weight: bold; 
            color: #8b5a2b; 
            margin-top: 30px; 
            margin-bottom: 30px;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(212,160,23,0.1);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Ritual de Aprendiz</h1>
    
    <div class="escena">[Apertura del Taller]</div>

    <dl>
        <dt>VM∴</dt>
        <dd>Hermanos Primer y Segundo Vigilantes, informad a los Hermanos que estamos a punto de abrir el Taller</dd>

        <dt>1V∴</dt>
        <dd>Hermanos todos, el Venerable Maestro anuncia la apertura de los trabajos</dd>

        <dt>2V∴</dt>
        <dd>Anuncio hecho, Venerable Maestro</dd>
    </dl>

    <div class="escena">[... Continúa el Ritual ...]</div>

</body>
</html>
