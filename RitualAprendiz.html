<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ritual de Aprendiz - Colmena No. 8</title>
    <style>
        body { 
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif; 
            line-height: 2.2; /* Aumentado para más aire entre líneas */
            color: #2c2c2c; 
            max-width: 950px; 
            margin: 0 auto; 
            padding: 60px; /* Margen general más grande */
            background-color: #fdfaf3;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gGiMAEYIIwAXgAmgGkgAEAF3gD/ZkUAAAAAElFTkSuQmCC'); /* Sutil textura de papel */
        }
        h1 { 
            color: #7A4F35; 
            text-align: center; 
            border-bottom: 3px solid #D4A017; 
            padding-bottom: 30px;
            margin-bottom: 60px; /* Espacio extra debajo del título */
            font-size: 3em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        /* Contenedor de diálogo con máximo espacio */
        dl { 
            margin-top: 50px; 
            background: white; 
            padding: 50px; /* Aumentado padding interno */
            border-radius: 16px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.06);
        }
        
        /* Resaltado del Autor (VM∴, 1V∴, etc.) */
        dt { 
            font-weight: bold; 
            color: #D4A017; 
            margin-top: 40px; /* Mucho espacio antes de cada cargo */
            margin-bottom: 15px; /* Espacio entre cargo y texto */
            font-size: 1.5em;
            letter-spacing: 2px;
            display: block; 
        }
        
        /* Estilo del texto del diálogo */
        dd { 
            margin-left: 0; 
            margin-bottom: 40px; /* Mucho espacio debajo de cada diálogo */
            font-style: italic; 
            font-size: 1.25em; /* Ligeramente más grande */
            color: #444;
            padding-left: 30px;
            border-left: 5px solid #D4A017;
        }
        
        /* Puntuación automática al final */
        dd::after { content: "."; } 
        
        .escena { 
            text-align: center; 
            font-weight: bold; 
            color: #8b5a2b; 
            margin-top: 60px; /* Más espacio antes de la escena */
            margin-bottom: 60px; /* Más espacio después de la escena */
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(212,160,23,0.08);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(212,160,23,0.2);
        }
    </style>
</head>
<body>

    <h1>Ritual de Aprendiz</h1>
    
    <div class="escena">[Apertura del Taller]</div>

    <dl>
        <dt>VM∴</dt>
        <dd>Hermanos Primer y Segundo Vigilantes, informad a los Hermanos que estamos a punto de abrir el Taller</dd>

        <dt>1V∴</dt>
        <dd>Hermanos todos, el Venerable Maestro anuncia la apertura de los trabajos</dd>

        <dt>2V∴</dt>
        <dd>Anuncio hecho, Venerable Maestro</dd>
    </dl>

    <div class="escena">[... Continúa el Ritual ...]</div>

</body>
</html>
