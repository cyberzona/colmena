<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 220px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 100px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { font-style: italic; font-size: 0.95em; color: rgba(0, 0, 0, 0.4); font-weight: normal; margin-left: 3px; }
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; text-justify: inter-word; hyphens: auto; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #5d4037; font-size: 1.0em; font-weight: 800; width: 30px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-ritual, .btn-instancia-exec { border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.85em; margin: 4px 0; font-weight: bold; display: table !important; background: #A87C00 !important; color: #ffffff !important; text-decoration: none; text-align: center; width: auto !important; max-width: fit-content; box-sizing: border-box; }
        .instancia-botones { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        
        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .visor-close { position: absolute; top: 8px; right: 8px; background: #ff0000; color: #ffffff; border: 2px solid #ffffff; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 2001; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="inicializar()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>
    <div id="rituales-content"></div>

   <script>
    // Global States (6 chars simple / Capitalized Arrays)
    let Liturgy, Glosry, Events; 
    let ritual, sectin;         
    let grados = "1", dateid = ""; 
    let Visibl = new Set(["1", "2", "3"]);
    let Tracer = []; 

    // --- NAVIGATION ---
    window.irA = function(codeid) {
        if (!ritual) return;

        if (codeid === 'BACK') {
            if (Tracer.length > 0) {
                const prev = Tracer.pop(); 
                Visibl = prev.visted;
                setSec(prev.idsec); 
                runSec();
                setTimeout(() => window.scrollTo(0, prev.scroll), 50);
            } else {
                const backUr = sessionStorage.getItem('RETRN');
                if (backUr) {
                    sessionStorage.removeItem('RETRN');
                    window.location.href = backUr;
                }
            }
            return;
        }

        const current = document.getElementById("seccionFilter").value;
        const target = codeid.length === 3 ? parseInt(codeid.substring(1), 10).toString() : codeid.replace(/\D/g, '');
        
        if (current !== target) {
            Tracer.push({
                idsec: current,
                scroll: window.scrollY,
                visted: new Set(Visibl)
            });
        }

        Visibl.add(target);
        setSec(target);
        runSec();
        window.scrollTo(0, 0);
    };

    // --- DATA FETCHING ---
    async function init() {
        try {
            const params = new URLSearchParams(window.location.search);
            dateid = params.get('fecha') || new Date().toISOString().split('T')[0]; 
            grados = (params.get('num') || "1").toString();
            const startS = (params.get('sec') || "1").toString();

            await fetchData();
            if (parseInt(startS) > 3) Visibl.add(startS);
            loadRitual(grados, startS);
        } catch (e) { console.error("Err:", e); }
    }

    async function fetchData() {
        const v = Date.now(); 
        const [gls, lit, ten] = await Promise.all([
            fetch(`glosario.xml?v=${v}`).then(r => r.text()),
            fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
            fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<tenidas></tenidas>')
        ]);
        const parser = new DOMParser();
        Glosry = parser.parseFromString(gls, "text/xml");
        Liturgy = parser.parseFromString(lit, "text/xml");
        Events = parser.parseFromString(ten, "text/xml");
    }

    function loadRitual(num, sid) {
        ritual = Array.from(Liturgy.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === num);
        if (ritual) {
            const Titles = { "1": "Aprendiz", "2": "Compañero", "3": "Maestro" };
            document.getElementById("titulo-ritual-header").textContent = Titles[num] || "Ritual";
            setSec(sid);
            runSec();
        }
    }

    // --- LOGIC FLOW ---
    function setSec(id) {
        const select = document.getElementById("seccionFilter");
        select.innerHTML = "";
        Array.from(ritual.getElementsByTagName("seccion")).forEach(s => {
            const sid = s.getAttribute("id");
            if (sid === "1" || sid === "2" || sid === "3" || Visibl.has(sid)) {
                select.add(new Option(s.getAttribute("titulo"), sid));
            }
        });
        select.value = id;
    }

    function runSec() {
        const sid = document.getElementById("seccionFilter").value;
        const ofiSel = document.getElementById("oficialFilter");
        const oldOfi = ofiSel.value;
        sectin = Array.from(ritual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sid);
        
        const Ofis = new Set();
        if (sectin) {
            Array.from(sectin.getElementsByTagName("paso")).forEach(p => {
                if (p.getAttribute("oficial")) Ofis.add(p.getAttribute("oficial").trim());
            });
        }

        ofiSel.innerHTML = '<option value="">---</option>';
        Array.from(Glosry.getElementsByTagName("item")).forEach(i => {
            const sigla = i.getAttribute("sigla");
            if (Ofis.has(sigla)) ofiSel.add(new Option(sigla + "∴", sigla));
        });
        if (Ofis.has(oldOfi)) ofiSel.value = oldOfi;
        loadLiturgy(); // Nombre corregido según estándar
    }

    // --- RENDERING (Core Function) ---
    function loadLiturgy() {
        const sid = document.getElementById("seccionFilter").value;
        const ofiId = document.getElementById("oficialFilter").value;
        if (!sectin) return;

        let output = "";
        Array.from(sectin.getElementsByTagName("apartado")).forEach(apa => {
            output += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
            Array.from(apa.getElementsByTagName("paso")).forEach((p, i) => {
                const ofi = (p.getAttribute("oficial") || "Ofi").trim();
                const lineId = `l-${sid}-${i}`;
                let body = (p.getAttribute("texto") || p.textContent).trim();

                // Regex replacement
                body = body.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (m, c, t) => {
                    let label = t ? t.trim() : "Ir";
                    return `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${c}')">${label} ➜</button></div>`;
                });

                if (body.includes("[[VOLVER]]")) {
                    body = body.replace("[[VOLVER]]", `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('BACK')">⬅ Regresar</button></div>`);
                }
                
                // ASIGNACIÓN DE TÍTULOS: Aquí pasamos el oficial, sección e índice
                if (body.includes("[[INSTANCIA]]")) {
                    body = body.replace("[[INSTANCIA]]", `<div class="instancia-botones">${getInstance(ofi, sid, i)}</div>`);
                }

                body = body.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                body = body.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');

                const active = ofiId && ofi === ofiId;
                output += `<dt>${ofi}∴</dt><dd class="${active ? 'resaltado' : ''}" id="${lineId}">${body}</dd>`;
            });
        });

        document.getElementById('rituales-content').innerHTML = `<dl>${output}</dl>`;
        
        if (ofiId) {
            setTimeout(() => {
                const target = document.querySelector('.resaltado');
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }
    }

    // --- INSTANCE LOGIC ---
    function getInstance(ofisig, sid, idx) {
        if (!Events) return "";
        const Day = Array.from(Events.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha").trim() === dateid.trim());
        if (!Day) return "";            
        
        const user = document.getElementById("oficialFilter").value;
        let html = "";

        // CORRECCIÓN FINAL DE TÍTULOS:
        Array.from(Day.getElementsByTagName("item")).forEach(node => {
            const act = (node.getAttribute("acto") || "").trim();
            const url = node.getAttribute("url") || "";
            // Extraer título con fallback seguro
            const lab = (node.getAttribute("titulo") || node.textContent || "Memo").trim(); 

            if (act === "balaustre" && ofisig === "Sec" && user === "Sec") {
                html += `<button class="btn-ritual" onclick="view('${url}')">📜: ${lab} ➜</button>`;
            } 
            else if (act === "elevacion" && ofisig !== "Sec") {
                const isExt = url.indexOf('rituales.html') !== -1;
                const base = window.location.href.split('?')[0];
                const uri = `${base}?num=${grados}&sec=${sid}&fecha=${dateid}#l-${sid}-${idx}`;
                
                const cmd = isExt 
                    ? `sessionStorage.setItem('RETRN', '${uri}'); window.location.href='${url}&fecha=${dateid}'` 
                    : `view('${url}')`;
                
                html += `<button class="btn-instancia-exec" onclick="${cmd}">${lab}</button>`;
            }
        });
        return html;
    }

    function view(uri) {
        const box = document.createElement('div');
        box.className = 'visor-overlay';
        box.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${uri}" style="width:100%; height:100%; border:none;"></iframe></div>`;
        document.body.appendChild(box);
    }

    window.onload = init;
</script>
</body>
</html>
