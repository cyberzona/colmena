<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        /* --- ESTILOS VISUALES (CSS) --- */
        body { 
            font-family: 'Palatino Linotype', serif; 
            line-height: 1.1; 
            color: #2c2c2c; 
            margin: 0; 
            padding: 10px; 
            background-color: #fdfaf3; 
        }
        
        /* Encabezado con el logo y nombre de la Logia */
        .header-container { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 8px; 
            border-bottom: 2px solid #5d4037; 
            padding-bottom: 8px; 
        }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        /* Panel de control fijo (Sticky) para filtros */
        #control-panel { 
            background: #d7ccc8; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #a1887f; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            display: flex; 
            justify-content: flex-start; 
            gap: 10px; 
        }
        .select-seccion { width: 200px; padding: 8px; font-size: 0.95rem; border-radius: 4px; background: #fff; font-weight: bold; }
        .select-oficiales { width: 90px; padding: 8px; font-size: 0.95rem; border-radius: 4px; background: #fff; font-weight: bold; }
        
        /* Formato de la Liturgia */
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { 
            display: block; 
            font-style: italic; 
            font-size: 0.9em; 
            color: rgba(0, 0, 0, 0.5); 
            margin: 8px 0; 
            padding-left: 8px;
            border-left: 2px solid #d7ccc8;
        }
        dt { font-weight: bold; color: #5d4037; margin-top: 12px; }
        dd { 
            margin-left: 45px; 
            border-left: 3px solid #d7ccc8; 
            padding: 0 10px; 
            position: relative; 
            margin-bottom: 4px; 
            counter-increment: line-counter; 
            text-align: justify; 
        }
        /* Numeración lateral de párrafos */
        dd::before { 
            content: counter(line-counter); 
            position: absolute; 
            left: -40px; 
            color: #5d4037; 
            font-weight: 800; 
            width: 30px; 
            text-align: right; 
        }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        
        /* Botones y Visor */
        .btn-ritual, .btn-instancia-exec { 
            border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; 
            background: #A87C00 !important; color: #ffffff !important; font-weight: bold;
        }
        .visor-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 2000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; position: relative; }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1", fechaTrabajo = "";
        let seccionesVisibles = new Set();
        let historialNavegacion = [];

        // Inicialización y carga de archivos XML
        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const hoy = new Date().toISOString().split('T')[0];
                fechaTrabajo = urlParams.get('fecha') || hoy; 
                numGradoActual = (urlParams.get('num') || "1").toString();
                const secUrl = (urlParams.get('sec') || "1").toString();
                seccionesVisibles = (parseInt(secUrl) > 3) ? new Set([secUrl]) : new Set(["1", "2", "3"]);

                await cargarDatos();
                ejecutarCargaRitual(numGradoActual, secUrl);
                
                const oficialUrl = urlParams.get('ofi') || "";
                if (oficialUrl) {
                    document.getElementById("oficialFilter").value = oficialUrl;
                    renderizarLiturgia();
                }
            } catch (e) { console.error("Error inicializando:", e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
                fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        // Renderizado de la liturgia con filtros
        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const oficialSel = document.getElementById("oficialFilter").value; 
            const contenedor = document.getElementById('rituales-content');
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "", counter = 0, primeraID = null;
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach(paso => {
                    counter++;
                    const oficialTur = (paso.getAttribute("oficial") || "Ofi").trim();
                    const idL = `l-${sId}-${counter}`;
                    let txt = paso.getAttribute("texto") || paso.textContent || "";
                    
                    // Reemplazo dinámico de enlaces y estilos
                    txt = txt.replace(/\[\[LINK:(\d{3})(?::([^\]]+))?\]\]/g, (match, cod, desc) => {
                        return `<span class="nav-link-container"><button class="btn-ritual" onclick="window.irA('${cod}')">${desc || 'Ir'} ➜</button></span>`;
                    });
                    
                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    
                    const esOfi = (oficialSel && oficialTur === oficialSel);
                    if (esOfi && !primeraID) primeraID = idL;
                    html += `<dt>${oficialTur}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
                });
            });
            contenedor.innerHTML = `<dl style="counter-reset: line-counter;">${html}</dl>`;
            if (primeraID) { document.getElementById(primeraID).scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        // Navegación interna (irA / Volver)
        window.irA = function(codigo) {
    try {
        // 1. Manejo del retorno (Volver)
        if (codigo === 'VOLVER') {
            if (historialNavegacion.length > 0) {
                const anterior = historialNavegacion.pop();
                seccionesVisibles = anterior.visibilidad;
                actualizarSelectorSecciones(anterior.seccion);
                cambioDeSeccion();
                setTimeout(() => { window.scrollTo({ top: anterior.scroll, behavior: 'smooth' }); }, 150);
            }
            return;
        }

        // 2. Obtención del ID y búsqueda del Título en el XML
        const targetIdStr = parseInt(codigo.substring(1), 10).toString();
        const secciones = Array.from(ritualActivo.getElementsByTagName("seccion"));
        const seccionDestino = secciones.find(s => s.getAttribute("id") === targetIdStr);
        
        // Aquí es donde irA "consigue" el título
        const nombreSeccion = seccionDestino ? seccionDestino.getAttribute("titulo") : "Sección " + targetIdStr;

        // 3. Gestión del historial y visibilidad
        historialNavegacion.push({
            seccion: document.getElementById("seccionFilter").value,
            scroll: window.scrollY,
            visibilidad: new Set(seccionesVisibles),
            nombre: nombreSeccion // Guardamos el nombre en el historial
        });

        // 4. Ejecución del cambio
        seccionesVisibles = new Set([targetIdStr]);
        actualizarSelectorSecciones(targetIdStr);
        cambioDeSeccion(); // Esto disparará renderizarLiturgia
        window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (err) { 
        console.error("Error en irA:", err); 
    }
};

        function abrirVisor(url) {
            const overlay = document.createElement('div');
            overlay.className = 'visor-overlay';
            overlay.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
            document.body.appendChild(overlay);
        }
    </script>
</body>
</html>
