<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        /* ESTÉTICA SOBRIA VALIDADA */
        body { font-family: 'Palatino Linotype', serif; line-height: 1.2; color: #000; margin: 0; padding: 10px; background-color: #fff; }
        .header-container { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.1rem; color: #000; font-weight: bold; }
        #titulo-ritual-header { font-size: 1.0rem; color: #000; text-transform: uppercase; font-weight: bold; }
        .logo-mini { width: 60px; height: auto; }
        
        #control-panel { 
            background: #f0f0f0; padding: 8px; border: 1px solid #ccc; 
            position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; margin-bottom: 15px;
        }
        .container-select { display: flex; flex-direction: column; }
        .select-label { font-size: 0.75rem; color: #333; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 200px; padding: 6px; font-size: 0.95rem; border: 1px solid #999; background: #fff; color: #000; }
        .select-oficiales { width: 100px; padding: 6px; font-size: 0.95rem; border: 1px solid #999; background: #fff; color: #000; }

        .apartado-header { background: #333; color: #fff; padding: 5px 10px; margin-top: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        dt { font-weight: bold; color: #000; margin-top: 15px; font-size: 1.1rem; }
        dd { margin-left: 50px; border-left: 2px solid #ccc; padding-left: 10px; position: relative; margin-bottom: 5px; counter-increment: line-counter; text-align: justify; }
        dd::before { content: counter(line-counter); position: absolute; left: -45px; color: #666; font-size: 0.8rem; font-weight: bold; width: 35px; text-align: right; top: 2px; }
        
        .sigla-texto-azul { color: #0056b3; font-weight: bold; }
        .line-exec { display: block; font-style: italic; font-size: 0.95em; color: #555; margin: 5px 0; padding-left: 10px; border-left: 2px solid #ddd; }
        .resaltado { background-color: #ffffcc !important; border-left: 4px solid #ffcc00 !important; }

        .nav-link-container { display: block; margin: 15px 0; text-align: center; }
        .btn-ritual { 
            background: #444 !important; color: #fff !important; border: 1px solid #000; padding: 10px 20px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.85rem;
        }
        .btn-instancia-exec { background: #666; color: white; border: 1px solid #333; padding: 8px 15px; margin: 5px; cursor: pointer; font-weight: bold; }

        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .visor-content { width: 90%; height: 85%; background: #fff; border: 2px solid #000; position: relative; }
        .visor-close { position: absolute; top: 5px; right: 5px; background: #cc0000; color: white; border: none; padding: 8px 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1", fechaTrabajo = "";
        let seccionesVisibles = new Set(["1", "2", "3"]);
        let historialNavegacion = [];

        window.irA = function(codigo) {
            if (!ritualActivo) return;

            if (codigo === 'VOLVER') {
                if (historialNavegacion.length > 0) {
                    const ant = historialNavegacion.pop();
                    seccionesVisibles = ant.visibilidad;
                    actualizarSelectorSecciones(ant.seccion);
                    cambioDeSeccion();
                    setTimeout(() => window.scrollTo(0, ant.scroll), 150);
                } else {
                    const retornoGrado = sessionStorage.getItem('puntoRetornoLogia');
                    if (retornoGrado) {
                        sessionStorage.removeItem('puntoRetornoLogia');
                        window.location.href = retornoGrado;
                    }
                }
                return;
            }

            const targetIdStr = codigo.length === 3 ? parseInt(codigo.substring(1), 10).toString() : codigo.replace(/\D/g, '');

            historialNavegacion.push({
                seccion: document.getElementById("seccionFilter").value,
                scroll: window.scrollY,
                visibilidad: new Set(seccionesVisibles)
            });

            seccionesVisibles.add(targetIdStr);
            actualizarSelectorSecciones(targetIdStr);
            cambioDeSeccion();
            window.scrollTo(0, 0);
        };

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                fechaTrabajo = urlParams.get('fecha') || new Date().toISOString().split('T')[0]; 
                numGradoActual = (urlParams.get('num') || "1").toString();
                const secUrl = (urlParams.get('sec') || "1").toString();
                
                await cargarDatos();
                if (parseInt(secUrl) > 3) seccionesVisibles.add(secUrl);
                ejecutarCargaRitual(numGradoActual, secUrl);

                // Scroll al punto resaltado (especialmente para regresos de compañero)
                setTimeout(() => {
                    const el = document.querySelector('.resaltado');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 800);
            } catch (e) { console.error("Error:", e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
                fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grado] || "Ritual";
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function actualizarSelectorSecciones(idSel) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(sec => {
                const id = sec.getAttribute("id");
                if (id === "1" || id === "2" || id === "3" || seccionesVisibles.has(id)) {
                    sSel.add(new Option(sec.getAttribute("titulo"), id));
                }
            });
            sSel.value = idSel;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter");
            const ofiPrevio = oSel.value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const ofis = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofis.add(p.getAttribute("oficial").trim());
                });
            }
            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(i => {
                const sigla = i.getAttribute("sigla");
                if (ofis.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            if (ofis.has(ofiPrevio)) oSel.value = ofiPrevio;
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "";
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach((paso, i) => {
                    const ofi = (paso.getAttribute("oficial") || "Ofi").trim();
                    const idL = `l-${sId}-${i}`;
                    let txt = (paso.getAttribute("texto") || paso.textContent).trim();

                    // REPARACIÓN TÍTULOS LINK
                    txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (match, cod, titulo) => {
                        let label = titulo ? titulo.trim() : "";
                        if (!label) {
                            const tId = cod.length === 3 ? parseInt(cod.substring(1), 10).toString() : cod;
                            const targetSec = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") === tId);
                            label = targetSec ? targetSec.getAttribute("titulo") : "Ir";
                        }
                        return `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${cod}')">${label} ➜</button></div>`;
                    });

                    if (txt.includes("[[VOLVER]]")) {
                        txt = txt.replace("[[VOLVER]]", `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('VOLVER')">⬅ Regresar</button></div>`);
                    }

                    if (txt.includes("[[INSTANCIA]]")) {
                        txt = txt.replace("[[INSTANCIA]]", `<div class="instancia-botones">${procesarInstancia(ofi, sId)}</div>`);
                    }

                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');

                    const esOfi = ofiSel && ofi === ofiSel;
                    html += `<dt>${ofi}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
                });
            });
            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;

            // Posicionamiento automático del Oficial al filtrar
            if (ofiSel) {
                setTimeout(() => {
                    const primera = document.querySelector('.resaltado');
                    if (primera) primera.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }

        function abrirVisor(url) {
            const overlay = document.createElement('div');
            overlay.className = 'visor-overlay';
            overlay.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
            document.body.appendChild(overlay);
        }

        function procesarInstancia(oficialPaso, sIdActual) {
            if (!tenidasXml) return "";
            const tActiva = Array.from(tenidasXml.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha").trim() === fechaTrabajo.trim());
            if (!tActiva) return "";            
            
            const filtroSuperior = document.getElementById("oficialFilter").value;
            let contenido = "";
            Array.from(tActiva.getElementsByTagName("item")).forEach(item => {
                const acto = (item.getAttribute("acto") || "").trim();
                const url = item.getAttribute("url") || "";
                const titulo = item.getAttribute("titulo") || "Trabajo";

                if (acto === "balaustre" && oficialPaso === "Sec" && filtroSuperior === "Sec") {
                    contenido += `<button class="btn-ritual" onclick="abrirVisor('${url}')">📜: ${titulo} ➜</button>`;
                } 
                else if (acto === "elevacion" && oficialPaso !== "Sec") {
                    const esOtroRitual = url.indexOf('rituales.html') !== -1;
                    const urlOrigen = `${window.location.href.split('?')[0]}?num=${numGradoActual}&sec=${sIdActual}&fecha=${fechaTrabajo}`;
                    const accion = esOtroRitual 
                        ? `sessionStorage.setItem('puntoRetornoLogia', '${urlOrigen}'); window.location.href='${url}&fecha=${fechaTrabajo}'` 
                        : `abrirVisor('${url}')`;
                    contenido += `<button class="btn-instancia-exec" onclick="${accion}">${titulo}</button>`;
                }
            });
            return contenido;
        }
    </script>
</body>
</html>
