<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena #8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; margin-top: 10px; }
        .select-seccion { width: 220px; padding: 8px; font-weight: bold; border-radius: 4px; border: 1px solid #8d6e63; }
        .select-oficiales { width: 100px; padding: 8px; font-weight: bold; border-radius: 4px; border: 1px solid #8d6e63; }
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { font-style: italic; font-size: 0.8em; color: rgba(0, 0, 0, 0.4); }
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding-left: 10px; text-align: justify; position: relative; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .btn-instancia-exec { border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.85em; font-weight: bold; background: #A87C00; color: #fff; margin: 5px 0; display: table; text-decoration: none; }
    </style>
</head>
<body onload="inicializar()">
    <div class="header-container">
        <img src="./images/logo-mini.png" width="65" alt="Logo">
        <div>
            <div style="font-weight:bold; color:#5d4037;">RLS∴ COLMENA Nº 8</div>
            <div id="titulo-ritual-header" style="font-size:0.9rem; text-transform: uppercase;">Cargando...</div>
        </div>
    </div>

    <div id="control-panel">
        <div style="display:flex; flex-direction:column;">
            <span style="font-size:0.6rem; font-weight:bold; color:#4e342e;">SECCIÓN</span>
            <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
        </div>
        <div style="display:flex; flex-direction:column;">
            <span style="font-size:0.6rem; font-weight:bold; color:#4e342e;">OFICIAL</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let fechaTrabajo = new Date().toISOString().split('T')[0];

        async function inicializar() {
            await cargarDatos();
            // Detectar grado y sección desde URL si existen
            const urlParams = new URLSearchParams(window.location.search);
            const grado = urlParams.get('num') || "1";
            const seccion = urlParams.get('sec') || "1";
            ejecutarCargaRitual(grado, seccion);
        }

        async function cargarDatos() {
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch('glosario.xml').then(r => r.text()),
                fetch('liturgia.xml').then(r => r.text()),
                fetch('tenidas.xml').then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function ejecutarCargaRitual(grado, secId) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            document.getElementById("titulo-ritual-header").textContent = ritualActivo.getAttribute("titulo") || "Ritual";
            actualizarSelectorSecciones(secId);
            cambioDeSeccion();
        }

        function actualizarSelectorSecciones(id) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(s => {
                sSel.add(new Option(s.getAttribute("titulo"), s.getAttribute("id")));
            });
            sSel.value = id;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter");
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const oficiales = new Set();
            Array.from(seccion.getElementsByTagName("paso")).forEach(p => oficiales.add(p.getAttribute("oficial")));
            
            const prev = oSel.value;
            oSel.innerHTML = '<option value="">---</option>';
            // Ordenar oficiales según glosario si es necesario
            oficiales.forEach(ofi => oSel.add(new Option(ofi + "∴", ofi)));
            oSel.value = Array.from(oSel.options).some(opt => opt.value === prev) ? prev : "";
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const oficialSel = document.getElementById("oficialFilter").value;
            const contenedor = document.getElementById('rituales-content');
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            
            if (!seccion) return;
            let html = "";

            Array.from(seccion.getElementsByTagName("paso")).forEach(paso => {
                const oficialTur = paso.getAttribute("oficial");
                let txt = paso.getAttribute("texto") || paso.textContent || "";

                // LÓGICA DE INSTANCIA BASADA EN EL ORDEN DEL DÍA
                if (txt.includes("[[INSTANCIA]]")) {
                    let permitir = false;
                    
                    // REGLA 1: Si es el VM, el botón lo ven TODOS siempre.
                    if (oficialTur === "VM") {
                        permitir = true;
                    } 
                    // REGLA 2: Si es el SEC, el botón solo lo ve él mismo cuando se selecciona como SEC.
                    else if (oficialTur === "SEC" && oficialSel === "SEC") {
                        permitir = true;
                    }

                    txt = txt.replace("[[INSTANCIA]]", permitir ? `<div style="margin-top:8px;">${procesarInstancia(oficialTur.toLowerCase())}</div>` : "");
                }

                // Formateo visual
                txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');

                html += `<dt>${oficialTur}∴</dt><dd class="${oficialSel === oficialTur ? 'resaltado' : ''}">${txt}</dd>`;
            });
            contenedor.innerHTML = html;
        }

        function procesarInstancia(ofi) {
            // Buscamos la tenida correspondiente a la fecha actual o la última disponible
            const tenidas = Array.from(tenidasXml.getElementsByTagName("tenida"));
            const tActiva = tenidas.find(t => t.getAttribute("fecha") === fechaTrabajo) || tenidas[tenidas.length - 1];
            
            if (!tActiva) return "";
            
            let btnHtml = "";
            Array.from(tActiva.getElementsByTagName("item")).forEach(i => {
                const tipoActo = i.getAttribute("acto");
                const titulo = i.getAttribute("titulo");
                const url = i.getAttribute("url");

                // El Secretario ve los "balaustres"
                if (ofi === 'sec' && tipoActo === 'balaustre') {
                    btnHtml += `<button class="btn-instancia-exec" onclick="window.open('${url}')">📜 ${titulo} ➜</button>`;
                }
                // El Venerable Maestro ve el resto del "Orden del Día"
                else if (ofi === 'vm' && tipoActo !== 'balaustre') {
                    btnHtml += `<button class="btn-instancia-exec" onclick="window.open('${url}')">${titulo} ➜</button>`;
                }
            });
            return btnHtml;
        }
    </script>
</body>
</html>
