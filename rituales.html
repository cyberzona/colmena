<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex Alvearis v41.5 - Gestión de Cámaras</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 220px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; font-weight: bold; }
        .select-oficiales { width: 100px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; font-weight: bold; }

        /* Títulos de Apartados - Sin Uppercase forzado */
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: none; letter-spacing: 1px; }
        
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }
        dd { margin-left: 55px; border-left: 3px solid #d7ccc8; padding-left: 10px; position: relative; margin-bottom: 4px; text-align: justify; }
        dd::before { content: counter(line-counter); position: absolute; left: -45px; color: #666; font-size: 0.8rem; font-weight: bold; width: 35px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        
        /* Botones */
        .btn-ritual, .btn-instancia-exec { border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.85em; margin: 4px 2px; font-weight: bold; background: #A87C00 !important; color: #fff !important; }
        .nav-footer { display: flex; justify-content: space-between; margin-top: 30px; padding: 15px; border-top: 1px dashed #a1887f; }

        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; position: relative; }
        .visor-close { position: absolute; top: -10px; right: -10px; background: #ff0000; color: #fff; border: 2px solid #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body onload="inicializarPortal()">

    <div class="header-container">
        <img src="./images/logo-mini.png" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="actualizarSeccionGlobal()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="actualizarOficialGlobal()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let RitualActual, GlosarioMaestro, BitacoraEventos;
        let gradoActivo = "1", fechaSesion = "";
        let SeccionesDesbloqueadas = new Set(["1", "2", "3"]);
        let PilaNavegacion = [];

        async function inicializarPortal() {
            try {
                const parametros = new URLSearchParams(window.location.search);
                
                // Fecha local (Formato YYYY-MM-DD sin desfase UTC)
                const hoyLocal = new Date().toLocaleDateString('en-CA');
                fechaSesion = parametros.get('fecha') || hoyLocal;
                gradoActivo = (parametros.get('num') || "1").toString();
                
                // Persistencia de Sección
                const secMemoria = sessionStorage.getItem('seccionRetornoLogia');
                const seccionInicial = parametros.get('sec') || secMemoria || "1";

                await cargarArchivosBase();
                
                if (RitualActual) {
                    const Diccionario = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                    document.getElementById("titulo-ritual-header").textContent = Diccionario[gradoActivo] || "Ritual";
                    
                    if (parseInt(seccionInicial) > 3) SeccionesDesbloqueadas.add(seccionInicial.toString());
                    
                    actualizarSelectorSecciones(seccionInicial);
                    
                    const ofiMemoria = sessionStorage.getItem('oficialRetornoLogia');
                    if (ofiMemoria) document.getElementById("oficialFilter").dataset.oficialPendiente = ofiMemoria;
                    
                    gestionarCambioSeccion();
                }
            } catch (e) { console.error("Error Inicio:", e); }
        }

        async function cargarArchivosBase() {
            const t = new Date().getTime();
            const fetcher = url => fetch(`${url}?v=${t}`).then(r => r.text());
            const [dg, dl, de] = await Promise.all([
                fetcher('glosario.xml'), fetcher('liturgia.xml'), fetcher('tenidas.xml').catch(() => '<bitacora/>')
            ]);
            const dp = new DOMParser();
            GlosarioMaestro = dp.parseFromString(dg, "text/xml");
            BitacoraEventos = dp.parseFromString(de, "text/xml");
            const xmlLit = dp.parseFromString(dl, "text/xml");
            RitualActual = Array.from(xmlLit.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === gradoActivo);
        }

        function actualizarSelectorSecciones(seleccionada) {
            const combo = document.getElementById("seccionFilter");
            combo.innerHTML = "";
            let existe = false;
            Array.from(RitualActual.getElementsByTagName("seccion")).forEach(s => {
                const id = s.getAttribute("id");
                if (id <= 3 || SeccionesDesbloqueadas.has(id)) {
                    combo.add(new Option(s.getAttribute("titulo"), id));
                    if (id === seleccionada) existe = true;
                }
            });
            combo.value = existe ? seleccionada : "1";
        }

        function actualizarSeccionGlobal() {
            sessionStorage.setItem('seccionRetornoLogia', document.getElementById("seccionFilter").value);
            gestionarCambioSeccion();
        }

        function actualizarOficialGlobal() {
            sessionStorage.setItem('oficialRetornoLogia', document.getElementById("oficialFilter").value);
            renderizarLiturgia();
        }

        function gestionarCambioSeccion() {
            const idSec = document.getElementById("seccionFilter").value;
            const comboOfi = document.getElementById("oficialFilter");
            const ofiPendiente = comboOfi.dataset.oficialPendiente || comboOfi.value || "";
            delete comboOfi.dataset.oficialPendiente;

            const nodoSec = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idSec);
            const ofisEnSec = new Set();
            if (nodoSec) {
                Array.from(nodoSec.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofisEnSec.add(p.getAttribute("oficial").trim());
                });
            }

            comboOfi.innerHTML = '<option value="">---</option>';
            Array.from(GlosarioMaestro.getElementsByTagName("item")).forEach(i => {
                const s = i.getAttribute("sigla");
                if (ofisEnSec.has(s)) comboOfi.add(new Option(s + "∴", s));
            });

            if (ofisEnSec.has(ofiPendiente)) comboOfi.value = ofiPendiente;
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const idSec = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const nodoSec = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idSec);
            if (!nodoSec) return;

            let html = "";
            Array.from(nodoSec.getElementsByTagName("apartado")).forEach(apt => {
                html += `<div class="apartado-header">${apt.getAttribute("titulo")}</div>`;
                Array.from(apt.getElementsByTagName("paso")).forEach((paso, idx) => {
                    const ofi = (paso.getAttribute("oficial") || "Ofi").trim();
                    let txt = (paso.getAttribute("texto") || paso.textContent).trim();
                    let btns = "";

                    // Lógica de Links y Volver
                    txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (m, cod, etq) => {
                        btns += `<button class="btn-ritual" onclick="irA('${cod}')">${etq || 'Ir'} ➜</button>`;
                        return "";
                    });
                    if (txt.includes("[[VOLVER]]")) {
                        btns += `<button class="btn-ritual" onclick="irA('VOLVER')">⬅ Regresar</button>`;
                        txt = txt.replace("[[VOLVER]]", "");
                    }
                    if (txt.includes("[[INSTANCIA]]")) {
                        btns += inyectarInstancia(ofi, idSec, idx);
                        txt = txt.replace("[[INSTANCIA]]", "");
                    }

                    // Formateo de texto
                    txt = txt.replace(/(\b\S+∴)/gi, '<span style="color:#0277bd; font-weight:bold;">$1</span>');
                    txt = txt.replace(/\[(.*?)\]/g, '<span style="font-style:italic; color:rgba(0,0,0,0.4);">($1)</span>');

                    const esFoco = ofiSel && ofi === ofiSel;
                    html += `<dt>${ofi}∴</dt><dd class="${esFoco ? 'resaltado' : ''}">${txt}${btns}</dd>`;
                });
            });

            // Inyección de Botones de Navegación Automática
            const sel = document.getElementById("seccionFilter");
            const i = sel.selectedIndex;
            let nav = `<div class="nav-footer">`;
            nav += i > 0 ? `<button class="btn-ritual" onclick="navRelativa(-1)">⬅ ${sel.options[i-1].text}</button>` : `<span></span>`;
            nav += i < sel.options.length - 1 ? `<button class="btn-ritual" onclick="navRelativa(1)">${sel.options[i+1].text} ➡</button>` : `<button class="btn-ritual" onclick="location.href='index.html'">Finalizar</button>`;
            nav += `</div>`;

            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>${nav}`;
            if (ofiSel) setTimeout(() => document.querySelector('.resaltado')?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }

        function navRelativa(d) {
            const s = document.getElementById("seccionFilter");
            s.selectedIndex += d;
            actualizarSeccionGlobal();
            window.scrollTo(0, 0);
        }

        window.irA = function(dest) {
            if (dest === 'VOLVER') {
                if (PilaNavegacion.length > 0) {
                    const ant = PilaNavegacion.pop();
                    SeccionesDesbloqueadas = ant.v;
                    document.getElementById("oficialFilter").dataset.oficialPendiente = ant.o;
                    actualizarSelectorSecciones(ant.s);
                    gestionarCambioSeccion();
                } else { location.href = 'index.html'; }
                return;
            }
            PilaNavegacion.push({ s: document.getElementById("seccionFilter").value, o: document.getElementById("oficialFilter").value, v: new Set(SeccionesDesbloqueadas) });
            SeccionesDesbloqueadas.add(dest);
            actualizarSelectorSecciones(dest);
            gestionarCambioSeccion();
            window.scrollTo(0, 0);
        };

        function inyectarInstancia(ofi, sec, idx) {
            const t = Array.from(BitacoraEventos.getElementsByTagName("tenida")).find(x => x.getAttribute("fecha") === fechaSesion);
            if (!t) return "";
            let h = "";
            Array.from(t.getElementsByTagName("item")).forEach(i => {
                const acto = i.getAttribute("acto");
                const url = i.getAttribute("url");
                const tit = i.getAttribute("titulo") || "Memo";
                
                if (acto === "balaustre" && ofi === "Sec" && document.getElementById("oficialFilter").value === "Sec") {
                    h += `<button class="btn-ritual" onclick="mostrarVisor('${url}')">📜 ${tit}</button>`;
                } else if (acto === "elevacion" && ofi !== "Sec") {
                    if (url.includes('rituales.html')) {
                        const disp = `sessionStorage.setItem('oficialRetornoLogia', '${document.getElementById("oficialFilter").value}'); sessionStorage.setItem('seccionRetornoLogia', '${sec}'); window.location.href='${url}&fecha=${fechaSesion}'`;
                        h += `<button class="btn-instancia-exec" onclick="${disp}">${tit}</button>`;
                    } else {
                        h += `<button class="btn-instancia-exec" onclick="mostrarVisor('${url}')">${tit}</button>`;
                    }
                }
            });
            return h;
        }

        function mostrarVisor(url) {
            const v = document.createElement('div');
            v.className = 'visor-overlay';
            v.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
            document.body.appendChild(v);
        }
    </script>
</body>
</html>
