<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ritual Colmena No. 8</title>
    <style>
        :root { --oro: #A87C00; --cafe: #5d4037; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #fdfbf7; }
        
        /* --- MODO SCROLL (DEFAULT) --- */
        .seccion-titulo { text-align: center; color: var(--cafe); border-bottom: 2px solid var(--oro); margin: 20px; }
        .acto-fila { padding: 10px; border-bottom: 1px solid #eee; transition: 0.5s; }
        .resaltado-temporal { background-color: rgba(168, 124, 0, 0.1); border-left: 5px solid var(--oro); }
        .acotacion { color: #888; font-style: italic; font-size: 0.9em; }

        /* --- MODO FOCUS (VALOR PESADO) --- */
        body.modo-focus-activo .interfaz-completa { display: none; }
        #vista-focus { 
            display: none; height: 100vh; width: 100vw;
            align-items: center; justify-content: center; background: #2c3e50; 
        }
        body.modo-focus-activo #vista-focus { display: flex; }
        .card-focus { 
            background: white; padding: 40px; border-radius: 12px; 
            max-width: 700px; width: 85%; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .actor-focus { font-size: 1.5em; font-weight: bold; color: var(--cafe); border-bottom: 1px solid var(--oro); margin-bottom: 15px; display: block; }
        .texto-focus { font-size: 1.8em; line-height: 1.4; color: #333; }
    </style>
</head>
<body>

    <div class="interfaz-completa">
        <div id="rituales-content">
            </div>
    </div>

    <div id="vista-focus">
        <div id="card-render" class="card-focus"></div>
    </div>

    <script>
        let xmlDoc = null;

        async function iniciar() {
            const params = new URLSearchParams(window.location.search);
            const libroNum = params.get('num') || '1';
            const seccionId = params.get('sec') || '1';
            const actoPos = params.get('act'); // Índice del acto (1, 2, 3...)
            const modo = params.get('do') || 'scroll';

            try {
                // Cambia 'liturgia.xml' por el nombre exacto de tu archivo
                const response = await fetch('liturgia (5).xml'); 
                const text = await response.text();
                xmlDoc = new DOMParser().parseFromString(text, "text/xml");

                if (modo === 'focus' && actoPos) {
                    renderFocus(libroNum, seccionId, actoPos);
                } else {
                    renderScroll(libroNum, seccionId, actoPos);
                }
            } catch (e) {
                document.getElementById('rituales-content').innerHTML = "Error al cargar el Codex Alvearis.";
            }
        }

        function getActoByPos(libro, sec, pos) {
            const ritual = xmlDoc.querySelector(`ritual[libro="${libro}"]`);
            const seccion = ritual.querySelector(`seccion[id="${sec}"]`);
            const actos = seccion.querySelectorAll('acto');
            return actos[parseInt(pos) - 1]; // Ajuste de índice (act=1 es el primero)
        }

        function renderFocus(libro, sec, pos) {
            document.body.classList.add('modo-focus-activo');
            const acto = getActoByPos(libro, sec, pos);
            if (!acto) return;

            const actor = acto.getAttribute('actor');
            const tema = acto.getAttribute('tema').replace(/\[(.*?)\]/g, '<span class="acotacion">[$1]</span>');

            document.getElementById('card-render').innerHTML = `
                <span class="actor-focus">${actor}∴</span>
                <div class="texto-focus">${tema}</div>
                <button onclick="location.href='?num=${libro}&sec=${sec}&act=${pos}'" style="margin-top:20px; cursor:pointer;">Regresar al Ritual</button>
            `;
        }

        function renderScroll(libro, sec, actoDestino) {
            const ritual = xmlDoc.querySelector(`ritual[libro="${libro}"]`);
            const seccion = ritual.querySelector(`seccion[id="${sec}"]`);
            const contenedor = document.getElementById('rituales-content');
            
            let html = `<h1 class="seccion-titulo">${seccion.getAttribute('titulo')}</h1>`;
            const actos = seccion.querySelectorAll('acto');

            actos.forEach((acto, index) => {
                const posActual = index + 1;
                const actor = acto.getAttribute('actor');
                const tema = acto.getAttribute('tema').replace(/\[(.*?)\]/g, '<i class="acotacion">[$1]</i>');
                const esDestino = (posActual == actoDestino) ? 'resaltado-temporal' : '';

                html += `
                    <div id="acto-${posActual}" class="acto-fila ${esDestino}">
                        <strong>${actor}∴</strong> — ${tema}
                    </div>
                `;
            });

            contenedor.innerHTML = html;

            if (actoDestino) {
                setTimeout(() => {
                    const el = document.getElementById(`acto-${actoDestino}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        }

        window.onload = iniciar;
    </script>
</body>
</html>
