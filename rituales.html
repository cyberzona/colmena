<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        :root {
            --dorado: #eab308; /* Tono extraído de la web principal */
            --oscuro: #1a1a1a;
        }

        body { 
            font-family: 'Palatino Linotype', serif; 
            line-height: 1.3; 
            color: #000; 
            margin: 0; 
            padding: 10px; 
            background-color: #fff; 
        }
        
        /* ENCABEZADO FIJO CON ESTILO WEB */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #fff;
            z-index: 1000;
            padding: 10px;
            box-sizing: border-box;
            border-bottom: 3px solid var(--dorado);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-container { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.1rem; color: #000; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #666; text-transform: uppercase; font-weight: bold; }
        .logo-mini { width: 45px; height: auto; }
        
        #control-panel { 
            background: #f8f8f8; padding: 6px; border: 1px solid #ddd; 
            display: flex; gap: 8px; border-radius: 8px;
        }
        
        #rituales-content { margin-top: 150px; }

        .container-select { display: flex; flex-direction: column; flex: 1; }
        .select-label { font-size: 0.65rem; color: #888; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion, .select-oficiales { 
            width: 100%; padding: 8px; font-size: 0.95rem; border: 1px solid #ccc; border-radius: 5px; background: #fff;
        }

        /* ESTILOS DE TEXTO */
        .apartado-header { 
            background: var(--oscuro); color: var(--dorado); 
            padding: 6px 12px; margin-top: 25px; font-weight: bold; 
            text-transform: uppercase; font-size: 0.85rem; border-radius: 4px; 
        }
        
        dt { font-weight: bold; color: #000; margin-top: 18px; font-size: 1.1rem; }
        dd { 
            margin-left: 45px; border-left: 2px solid var(--dorado); 
            padding-left: 12px; position: relative; margin-bottom: 6px; 
            counter-increment: line-counter; text-align: justify; 
        }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #999; font-size: 0.75rem; width: 30px; text-align: right; }
        
        .sigla-texto-azul { color: #0056b3; font-weight: bold; }
        .line-exec { display: block; font-style: italic; color: #555; margin: 4px 0; padding-left: 8px; border-left: 2px solid #eee; }
        .resaltado { background-color: #fef9c4 !important; }

        .btn-ritual { 
            background: var(--oscuro) !important; color: #fff !important; 
            border: 1px solid var(--dorado); padding: 10px 22px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; 
            border-radius: 50px; margin: 10px 0;
        }
    </style>
</head>
<body onload="inicializar()">

    <div class="fixed-header">
        <div class="header-container">
            <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
            <div class="logia-info">
                <span class="line-logia">RLS∴ COLMENA # 8</span>
                <span id="titulo-ritual-header">LIBRO: Cargando...</span>
            </div>
        </div>
        
        <div id="control-panel">
            <div class="container-select">
                <span class="select-label">Sección</span>
                <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
            </div>
            <div class="container-select">
                <span class="select-label">Oficial</span>
                <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
            </div>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1", fechaTrabajo = "";
        let seccionesVisibles = new Set(["1", "2", "3"]);
        let historialNavegacion = [];

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                fechaTrabajo = urlParams.get('fecha') || new Date().toISOString().split('T')[0]; 
                numGradoActual = (urlParams.get('num') || "1").toString();
                await cargarDatos();
                ejecutarCargaRitual(numGradoActual, (urlParams.get('sec') || "1").toString());
            } catch (e) { console.error(e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
                fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = "LIBRO: " + (titulos[grado] || "Ritual").toUpperCase();
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function actualizarSelectorSecciones(idSel) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(sec => {
                sSel.add(new Option(sec.getAttribute("titulo"), sec.getAttribute("id")));
            });
            sSel.value = idSel;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter");
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const ofis = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofis.add(p.getAttribute("oficial").trim());
                });
            }
            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(i => {
                const sigla = i.getAttribute("sigla");
                if (ofis.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "";
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach((paso, i) => {
                    const ofi = (paso.getAttribute("oficial") || "Ofi").trim();
                    let txt = (paso.getAttribute("texto") || paso.textContent).trim();

                    // LIMPIEZA DE CORCHETES (SIMPLE O DOBLE)
                    txt = txt.replace(/\[{1,2}(.*?)\]{1,2}/g, '<span class="line-exec">[$1]</span>');
                    
                    // LINKS
                    txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (m, cod, tit) => 
                        `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${cod}')">${tit || 'Ir'} ➜</button></div>`);

                    // SIGLAS
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');

                    const esOfi = ofiSel && ofi === ofiSel;
                    html += `<dt>${ofi}∴</dt><dd class="${esOfi ? 'resaltado' : ''}">${txt}</dd>`;
                });
            });
            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;
        }

        window.irA = function(codigo) {
            const targetId = codigo.replace(/\D/g, '');
            actualizarSelectorSecciones(targetId);
            cambioDeSeccion();
            window.scrollTo(0, 0);
        };
    </script>
</body>
</html>
