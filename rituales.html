<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Colmena No. 8</title>
    <style>
        :root { --cafe: #5d4037; --crema: #fdfaf3; --dorado: #b8860b; --verde: #1b5e20; }
        body { font-family: 'Palatino Linotype', serif; background: #efebe9; margin: 0; }
        
        #control-panel { background: var(--crema); padding: 10px; border-bottom: 2px solid var(--dorado); position: sticky; top: 0; z-index: 100; display: flex; gap: 10px; justify-content: center; }
        
        .section-header { background: var(--cafe); color: var(--crema); padding: 15px; text-align: center; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        #ritual-content { padding: 20px; max-width: 800px; margin: auto; }
        .paso-contenedor { margin-bottom: 20px; border-left: 3px solid var(--dorado); padding-left: 15px; }
        .oficial-sigla { font-weight: bold; color: var(--cafe); display: block; }

        /* Estilos de Botones de Instancia */
        .contenedor-instancias { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .btn-doc { background: white; border: 1px solid #d7ccc8; padding: 12px; text-align: left; cursor: pointer; width: 100%; border-radius: 4px; }
        .btn-instancia-exec { background: var(--verde); color: white; border: 2px solid var(--dorado); padding: 18px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; text-transform: uppercase; }

        /* Visor Modal */
        #modal-visor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; }
        .modal-header { background: var(--cafe); color: white; padding: 15px; display: flex; justify-content: space-between; }
    </style>
</head>
<body onload="inicializar()">

    <div id="control-panel">
        <select id="parteFilter" onchange="cambioDeParte()"><option>Cargando...</option></select>
        <select id="oficialFilter" onchange="cambioDeParte()"><option value="ALL">Todos los Oficiales</option></select>
    </div>

    <div id="ritual-content">
        <p style="text-align:center;">Iniciando sistema...</p>
    </div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const grado = urlParams.get('num') || '1';
                const pInicial = urlParams.get('p');

                const [resGlosario, resLiturgia, resTenidas] = await Promise.all([
                    fetch('glosario.xml').then(r => r.text()),
                    fetch('liturgia.xml').then(r => r.text()),
                    fetch('tenidas.xml').then(r => r.text()).catch(() => null)
                ]);

                const parser = new DOMParser();
                glosarioDoc = parser.parseFromString(resGlosario, "text/xml");
                xmlDoc = parser.parseFromString(resLiturgia, "text/xml");
                if (resTenidas) tenidasXml = parser.parseFromString(resTenidas, "text/xml");

                const rituales = xmlDoc.getElementsByTagName("ritual");
                for (let r of rituales) {
                    if (r.getAttribute("grado") === grado) { ritualActivo = r; break; }
                }

                if (ritualActivo) {
                    poblarSelectores();
                    if (pInicial) document.getElementById("parteFilter").value = pInicial;
                    cambioDeParte();
                } else {
                    throw new Error("Grado no encontrado");
                }
            } catch (e) {
                console.error(e);
                document.getElementById("ritual-content").innerHTML = `<div style="color:red; text-align:center; padding:20px;"><b>Error Crítico:</b> No se pudo cargar el archivo de liturgia o el grado especificado.</div>`;
            }
        }

        function poblarSelectores() {
            const pSel = document.getElementById("parteFilter");
            pSel.innerHTML = "";
            const partes = ritualActivo.getElementsByTagName("parte");
            for (let p of partes) {
                let opt = document.createElement("option");
                opt.value = p.getAttribute("id");
                opt.textContent = p.getAttribute("titulo");
                pSel.appendChild(opt);
            }

            const oSel = document.getElementById("oficialFilter");
            const oficiales = glosarioDoc.getElementsByTagName("oficial");
            for (let o of oficiales) {
                let opt = document.createElement("option");
                opt.value = o.getAttribute("sigla");
                opt.textContent = o.textContent;
                oSel.appendChild(opt);
            }
        }

        function cambioDeParte() {
            const parteId = document.getElementById("parteFilter").value;
            const filtro = document.getElementById("oficialFilter").value;
            const partes = ritualActivo.getElementsByTagName("parte");
            let pActiva = partes[0];
            for (let p of partes) { if (p.getAttribute("id") === parteId) { pActiva = p; break; } }
            renderizar(pActiva, filtro);
        }

        function renderizar(parte, filtro) {
            const cont = document.getElementById("ritual-content");
            let html = `<div class="section-header" onclick="document.getElementById('parteFilter').focus()">${parte.getAttribute("titulo")}</div>`;

            const pasos = parte.getElementsByTagName("paso");
            for (let p of pasos) {
                const sigla = p.getAttribute("oficial");
                if (filtro !== "ALL" && filtro !== sigla) continue;

                let texto = p.textContent || p.getAttribute("texto");
                
                // Procesar etiqueta [[INSTANCIA]] con seguridad
                if (texto.includes("[[INSTANCIA]]")) {
                    texto = texto.replace(/\[\[INSTANCIA\]\]/g, procesarInstancia());
                }

                html += `<div class="paso-contenedor"><span class="oficial-sigla">${sigla}</span><div>${texto}</div></div>`;
            }
            cont.innerHTML = html;
        }

        function procesarInstancia() {
            if (!tenidasXml) return "<br><i>(Bitácora no cargada)</i>";
            
            const hoy = new Date().toISOString().split('T')[0];
            const sesiones = Array.from(tenidasXml.getElementsByTagName("tenida"));
            const actual = sesiones.find(s => s.getAttribute("fecha") === hoy);

            if (!actual) return `<br><small style="color:gray;">(Sin actos para hoy: ${hoy})</small>`;

            let res = "<div class='contenedor-instancias'>";
            const items = Array.from(actual.getElementsByTagName("item"));
            
            items.forEach(i => {
                const acto = i.getAttribute("acto");
                const tit = i.getAttribute("titulo");
                const url = i.getAttribute("url");

                if (acto === "nuevo_grado" || acto === "elevacion" || acto === "iniciacion") {
                    res += `<button class="btn-instancia-exec" onclick="window.location.href='${url}'">⚖️ EJECUTAR: ${tit}</button>`;
                } else {
                    const ico = (acto === "balaustre") ? "📜" : "📄";
                    res += `<button class="btn-doc" onclick="abrirVisor('${url}','${tit}')">${ico} ${tit}</button>`;
                }
            });
            return res + "</div>";
        }

        function abrirVisor(url, tit) {
            const pUrl = url.replace('/view', '/preview').split('?')[0];
            const modal = `<div id="modal-visor"><div class="modal-header"><span>${tit}</span><button onclick="document.getElementById('modal-visor').remove()">CERRAR ✕</button></div><iframe src="${pUrl}" style="width:100%; flex-grow:1; border:none; background:white;"></iframe></div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        }
    </script>
</body>
</html>
