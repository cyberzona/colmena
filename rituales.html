<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 220px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 100px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { font-style: italic; font-size: 0.95em; color: rgba(0, 0, 0, 0.4); font-weight: normal; margin-left: 3px; }
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; text-justify: inter-word; hyphens: auto; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #5d4037; font-size: 1.0em; font-weight: 800; width: 30px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-ritual, .btn-instancia-exec { border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.85em; margin: 4px 0; font-weight: bold; display: table !important; background: #A87C00 !important; color: #ffffff !important; text-decoration: none; text-align: center; width: auto !important; max-width: fit-content; box-sizing: border-box; }
        .instancia-botones { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        
        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .visor-close { position: absolute; top: 8px; right: 8px; background: #ff0000; color: #ffffff; border: 2px solid #ffffff; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 2001; display: flex; align-items: center; justify-content: center; }
        .section-footer { margin-top: 30px; padding: 20px; display: flex; justify-content: center; }
        .btn-scroll-top { background: #5d4037; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="playSection()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="playSection()"></select>
        </div>
    </div>
    <div id="rituales-content"></div>

   <script>
    /**
     * EDICTO DEL CANON ALVEARIS - v2026
     * Traducción Fiel de la Versión 5 con Variables Estandarizadas
     */

    let Liturgy, Glosry, Events, ritual; 
    let sectin; // seccionActiva
    let grados = "1", dateid = ""; 
    let Visibl = new Set(); // seccionesVisibles

    // --- NAVEGACIÓN (Lógica irA de V5) ---

    window.routerSections = function(codigo) {
        try {
            // Traducido de irA(codigo) en V5
            const targetIdStr = parseInt(codigo.substring(1), 10).toString();
            
            if (parseInt(targetIdStr) > 3) {
                Visibl = new Set([targetIdStr]);
            } else {
                Visibl = new Set(["1", "2", "3"]);
            }

            updateSections(targetIdStr);
            cambioDeSeccion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) { 
            console.error("Error en navegación:", err); 
        }
    };

    // --- CARGA DE DATOS (fetchData) ---

    async function fetchData() {
        const v = Date.now();
        const [gls, lit, ten] = await Promise.all([
            fetch(`glosario.xml?v=${v}`).then(r => r.text()),
            fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
            fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<tenidas></tenidas>')
        ]);
        const parser = new DOMParser();
        Glosry = parser.parseFromString(gls, "text/xml");
        Liturgy = parser.parseFromString(lit, "text/xml");
        Events = parser.parseFromString(ten, "text/xml");
    }

    // --- LÓGICA DE CONTROL (Traducido de V5) ---

    function updateSections(idForzado) {
        const sSel = document.getElementById("seccionFilter");
        if (!sSel || !ritual) return;
        
        sSel.innerHTML = "";
        Array.from(ritual.getElementsByTagName("seccion")).forEach(sec => {
            const idXml = sec.getAttribute("id");
            // Mantiene la lógica de visibilidad estricta de V5
            if (Visibl.has(idXml.toString())) {
                sSel.add(new Option(sec.getAttribute("titulo"), idXml));
            }
        });
        if (idForzado) sSel.value = idForzado;
    }

    window.cambioDeSeccion = function() {
        const sSel = document.getElementById("seccionFilter");
        const oSel = document.getElementById("oficialFilter");
        const sId = sSel.value;
        const ofiPrevio = oSel.value;

        sectin = Array.from(ritual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
        
        const oficialesSet = new Set();
        if (sectin) {
            Array.from(sectin.getElementsByTagName("paso")).forEach(p => { 
                if (p.getAttribute("oficial")) oficialesSet.add(p.getAttribute("oficial").trim()); 
            });
        }
        
        oSel.innerHTML = '<option value="">---</option>';
        Array.from(Glosry.getElementsByTagName("item")).forEach(item => {
            const sigla = item.getAttribute("sigla");
            if (oficialesSet.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
        });

        if (oficialesSet.has(ofiPrevio)) oSel.value = ofiPrevio;
        renderizarLiturgia();
    }

    // --- RENDERIZADO (Motor V5) ---

    window.renderizarLiturgia = function() {
        const oficialSel = document.getElementById("oficialFilter").value; 
        const contenedor = document.getElementById('rituales-content');
        if (!sectin || !contenedor) return;

        let html = "", counter = 0, primeraID = null;
        const sId = sectin.getAttribute("id");

        Array.from(sectin.getElementsByTagName("apartado")).forEach(apa => {
            html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
            Array.from(apa.getElementsByTagName("paso")).forEach(paso => {
                counter++;
                const oficialTur = paso.getAttribute("oficial") || "Ofi";
                const idL = `l-${sId}-${counter}`;
                let txt = paso.getAttribute("texto") || paso.textContent || "";
                
                // Regex de LINK traducido a routerSections
                txt = txt.replace(/\[\[LINK:(\d{3})(?::([^\]]+))?\]\]/g, (match, cod, desc) => {
                    const targetIdNum = parseInt(cod.substring(1), 10).toString();
                    const secciones = Array.from(ritual.getElementsByTagName("seccion"));
                    const targetSec = secciones.find(s => s.getAttribute("id") === targetIdNum);
                    const textoBoton = desc || (targetSec ? targetSec.getAttribute("titulo") : `Sección ${targetIdNum}`);
                    return `<br><button class="btn-ritual" onclick="window.routerSections('${cod}')">${textoBoton.trim()} ➜</button>`;
                });

                if (txt.includes("[[INSTANCIA]]")) {
                    txt = txt.replace("[[INSTANCIA]]", `<br>${procesarInstancia(oficialTur, sId, counter)}`);
                }

                if (txt.includes("[[VOLVER]]")) {
                    txt = txt.replace("[[VOLVER]]", `<br><button class="btn-ritual" onclick="window.routerSections('S001')">⬅ Regresar al Flujo Principal</button>`);
                }
                
                txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                
                const esOfi = (oficialSel && oficialTur === oficialSel);
                if (esOfi && !primeraID) primeraID = idL;
                html += `<dt>${oficialTur}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
            });
        });

        contenedor.innerHTML = `<dl style="counter-reset: line-counter;">${html}</dl>`;
        if (primeraID) { 
            const el = document.getElementById(primeraID); 
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
        }
    }

    // --- INSTANCIAS (Memos/Balaustres) ---

    function procesarInstancia(oficialPaso, sid, idx) {
        if (!Events) return "";
        const tActiva = Array.from(Events.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha") === dateid.trim());
        if (!tActiva) return "";            
        
        const filtroSuperior = document.getElementById("oficialFilter").value;
        let contenido = "";
        const items = tActiva.getElementsByTagName("item");

        for (let i = 0; i < items.length; i++) {
            const acto = (items[i].getAttribute("acto") || "").trim();
            const url = items[i].getAttribute("url") || "";
            const titulo = items[i].getAttribute("titulo") || "Memo";

            if (acto === "balaustre" && oficialPaso === "Sec" && filtroSuperior === "Sec") {
                contenido += `<button class="btn-ritual" onclick="viewPlate('${url}')">📜: ${titulo} ➜</button>`;
            } else if (acto === "elevacion" && oficialPaso !== "Sec") {
                const base = window.location.href.split('?')[0];
                const uri = `${base}?num=${grados}&sec=${sid}&fecha=${dateid}#l-${sid}-${idx}`;
                const cmd = url.includes('rituales.html') 
                    ? `sessionStorage.setItem('RETRN', '${uri}'); window.location.href='${url}&fecha=${dateid}'` 
                    : `viewPlate('${url}')`;
                contenido += `<button class="btn-instancia-exec" onclick="${cmd}">${titulo}</button>`;
            }
        }
        return contenido ? `<div class="instancia-botones">${contenido}</div>` : "";
    }

    window.viewPlate = function(url) {
        const overlay = document.createElement('div');
        overlay.className = 'visor-overlay';
        overlay.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
        document.body.appendChild(overlay);
    }

    // --- INICIALIZAR ---

    window.inicializar = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        dateid = urlParams.get('fecha') || new Date().toISOString().split('T')[0];
        grados = (urlParams.get('num') || "1").toString();
        const secUrl = (urlParams.get('sec') || "1").toString();

        if (parseInt(secUrl) > 3) {
            Visibl = new Set([secUrl]);
        } else {
            Visibl = new Set(["1", "2", "3"]);
        }

        await fetchData();
        ritual = Array.from(Liturgy.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grados);
        
        if (ritual) {
            const titulos = { "1": "Aprendiz", "2": "Compañero", "3": "Maestro" };
            document.getElementById("titulo-ritual-header").textContent = titulos[grados] || "Ritual";
            updateSections(secUrl);
            cambioDeSeccion();
            
            const oficialUrl = urlParams.get('ofi') || "";
            if (oficialUrl) {
                document.getElementById("oficialFilter").value = oficialUrl;
                renderizarLiturgia();
            }
        }
    }
</script>
</body>
</html>
