<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rituales Colmena #8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.2; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 10; margin-bottom: 15px; }
        
        /* Estilos de Contenido */
        dt { font-weight: bold; color: #5d4037; margin-top: 12px; font-size: 1.05rem; display: block; }
        dd { margin: 0 0 12px 0; padding: 4px 8px; border-left: 3px solid #d7ccc8; font-size: 1.1rem; text-align: justify; }
        .acotacion { color: #7f8c8d; font-style: italic; font-size: 0.95em; }

        /* Resaltado para el modo SCROLL (Default) */
        .resaltado-punto { background-color: rgba(168, 124, 0, 0.15); border-left: 4px solid #A87C00 !important; transition: background 1s ease; }

        /* MODO FOCUS (Valor Pesado) */
        body.modo-focus-on .header-container, 
        body.modo-focus-on #control-panel { display: none !important; }
        body.modo-focus-on #rituales-content { height: 90vh; display: flex; align-items: center; justify-content: center; }
        
        .card-focus { 
            background: white; padding: 30px; border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 600px; 
            border-top: 10px solid #A87C00; width: 90%;
        }
        .btn-ritual { background: #5d4037; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="https://colmena8.org/img/logo.png" class="logo-mini" alt="Logo">
        <div class="logia-info">
            <span class="line-logia">R:. L:. S:. COLMENA No. 8</span>
            <span id="titulo-ritual-header">CARGANDO...</span>
        </div>
    </div>

    <div id="control-panel">
        <select id="selector-secciones" onchange="gestionarCambioSeccion()"></select>
    </div>

    <div id="rituales-content"></div>

    <script>
        let RitualActual = null, Glosario = null, libroActivo = "1";

        window.onload = inicializarPortal;

        async function cargarArchivosBase() {
            try {
                const [rRitual, rGlosario] = await Promise.all([
                    fetch('liturgia.xml'),
                    fetch('glosario.xml')
                ]);
                const p = new DOMParser();
                const xmlLiturgia = p.parseFromString(await rRitual.text(), "text/xml");
                Glosario = p.parseFromString(await rGlosario.text(), "text/xml");
                RitualActual = xmlLiturgia.querySelector(`ritual[libro="${libroActivo}"]`);
            } catch (e) { throw new Error("Faltan archivos base (liturgia/glosario)"); }
        }

        async function inicializarPortal() {
            try {
                const params = new URLSearchParams(window.location.search);
                libroActivo = params.get('num') || "1";
                const secURL = params.get('sec') || "1";
                const actURL = params.get('act');
                const modo = params.get('do') || 'scroll';

                await cargarArchivosBase();
                
                if (RitualActual) {
                    const titulos = { "1": "Primer Grado", "2": "Segundo Grado", "3": "Tercer Grado" };
                    document.getElementById("titulo-ritual-header").textContent = titulos[libroActivo];

                    if (modo === 'focus' && actURL) {
                        ejecutarFocus(secURL, actURL);
                    } else {
                        actualizarSelectorSecciones(secURL);
                        await gestionarCambioSeccion(actURL);
                    }
                }
            } catch (e) {
                document.getElementById('rituales-content').innerHTML = "Error: " + e.message;
            }
        }

        function actualizarSelectorSecciones(idSeleccionado) {
            const selector = document.getElementById("selector-secciones");
            selector.innerHTML = "";
            Array.from(RitualActual.getElementsByTagName("seccion")).forEach(s => {
                const opt = document.createElement("option");
                opt.value = s.getAttribute("id");
                opt.textContent = s.getAttribute("titulo");
                if (opt.value === idSeleccionado) opt.selected = true;
                selector.appendChild(opt);
            });
        }

        async function gestionarCambioSeccion(actoDestino = null) {
            const idSec = document.getElementById("selector-secciones").value;
            const seccion = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idSec);
            const content = document.getElementById("rituales-content");
            let html = "";

            Array.from(seccion.querySelectorAll('acto')).forEach((acto, index) => {
                const pos = index + 1;
                const actor = acto.getAttribute("actor");
                const tema = acto.getAttribute("tema").replace(/\[(.*?)\]/g, '<span class="acotacion">[$1]</span>');
                const clase = (pos == actoDestino) ? 'resaltado-punto' : '';
                
                html += `<div id="verso-${pos}" class="${clase}"><dt>${actor}∴</dt><dd>${tema}</dd></div>`;
            });

            content.innerHTML = html;

            if (actoDestino) {
                setTimeout(() => {
                    const el = document.getElementById(`verso-${actoDestino}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        }

        function ejecutarFocus(idSec, idActo) {
            document.body.classList.add('modo-focus-on');
            const seccion = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idSec);
            const actos = seccion.querySelectorAll('acto');
            const acto = actos[parseInt(idActo) - 1];

            if (acto) {
                const actor = acto.getAttribute("actor");
                const tema = acto.getAttribute("tema").replace(/\[(.*?)\]/g, '<span class="acotacion">[$1]</span>');
                
                document.getElementById('rituales-content').innerHTML = `
                    <div class="card-focus">
                        <dt>${actor}∴</dt>
                        <dd style="font-size:1.8rem; border:none;">${tema}</dd>
                        <button class="btn-ritual" onclick="window.location.search='?num=${libroActivo}&sec=${idSec}&act=${idActo}'">Ver completo</button>
                    </div>`;
            }
        }
    </script>
</body>
</html>
