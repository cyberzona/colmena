<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rituales - Colmena No. 8</title>
    <link rel="stylesheet" href="css/estilos.css"> <style>
        /* --- ESTILOS PARA EL MODO FOCUS --- */
        body.modo-focus-activo .seccion-contenedor, 
        body.modo-focus-activo .header-app, 
        body.modo-focus-activo .nav-menu {
            display: none !important;
        }

        #vista-focus {
            display: none;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f1ea;
        }

        body.modo-focus-activo #vista-focus {
            display: flex;
        }

        .card-focus {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-left: 8px solid #A87C00;
            max-width: 600px;
            width: 90%;
        }

        .actor-focus {
            font-size: 1.4rem;
            font-weight: bold;
            color: #5d4037;
            margin-bottom: 15px;
            display: block;
        }

        .texto-focus {
            font-size: 1.6rem;
            line-height: 1.5;
            color: #2c3e50;
        }

        .acotacion {
            font-style: italic;
            color: #7f8c8d;
        }

        /* --- ESTILOS PARA EL MODO SCROLL (RESALTADO) --- */
        .resaltado-temporal {
            background-color: rgba(168, 124, 0, 0.15);
            border-radius: 4px;
            transition: background-color 2s ease;
        }
    </style>
</head>
<body>

    <header class="header-app">
        <h1>Colmena No. 8</h1>
    </header>

    <main id="contenedor-principal">
        <div id="rituales-content" class="seccion-contenedor">
            </div>
    </main>

    <div id="vista-focus">
        <div id="card-render" class="card-focus">
            </div>
    </div>

    <script>
        // Variables globales
        let xmlDoc = null;

        async function cargarRitual() {
            const params = new URLSearchParams(window.location.search);
            const libroNum = params.get('num') || '1';
            const seccionId = params.get('sec') || '1';
            const actoId = params.get('act');
            const accion = params.get('do') || 'scroll'; // Default es scroll

            try {
                const response = await fetch('liturgia (5).xml');
                const text = await response.text();
                const parser = new DOMParser();
                xmlDoc = parser.parseFromString(text, "text/xml");

                if (idActo && accion === 'focus') {
                    ejecutarModoFocus(idActo);
                } else {
                    renderizarRitualCompleto(libroNum, seccionId, actoId);
                }
            } catch (error) {
                console.error("Error cargando el rito:", error);
            }
        }

        function ejecutarModoFocus(id) {
            document.body.classList.add('modo-focus-activo');
            const actoNode = xmlDoc.querySelector(`acto[id="${id}"]`);
            
            if (actoNode) {
                const actor = actoNode.getAttribute('actor');
                let tema = actoNode.getAttribute('tema');
                
                // Formatear acotaciones
                tema = tema.replace(/\[(.*?)\]/g, '<span class="acotacion">[$1]</span>');

                document.getElementById('card-render').innerHTML = `
                    <span class="actor-focus">${actor}∴</span>
                    <div class="texto-focus">${tema}</div>
                    <button onclick="window.location.search='?num=1&sec=1&act=${id}'" style="margin-top:20px;">Ver en contexto</button>
                `;
            }
        }

        function renderizarRitualCompleto(libro, sec, actoIdDestino) {
            const ritual = xmlDoc.querySelector(`ritual[libro="${libro}"]`);
            const seccion = ritual.querySelector(`seccion[id="${sec}"]`);
            const contenedor = document.getElementById('rituales-content');
            
            let html = `<h2>${seccion.getAttribute('titulo')}</h2>`;
            
            const partes = seccion.querySelectorAll('parte');
            partes.forEach(parte => {
                html += `<h3>${parte.getAttribute('titulo')}</h3>`;
                const actos = parte.querySelectorAll('acto');
                actos.forEach(acto => {
                    const id = acto.getAttribute('id') || '';
                    const actor = acto.getAttribute('actor');
                    const tema = acto.getAttribute('tema').replace(/\[(.*?)\]/g, '<i class="acotacion">[$1]</i>');
                    
                    // Si el ID coincide, aplicamos la clase de resaltado
                    const claseResaltado = (id === actoIdDestino) ? 'resaltado-temporal' : '';
                    
                    html += `
                        <div id="acto-${id}" class="acto-fila ${claseResaltado}" style="margin-bottom:10px;">
                            <strong>${actor}∴</strong> — ${tema}
                        </div>
                    `;
                });
            });

            contenedor.innerHTML = html;

            // Si hay un acto destino, hacemos el scroll (comportamiento por defecto)
            if (actoIdDestino) {
                setTimeout(() => {
                    const elemento = document.getElementById(`acto-${actoIdDestino}`);
                    if (elemento) {
                        elemento.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 500);
            }
        }

        // Iniciar
        window.onload = cargarRitual;
    </script>
</body>
</html>
