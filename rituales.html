<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href='https://fonts.googleapis.com/css?family=MedievalSharp' rel='stylesheet'>
    <title>Rituales - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.4; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        
        /* Cabecera Institucional */
        .header-container { display: flex; align-items: center; justify-content: flex-start; gap: 20px; margin-bottom: 20px; border-bottom: 2px solid #5d4037; padding-bottom: 15px; }
        .logo-mini { width: 75px; height: auto; flex-shrink: 0; }
        .logia-info { display: flex; flex-direction: column; text-align: left; }
        .logia-linea1 { font-size: 0.85rem; color: #8d6e63; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 1rem; color: #795548; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; font-weight: bold; }

        /* Panel de Control Sticky */
        #control-panel { 
            background: #efebe9; padding: 10px; border-radius: 8px; border: 1px solid #d7ccc8; 
            position: sticky; top: 0; z-index: 1000; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container-select { display: inline-block; margin: 5px; text-align: left; vertical-align: top; }
        #container-parte { width: 55%; }
        #container-oficial { width: 35%; }
        .select-label { display: block; font-size: 0.7em; color: #795548; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
        select { padding: 8px; font-size: 0.9em; width: 100%; border-radius: 4px; border: 1px solid #ccc; background: white; }

        /* Estilos del Ritual y Siglas */
        .sigla-en-dialogo { 
            font-weight: bold; 
            color: #0056b3; 
            cursor: help; 
            border-bottom: 1px dotted rgba(0, 86, 179, 0.4);
        }
        dt { font-weight: bold; color: #5d4037; margin-top: 15px; font-size: 0.9em; }
        dd { margin-left: 25px; border-left: 2px solid #d7ccc8; padding-left: 10px; font-size: 0.95em; counter-increment: line-counter; position: relative; margin-bottom: 5px; }
        dd::before { content: counter(line-counter); position: absolute; left: -25px; color: #8d6e63; font-size: 0.8em; font-weight: bold; }
        
        .section-header { font-family: 'MedievalSharp', cursive; background: #5d4037; color: white; padding: 8px; text-align: center; border-radius: 4px; margin-top: 10px; text-transform: uppercase; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 0.9em; border-bottom: 1px solid #d7ccc8; text-align: right; margin-top: 25px; padding-bottom: 3px; }
        .accion-siguiente-linea { font-size: 0.85em; color: #5d4037; font-style: italic; margin-left: 35px; display: block; margin-bottom: 8px; }

        #glosario-container { margin-top: 30px; padding: 15px; border-top: 1px solid #d7ccc8; font-size: 0.75em; color: #a1887f; text-align: center; line-height: 1.6; }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="logia-linea1">R∴ L∴ S∴ COLMENA Nº 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select" id="container-parte">
            <span class="select-label">Parte</span>
            <select id="parteFilter" onchange="renderizarRiturgia()"></select>
        </div>
        <div class="container-select" id="container-oficial">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" onchange="renderizarRiturgia()">
                <option value="todos">Todos</option>
            </select>
        </div>
    </div>

    <div id="rituales-content"></div>
    <div id="glosario-container"></div>

    <script>
        let xmlDoc = null;
        let glosarioDefiniciones = {};

        async function inicializar() {
            try {
                // 1. Cargar Glosario desde XML
                const respGlosario = await fetch('glosario.xml');
                const textGlosario = await respGlosario.text();
                const xmlGlosario = new DOMParser().parseFromString(textGlosario, "text/xml");
                
                xmlGlosario.querySelectorAll("item").forEach(item => {
                    glosarioDefiniciones[item.getAttribute("sigla")] = item.getAttribute("expansion");
                });

                // 2. Cargar Ritual desde XML
                const response = await fetch('liturgia.xml');
                const text = await response.text();
                xmlDoc = new DOMParser().parseFromString(text, "text/xml");

                const ritualNode = xmlDoc.querySelector("ritual");
                const num = ritualNode.getAttribute("numero");
                
                let nombreRito = (num === "1") ? "Rito de Aprendiz" : 
                                 (num === "2") ? "Rito de Compañero" : 
                                 (num === "3") ? "Rito de Maestro" : "Ritual Masónico";

                document.getElementById("titulo-ritual-header").textContent = nombreRito;
                
                poblarSelectorPartes();
                poblarSelectorOficiales();
                renderizarRiturgia();
                mostrarGlosario();

                console.log("[MEMO] Carga de XMLs exitosa.");
            } catch (e) {
                document.getElementById('rituales-content').innerHTML = "Error al cargar archivos XML. Asegúrese de usar un servidor local.";
                console.error(e);
            }
        }

        function mostrarGlosario() {
            const contenedor = document.getElementById('glosario-container');
            let html = `<div>`;
            for (const [sigla, def] of Object.entries(glosarioDefiniciones)) {
                html += `<b>${sigla}∴</b>: ${def} &nbsp; | &nbsp; `;
            }
            contenedor.innerHTML = html + `</div>`;
        }

        function poblarSelectorPartes() {
            const selector = document.getElementById("parteFilter");
            xmlDoc.querySelectorAll("parte").forEach(p => {
                let opt = document.createElement("option");
                opt.value = p.getAttribute("id");
                opt.textContent = p.getAttribute("titulo");
                selector.appendChild(opt);
            });
        }

        function poblarSelectorOficiales() {
            const selector = document.getElementById("oficialFilter");
            const oficialesEnXML = new Set();
            xmlDoc.querySelectorAll("paso").forEach(p => oficialesEnXML.add(p.getAttribute("oficial")));
            
            // Re-poblar manteniendo la opción "Todos"
            selector.innerHTML = '<option value="todos">Todos</option>';
            
            Array.from(oficialesEnXML).sort().forEach(sigla => {
                let opt = document.createElement("option");
                opt.value = sigla;
                const expansion = glosarioDefiniciones[sigla];
                opt.textContent = expansion ? `${sigla}∴`;
                selector.appendChild(opt);
            });
        }

        function renderizarRiturgia() {
            if (!xmlDoc) return;
            const parteId = document.getElementById("parteFilter").value;
            const filtroOficial = document.getElementById("oficialFilter").value;
            const contenedor = document.getElementById('rituales-content');
            const parte = xmlDoc.querySelector(`parte[id="${parteId}"]`);
            
            let html = `<div class="parte-ritual"><div class="section-header">${parte.getAttribute("titulo")}</div>`;
            
            parte.querySelectorAll("apartado").forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                apa.querySelectorAll("paso").forEach(paso => {
                    const oficial = paso.getAttribute("oficial");
                    let texto = paso.getAttribute("texto");
                    let acciones = [];
                    
                    // Extraer acciones entre corchetes
                    texto = texto.replace(/\[(.*?)\]/g, (m, p1) => { acciones.push(p1); return ""; });
                    
                    // Resaltado UNIVERSAL de siglas + Tooltips dinámicos
                    texto = texto.replace(/([A-Z0-9ÁÉÍÓÚÑ]{1,10})∴/g, (match, sigla) => {
                        const expansion = glosarioDefiniciones[sigla] || "Dignidad / Oficial";
                        return `<span class="sigla-en-dialogo" title="${expansion}">${sigla}∴</span>`;
                    });

                    const mostrar = (filtroOficial === "todos" || oficial === filtroOficial);
                    const claseH = (mostrar && filtroOficial !== "todos") ? "style='background:rgba(180,255,100,0.2); border-left:3px solid #5d4037;'" : "";
                    
                    html += `<dt>${oficial}∴</dt><dd ${claseH}>${texto}</dd>`;
                    acciones.forEach(a => html += `<span class="accion-siguiente-linea">[${a}]</span>`);
                });
            });
            contenedor.innerHTML = html + `</div>`;
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
