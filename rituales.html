<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.6; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        
        /* Encabezado */
        .header-container { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid #5d4037; padding-bottom: 10px; }
        .logia-info { display: flex; flex-direction: column; }
        .logia-linea1 { font-size: 0.75rem; color: #8d6e63; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.9rem; color: #795548; text-transform: uppercase; font-weight: bold; }
        .logo-mini { width: 60px; height: auto; }

        /* Panel de Control de Botones/Selectores */
        #control-panel { background: #efebe9; padding: 12px; border-radius: 8px; border: 1px solid #d7ccc8; position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container-select { flex: 1; display: flex; flex-direction: column; }
        .select-label { font-size: 0.7em; color: #795548; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        select { padding: 10px; font-size: 0.95em; border-radius: 4px; border: 1px solid #b8860b; background: white; color: #5d4037; }

        /* Estructura del Ritual y Numeración */
        .parte-ritual { counter-reset: line-counter; } /* Reinicia el contador en cada parte */
        .section-header { background: #5d4037; color: white; padding: 15px; text-align: center; border-radius: 4px; margin: 15px 0; text-transform: uppercase; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        dt { font-weight: bold; color: #5d4037; margin-top: 15px; font-size: 0.9em; text-transform: uppercase; }
        dd { margin: 0 0 10px 50px; border-left: 3px solid #d7ccc8; padding: 0 12px; font-size: 1.05em; position: relative; text-align: justify; min-height: 1.5em; }
        
        /* El mecanismo de la numeración */
        dd::before { 
            counter-increment: line-counter; 
            content: counter(line-counter); 
            position: absolute; 
            left: -42px; 
            color: #8d6e63; 
            font-size: 0.9em; 
            font-weight: bold; 
            width: 30px; 
            text-align: right; 
        }
        
        .apartado-titulo { font-weight: bold; color: #795548; border-bottom: 1px solid #d7ccc8; margin-top: 25px; padding-bottom: 5px; font-size: 0.9em; text-align: right; text-transform: uppercase; }
        .sigla-azul { color: #0277bd; font-weight: bold; }
        .accion-texto { font-style: italic; color: #5d4037; background: #f0f0f0; padding: 2px 6px; border-radius: 4px; border-left: 3px solid #795548; }
        .resaltado { background: rgba(180, 255, 100, 0.35) !important; border-left: 5px solid #2e7d32 !important; }

        /* Botones de Gestión (Memos) */
        .btn-link { background: #1b5e20; color: white; border: 2px solid #b8860b; padding: 14px; border-radius: 8px; font-weight: bold; width: 100%; margin: 12px 0; cursor: pointer; font-size: 0.9em; }
        .btn-doc { background: #8d6e63; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; margin: 6px 0; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* Visor Modal */
        #modal-visor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9999; display: flex; flex-direction: column; }
        .modal-header { background: #5d4037; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #b8860b; }
        .btn-cerrar { background: #b71c1c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="logia-linea1">Resp∴ Log∴ Simb∴ Colmena Nº 8</span>
            <span id="titulo-ritual-header">Cargando Grado...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Parte</span>
            <select id="parteFilter" onchange="cambioDeParte()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoGlobal = "1";

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                numGradoGlobal = urlParams.get('num') || '1';

                const [resGlosario, resLiturgia, resTenidas] = await Promise.all([
                    fetch('glosario.xml').then(r => r.text()),
                    fetch('liturgia.xml').then(r => r.text()),
                    fetch('tenidas.xml').then(r => r.text()).catch(() => null)
                ]);

                const parser = new DOMParser();
                glosarioDoc = parser.parseFromString(resGlosario, "text/xml");
                xmlDoc = parser.parseFromString(resLiturgia, "text/xml");
                if (resTenidas) tenidasXml = parser.parseFromString(resTenidas, "text/xml");

                // Filtro estricto: Solo cargamos el ritual que coincida con el grado de la URL
                const rituales = Array.from(xmlDoc.getElementsByTagName("ritual"));
                ritualActivo = rituales.find(r => r.getAttribute("grado") === numGradoGlobal);

                if (ritualActivo) {
                    const nombres = { "1": "Aprendiz", "2": "Compañero", "3": "Maestro" };
                    document.getElementById("titulo-ritual-header").textContent = "Ritual de " + nombres[numGradoGlobal];
                    poblarPartesDelGrado();
                    cambioDeParte();
                }
            } catch (e) { console.error("Error en inicialización:", e); }
        }

        function poblarPartesDelGrado() {
            const pSel = document.getElementById("parteFilter");
            pSel.innerHTML = "";
            const partes = ritualActivo.getElementsByTagName("parte");
            for (let p of partes) {
                pSel.add(new Option(p.getAttribute("titulo"), p.getAttribute("id")));
            }
        }

        function cambioDeParte() {
            poblarOficiales();
            renderizarLiturgia();
        }

        function poblarOficiales() {
            const pId = document.getElementById("parteFilter").value;
            const oSel = document.getElementById("oficialFilter");
            const parteActual = Array.from(ritualActivo.getElementsByTagName("parte")).find(p => p.getAttribute("id") === pId);
            const oficialesSet = new Set();

            if (parteActual) {
                const pasos = parteActual.getElementsByTagName("paso");
                for (let ps of pasos) {
                    if (ps.getAttribute("oficial")) oficialesSet.add(ps.getAttribute("oficial").trim().toLowerCase());
                }
            }

            oSel.innerHTML = '<option value="todos">Todos</option>';
            const itemsG = glosarioDoc.getElementsByTagName("item");
            for (let i of itemsG) {
                const sigla = i.getAttribute("sigla");
                if (oficialesSet.has(sigla.toLowerCase())) oSel.add(new Option(sigla + "∴", sigla.toLowerCase()));
            }
        }

        function renderizarLiturgia() {
            const pId = document.getElementById("parteFilter").value;
            const fOfi = document.getElementById("oficialFilter").value.toLowerCase();
            const contenedor = document.getElementById('rituales-content');
            const parte = Array.from(ritualActivo.getElementsByTagName("parte")).find(p => p.getAttribute("id") === pId);
            
            if (!parte) return;

            let html = `<div class="parte-ritual">
                <div class="section-header" onclick="document.getElementById('parteFilter').focus()">${parte.getAttribute("titulo")}</div>`;

            const apartados = parte.getElementsByTagName("apartado");
            for (let apa of apartados) {
                html += `<div class="apartado-titulo">${apa.getAttribute("titulo")}</div>`;
                const pasos = apa.getElementsByTagName("paso");
                for (let ps of pasos) {
                    const ofi = ps.getAttribute("oficial");
                    let txt = ps.getAttribute("texto") || "";
                    
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-azul">$1</span>');
                    
                    // Inyección de Memos
                    if (txt.includes('[[GESTION_SECRETARIA]]')) {
                        txt = txt.replace('[[GESTION_SECRETARIA]]', procesarMemos());
                    }

                    if (txt.startsWith('[') && txt.endsWith(']')) txt = `<span class="accion-texto">${txt}</span>`;

                    const resaltado = (fOfi !== "todos" && ofi.toLowerCase() === fOfi) ? "class='resaltado'" : "";
                    html += `<dt>${ofi}∴</dt><dd ${resaltado}>${txt}</dd>`;
                }
            }
            html += `</div>`;
            contenedor.innerHTML = html;
            window.scrollTo(0,0);
        }

        function procesarMemos() {
            if (!tenidasXml) return "";
            const hoy = new Date().toISOString().split('T')[0];
            const sesiones = Array.from(tenidasXml.getElementsByTagName("tenida"));
            
            const hoySesion = sesiones.find(s => s.getAttribute("fecha") === hoy);
            const pasadaSesion = sesiones.filter(s => s.getAttribute("fecha") < hoy)
                                         .sort((a,b) => b.getAttribute("fecha").localeCompare(a.getAttribute("fecha")))[0];

            let res = "";
            
            if (pasadaSesion) {
                const items = Array.from(pasadaSesion.getElementsByTagName("item")).filter(i => i.getAttribute("acto") === "balaustre");
                if (items.length > 0) res += `<div class="apartado-titulo" style="text-align:left">Memoria Histórica</div>`;
                items.forEach(i => res += `<button class="btn-doc" onclick="abrirVisor('${i.getAttribute("url")}','${i.getAttribute("titulo")}')">📜 ${i.getAttribute("titulo")}</button>`);
            }

            if (hoySesion) {
                const items = Array.from(hoySesion.getElementsByTagName("item"));
                if (items.length > 0) res += `<div class="apartado-titulo" style="text-align:left">Trabajos de Hoy</div>`;
                items.forEach(i => {
                    const acto = i.getAttribute("acto");
                    if (acto === "nuevo_grado") {
                        res += `<button class="btn-link" onclick="window.location.href='${i.getAttribute("url")}'">⚖️ EJECUTAR: ${i.getAttribute("titulo")}</button>`;
                    } else if (acto !== "balaustre") {
                        res += `<button class="btn-doc" onclick="abrirVisor('${i.getAttribute("url")}','${i.getAttribute("titulo")}')">📄 ${i.getAttribute("titulo")}</button>`;
                    }
                });
            }
            return res;
        }

        function abrirVisor(url, titulo) {
            const urlP = url.replace('/view', '/preview');
            const modal = `<div id="modal-visor">
                <div class="modal-header"><span>${titulo}</span><button class="btn-cerrar" onclick="this.parentElement.parentElement.remove()">CERRAR ✕</button></div>
                <iframe src="${urlP}" style="flex-grow:1; border:none; background:white;"></iframe>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        }
    </script>
</body>
</html>
