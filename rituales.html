<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.4; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; border-bottom: 2px solid #5d4037; padding-bottom: 15px; }
        .logia-info { display: flex; flex-direction: column; text-align: left; }
        .logia-linea1 { font-size: 0.75rem; color: #8d6e63; letter-spacing: 0.5px; }
        #titulo-ritual-header { font-size: 0.85rem; color: #795548; text-transform: uppercase; letter-spacing: 1.5px; font-style: italic; }
        .logo-mini { width: 75px; height: auto; flex-shrink: 0; }
        
        #control-panel { background: #efebe9; padding: 10px; border-radius: 8px; border: 1px solid #d7ccc8; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .container-select { display: inline-block; margin: 5px; text-align: left; }
        #container-parte { width: 55%; }
        #container-oficial { width: 35%; }
        .select-label { display: block; font-size: 0.7em; color: #795548; font-weight: bold; text-transform: uppercase; }
        select { padding: 8px; font-size: 0.9em; width: 100%; border-radius: 4px; border: 1px solid #ccc; background: white; }

        /* SIGLAS EN EL TEXTO (AZUL) */
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        
        /* ENCABEZADOS (OSCURO) */
        dt { font-weight: bold; color: #5d4037; margin-top: 15px; font-size: 0.95em; }
        
        /* NUMERACIÓN MUCHO MÁS GRANDE */
        .parte-ritual { counter-reset: line-counter; }
        dd { 
            margin-left: 55px; 
            border-left: 3px solid #d7ccc8; 
            padding-left: 15px; 
            font-size: 1em; 
            position: relative; 
            margin-bottom: 12px; 
            counter-increment: line-counter; 
        }
        dd::before { 
            content: counter(line-counter); 
            position: absolute; 
            left: -50px; 
            color: #5d4037; /* Color más oscuro para contraste */
            font-size: 1.4em; /* Tamaño aumentado */
            font-weight: 900; 
            width: 40px; 
            text-align: right; 
            top: -4px;
            font-family: Arial, sans-serif;
        }
        
        /* RESALTADO DE DIÁLOGO */
        .resaltado { background: rgba(180, 255, 100, 0.45) !important; border-left: 5px solid #2e7d32 !important; }
        
        .section-header { background: #5d4037; color: white; padding: 10px; text-align: center; border-radius: 4px; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 0.95em; border-bottom: 1px solid #d7ccc8; text-align: right; margin-top: 25px; padding-bottom: 5px; }
        .accion-siguiente-linea { font-size: 0.9em; color: #5d4037; font-style: italic; margin-left: 70px; display: block; margin-top: 4px; border-left: 2px dashed #d7ccc8; padding-left: 10px; }
    </style>
</head>
<body onload="inicializar()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="logia-linea1">Resp∴ Log∴ Simb∴ Colmena Nº 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select" id="container-parte">
            <span class="select-label">Parte</span>
            <select id="parteFilter" onchange="cambioDeParte()"></select>
        </div>
        <div class="container-select" id="container-oficial">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc = null;
        let glosarioDoc = null;
        let ritualActivo = null;

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const numGrado = urlParams.get('num') || '1';
                const [resGlosario, resLiturgia] = await Promise.all([
                    fetch('glosario.xml').then(r => r.text()),
                    fetch('liturgia.xml').then(r => r.text())
                ]);
                const parser = new DOMParser();
                glosarioDoc = parser.parseFromString(resGlosario, "text/xml");
                xmlDoc = parser.parseFromString(resLiturgia, "text/xml");

                const rituales = xmlDoc.getElementsByTagName("ritual");
                for (let r of rituales) {
                    if (r.getAttribute("grado") === numGrado) { ritualActivo = r; break; }
                }
                if (!ritualActivo) return;

                const nombres = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Ritual de Maestro" };
                document.getElementById("titulo-ritual-header").textContent = nombres[numGrado];

                poblarPartes();
                cambioDeParte(); 
            } catch (e) { console.error("Error:", e); }
        }

        function poblarPartes() {
            const pSel = document.getElementById("parteFilter");
            pSel.innerHTML = "";
            const partes = ritualActivo.getElementsByTagName("parte");
            for (let p of partes) {
                pSel.add(new Option(p.getAttribute("titulo"), p.getAttribute("id")));
            }
        }

        function cambioDeParte() {
            poblarOficialesDeEstaParte();
            renderizarLiturgia();
        }

        function poblarOficialesDeEstaParte() {
            const pId = document.getElementById("parteFilter").value;
            const oSel = document.getElementById("oficialFilter");
            
            const parteEnPantalla = Array.from(ritualActivo.getElementsByTagName("parte")).find(p => p.getAttribute("id") === pId);
            const oficialesActivos = new Set();
            
            if (parteEnPantalla) {
                const pasos = parteEnPantalla.getElementsByTagName("paso");
                for (let paso of pasos) {
                    const idOfi = paso.getAttribute("oficial");
                    if (idOfi) oficialesActivos.add(idOfi.trim().toLowerCase());
                }
            }

            oSel.innerHTML = '<option value="todos">Todos</option>';
            const itemsGlosario = glosarioDoc.getElementsByTagName("item");

            for (let item of itemsGlosario) {
                const siglaG = item.getAttribute("sigla");
                if (oficialesActivos.has(siglaG.toLowerCase())) {
                    // El valor del select siempre se guarda en minúsculas para comparar
                    oSel.add(new Option(siglaG + "∴", siglaG.toLowerCase()));
                }
            }
        }

        function renderizarLiturgia() {
            const pId = document.getElementById("parteFilter").value;
            const fOfi = document.getElementById("oficialFilter").value.toLowerCase(); 
            const contenedor = document.getElementById('rituales-content');
            
            const parteActiva = Array.from(ritualActivo.getElementsByTagName("parte")).find(p => p.getAttribute("id") === pId);
            if (!parteActiva) return;

            let htmlAcumulado = "";
            const apartados = parteActiva.getElementsByTagName("apartado");

            for (let apa of apartados) {
                let pasosHtml = "";
                const pasos = apa.getElementsByTagName("paso");

                for (let paso of pasos) {
                    const ofiOriginal = paso.getAttribute("oficial") || "";
                    let texto = paso.getAttribute("texto") || "";
                    if (texto.trim() === "") continue;

                    let acciones = [];
                    texto = texto.replace(/\[(.*?)\]/g, (m, p1) => { acciones.push(p1); return ""; });

                    // Resaltado AZUL de siglas en el cuerpo (Agnóstico a mayúsculas)
                    texto = texto.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');

                    // CORRECCIÓN DE RESALTADO: Compara en minúsculas para que "Sec" == "sec"
                    const claseResaltado = (fOfi !== "todos" && ofiOriginal.toLowerCase() === fOfi) ? "class='resaltado'" : "";
                    
                    pasosHtml += `<dt>${ofiOriginal}∴</dt><dd ${claseResaltado}>${texto}</dd>`;
                    acciones.forEach(acc => {
                        pasosHtml += `<span class="accion-siguiente-linea">[${acc}]</span>`;
                    });
                }
                if (pasosHtml !== "") htmlAcumulado += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>` + pasosHtml;
            }

            contenedor.innerHTML = `<div class="parte-ritual"><div class="section-header">${parteActiva.getAttribute("titulo")}</div>${htmlAcumulado}</div>`;
            
            if (fOfi !== "todos") {
                const p = document.querySelector('.resaltado');
                if (p) p.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
