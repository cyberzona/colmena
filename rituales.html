<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; }
        .container-select { display: flex; flex-direction: column; }
        .select-label { font-size: 0.7rem; color: #5d4037; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 180px; padding: 8px; font-size: 0.95rem; border-radius: 4px; background: #fff; font-weight: bold; color: #5d4037; }
        .select-oficiales { width: 90px; padding: 8px; font-size: 0.95rem; border-radius: 4px; background: #fff; font-weight: bold; color: #5d4037; }
        .apartado-header { background: #5d4037; color: #fff; padding: 6px 12px; margin-top: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; border-radius: 4px; }
        dt { font-weight: bold; color: #5d4037; margin-top: 12px; font-size: 1.1rem; }
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding: 0 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #5d4037; font-size: 0.75rem; font-weight: 800; width: 30px; text-align: right; }
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { display: block; font-style: italic; font-size: 0.9em; color: rgba(0, 0, 0, 0.5); margin: 8px 0; padding-left: 8px; border-left: 2px solid #d7ccc8; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .nav-link-container { display: block; margin: 15px 0; text-align: center; }
        .btn-ritual { background: #A87C00 !important; color: #fff !important; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1", fechaTrabajo = "";
        let seccionesVisibles = new Set();
        let historialNavegacion = [];

        // 1. MOTOR DE NAVEGACIÓN (Definido globalmente)
        window.irA = function(codigo) {
            if (!ritualActivo) return; // Evita que falle si aún no carga el XML

            if (codigo === 'VOLVER') {
                if (historialNavegacion.length > 0) {
                    const ant = historialNavegacion.pop();
                    seccionesVisibles = ant.visibilidad;
                    actualizarSelectorSecciones(ant.seccion);
                    cambioDeSeccion();
                    setTimeout(() => window.scrollTo(0, ant.scroll), 100);
                }
                return;
            }

            const targetIdStr = parseInt(codigo.substring(1), 10).toString();
            
            historialNavegacion.push({
                seccion: document.getElementById("seccionFilter").value,
                scroll: window.scrollY,
                visibilidad: new Set(seccionesVisibles)
            });

            seccionesVisibles = new Set([targetIdStr]);
            actualizarSelectorSecciones(targetIdStr);
            cambioDeSeccion();
            window.scrollTo(0, 0);
        };

        // 2. INICIALIZACIÓN
        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                fechaTrabajo = urlParams.get('fecha') || new Date().toISOString().split('T')[0]; 
                numGradoActual = (urlParams.get('num') || "1").toString();
                const secUrl = (urlParams.get('sec') || "1").toString();
                
                await cargarDatos();
                
                seccionesVisibles = (parseInt(secUrl) > 3) ? new Set([secUrl]) : new Set(["1", "2", "3"]);
                ejecutarCargaRitual(numGradoActual, secUrl);
            } catch (e) { console.error("Error inicializando:", e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
                fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grado] || "Ritual";
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function actualizarSelectorSecciones(idSel) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(sec => {
                const id = sec.getAttribute("id");
                if (seccionesVisibles.has(id)) {
                    sSel.add(new Option(sec.getAttribute("titulo"), id));
                }
            });
            sSel.value = idSel;
        }

        function cambioDeSeccion() {
            const sSel = document.getElementById("seccionFilter");
            if (!sSel.value) return;

            const sId = sSel.value;
            const oSel = document.getElementById("oficialFilter");
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            
            const ofis = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofis.add(p.getAttribute("oficial").trim());
                });
            }

            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(i => {
                const sigla = i.getAttribute("sigla");
                if (ofis.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "";
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach((paso, i) => {
                    const ofi = paso.getAttribute("oficial") || "Ofi";
                    const idL = `l-${sId}-${i}`;
                    let txt = paso.getAttribute("texto") || paso.textContent;

                    // Procesar LINKS
                    txt = txt.replace(/\[\[LINK:(\d{3})(?::([^\]]+))?\]\]/g, (m, cod, desc) => {
                        const tId = parseInt(cod.substring(1), 10).toString();
                        const target = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") === tId);
                        const label = desc || (target ? target.getAttribute("titulo") : "Ir");
                        return `<span class="nav-link-container"><button class="btn-ritual" onclick="irA('${cod}')">${label} ➜</button></span>`;
                    });

                    txt = txt.replace("[[VOLVER]]", `<span class="nav-link-container"><button class="btn-ritual" onclick="irA('VOLVER')">⬅ Regresar</button></span>`);
                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');

                    const esOfi = ofiSel && ofi === ofiSel;
                    html += `<dt>${ofi}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
                });
            });
            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;
        }
    </script>
</body>
</html>
