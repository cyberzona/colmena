<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.2; color: #000; margin: 0; padding: 10px; background-color: #fff; }
        
        /* BLOQUE DE IDENTIDAD */
        .identity-container {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }
        .logo-mini { width: 55px; height: auto; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.2rem; font-weight: bold; color: #000; }
        .line-rito { font-size: 0.85rem; text-transform: uppercase; color: #444; font-weight: bold; }

        /* IDENTIFICADOR DE GRADO (Dinámico) */
        #grado-actual-label {
            display: block;
            font-size: 1rem;
            font-weight: bold;
            color: #b71c1c; /* Color distintivo para el grado */
            text-transform: uppercase;
            margin-bottom: 5px;
            border-left: 3px solid #b71c1c;
            padding-left: 8px;
        }

        /* PANEL DE SELECCIÓN PERSISTENTE */
        .sticky-controls {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1000;
            padding: 10px 0;
            border-bottom: 2px solid #000;
        }

        #control-panel { 
            display: flex; 
            gap: 10px; 
            align-items: flex-end;
        }
        
        .container-select { display: flex; flex-direction: column; }
        .select-label { font-size: 0.65rem; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
        
        .container-seccion { flex: 2; }
        .select-seccion { 
            width: 100%; 
            padding: 10px; 
            font-size: 1.2rem; 
            font-weight: bold;
            border: 2px solid #000; 
            border-radius: 8px;
            background-color: #fcfcfc;
        }

        .container-oficial { flex: 1; }
        .select-oficiales { 
            width: 100%; 
            padding: 10px; 
            font-size: 1rem; 
            border: 1px solid #999; 
            border-radius: 8px;
        }

        /* ESTILOS DE TEXTO */
        #rituales-content { margin-top: 10px; }
        .apartado-header { background: #333; color: #fff; padding: 6px 12px; margin-top: 25px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; border-radius: 4px; }
        dt { font-weight: bold; color: #000; margin-top: 20px; font-size: 1.15rem; }
        dd { margin-left: 45px; border-left: 2px solid #ddd; padding-left: 12px; position: relative; margin-bottom: 8px; counter-increment: line-counter; text-align: justify; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #888; font-size: 0.8rem; font-weight: bold; width: 30px; text-align: right; top: 2px; }
        
        .sigla-texto-azul { color: #0056b3; font-weight: bold; }
        .line-exec { display: block; font-style: italic; font-size: 0.95em; color: #555; margin: 6px 0; padding-left: 10px; border-left: 2px solid #eee; }
        .resaltado { background-color: #fff9c4 !important; border-left: 4px solid #fbc02d !important; }

        .nav-link-container { display: block; margin: 20px 0; text-align: left; }
        .btn-ritual { background: #222 !important; color: #fff !important; border: none; padding: 12px 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 50px; }
        .btn-instancia-exec { background: #555; color: white; border: none; padding: 10px 25px; margin: 5px 0; cursor: pointer; font-weight: bold; border-radius: 50px; }
    </style>
</head>
<body onload="inicializar()">

    <div class="identity-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span class="line-rito">Rito Escocés Antiguo y Aceptado</span>
        </div>
    </div>

    <div class="sticky-controls">
        <span id="grado-actual-label">Cargando Ritual...</span>
        <div id="control-panel">
            <div class="container-select container-seccion">
                <span class="select-label">Sección</span>
                <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
            </div>
            <div class="container-select container-oficial">
                <span class="select-label">Oficial</span>
                <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
            </div>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1", fechaTrabajo = "";
        let seccionesVisibles = new Set(["1", "2", "3"]);
        let historialNavegacion = [];

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                fechaTrabajo = urlParams.get('fecha') || new Date().toISOString().split('T')[0]; 
                numGradoActual = (urlParams.get('num') || "1").toString();
                
                // Actualizar la etiqueta del grado
                const labelGrado = document.getElementById("grado-actual-label");
                if(numGradoActual === "1") labelGrado.textContent = "Ritual de Aprendiz";
                else if(numGradoActual === "2") labelGrado.textContent = "Ritual de Compañero";
                else if(numGradoActual === "3") labelGrado.textContent = "Ritual de Maestro";

                await cargarDatos();
                const secUrl = (urlParams.get('sec') || "1").toString();
                if (parseInt(secUrl) > 3) seccionesVisibles.add(secUrl);
                ejecutarCargaRitual(numGradoActual, secUrl);
            } catch (e) { console.error("Error:", e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
                fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            if (ritualActivo) {
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function actualizarSelectorSecciones(idSel) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(sec => {
                const id = sec.getAttribute("id");
                if (id === "1" || id === "2" || id === "3" || seccionesVisibles.has(id)) {
                    sSel.add(new Option(sec.getAttribute("titulo"), id));
                }
            });
            sSel.value = idSel;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter");
            const ofiPrevio = oSel.value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const ofis = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofis.add(p.getAttribute("oficial").trim());
                });
            }
            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(i => {
                const sigla = i.getAttribute("sigla");
                if (ofis.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            if (ofis.has(ofiPrevio)) oSel.value = ofiPrevio;
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;
            let html = "";
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach((paso, i) => {
                    const ofi = (paso.getAttribute("oficial") || "Ofi").trim();
                    const idL = `l-${sId}-${i}`;
                    let txt = (paso.getAttribute("texto") || paso.textContent).trim();
                    txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (match, cod, titulo) => {
                        return `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${cod}')">${titulo || 'Ir'} ➜</button></div>`;
                    });
                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    const esOfi = ofiSel && ofi === ofiSel;
                    html += `<dt>${ofi}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
                });
            });
            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;
        }
        
        // Función irA y resto de lógica necesaria...
        window.irA = function(codigo) {
            const targetIdStr = codigo.replace(/\D/g, '');
            seccionesVisibles.add(targetIdStr);
            actualizarSelectorSecciones(targetIdStr);
            cambioDeSeccion();
            window.scrollTo(0, 0);
        };
    </script>
</body>
</html>
