<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.4; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; border-bottom: 2px solid #5d4037; padding-bottom: 10px; }
        .logia-info { display: flex; flex-direction: column; }
        .logia-linea1 { font-size: 0.75rem; color: #8d6e63; letter-spacing: 0.5px; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        #control-panel { background: #d7ccc8; padding: 12px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; }
        .container-select { display: flex; flex-direction: column; width: 48%; }
        select { padding: 8px; font-size: 0.9em; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; width: 100%; }
        .select-label { font-size: 0.7rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        dt { font-weight: bold; color: #5d4037; margin-top: 15px; }
        dd { margin-left: 50px; border-left: 3px solid #d7ccc8; padding-left: 12px; position: relative; margin-bottom: 10px; counter-increment: line-counter; }
        dd::before { content: counter(line-counter); position: absolute; left: -45px; color: #5d4037; font-size: 1.1em; font-weight: 800; width: 35px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 0.9em; border-bottom: 1px solid #d7ccc8; text-align: right; margin-top: 20px; }
        .btn-ritual { border: none; padding: 10px; border-radius: 20px; cursor: pointer; font-size: 0.8em; margin-top: 10px; font-weight: bold; display: block; }
        .color-cafe { background: #5d4037; color: #fff; }
        .accion-texto { font-style: italic; color: #5d4037; }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="logia-linea1">Resp∴ Log∴ Simb∴ Colmena Nº 8</span>
            <span id="titulo-ritual-header">Iniciando sistema...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1";

        async function inicializar() {
            try {
                const loaded = await cargarDatos();
                if (!loaded) return;

                const urlParams = new URLSearchParams(window.location.search);
                
                // 1. Grado
                let g = urlParams.get('num');
                if (g) numGradoActual = g.toString();
                
                // 2. Sección (Limpia "01" a "1")
                let s = urlParams.get('sec');
                if (s) s = s.replace(/^0+/, "") || "1";

                console.log("Buscando Grado:", numGradoActual, "Sección:", s);
                ejecutarCargaRitual(numGradoActual, s);
            } catch (e) { 
                console.error(e);
                document.getElementById("titulo-ritual-header").textContent = "Error de carga";
            }
        }

        async function cargarDatos() {
            try {
                const [glosario, liturgia, tenidas] = await Promise.all([
                    fetch('glosario.xml').then(r => r.text()),
                    fetch('liturgia.xml').then(r => r.text()),
                    fetch('tenidas.xml').then(r => r.text()).catch(() => null)
                ]);
                const parser = new DOMParser();
                glosarioDoc = parser.parseFromString(glosario, "text/xml");
                xmlDoc = parser.parseFromString(liturgia, "text/xml");
                if (tenidas) tenidasXml = parser.parseFromString(tenidas, "text/xml");
                return true;
            } catch (err) {
                console.error("Error archivos:", err);
                return false;
            }
        }

        function ejecutarCargaRitual(grado, seccionID) {
            const rituales = Array.from(xmlDoc.getElementsByTagName("ritual"));
            // Buscamos ignorando tipos de datos
            ritualActivo = rituales.find(r => String(r.getAttribute("grado")) === String(grado));

            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grado] || "Ritual";
                
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            } else {
                document.getElementById("titulo-ritual-header").textContent = "Grado " + grado + " no encontrado";
            }
        }

        function actualizarSelectorSecciones(idForzado) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            const secciones = Array.from(ritualActivo.getElementsByTagName("seccion"));
            
            secciones.forEach(sec => {
                const id = sec.getAttribute("id");
                // Forzamos que siempre aparezcan las básicas o la solicitada
                if (["1", "2", "3"].includes(id) || id === idForzado) {
                    sSel.add(new Option(sec.getAttribute("titulo"), id));
                }
            });
            
            if (idForzado) sSel.value = idForzado;
            // Si el valor forzado no existe en el combo, seleccionamos el primero
            if (sSel.selectedIndex === -1) sSel.selectedIndex = 0;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter");
            
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const oficialesSet = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => {
                    const ofi = p.getAttribute("oficial");
                    if (ofi) oficialesSet.add(ofi.trim().toLowerCase());
                });
            }

            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(item => {
                const sigla = item.getAttribute("sigla").toLowerCase();
                if (oficialesSet.has(sigla)) oSel.add(new Option(item.getAttribute("sigla") + "∴", sigla));
            });
            
            renderizarLiturgia();
            window.scrollTo(0, 0);
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const fOfi = document.getElementById("oficialFilter").value;
            const contenedor = document.getElementById('rituales-content');
            
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "";
            let counter = 0;

            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach(paso => {
                    counter++;
                    const ofi = paso.getAttribute("oficial");
                    let txt = paso.getAttribute("texto") || "";
                    const idL = `l-${sId}-${counter}`;

                    // LINK
                    txt = txt.replace(/\[\[LINK:(\d{3})(?::([^\]]+))?\]\]/g, (m, cod, desc) => {
                        return `<button class="btn-ritual color-cafe" onclick="irA('${cod}', '${idL}')">${desc || 'Ir'} ➜</button>`;
                    });

                    // Siglas y Estilos
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    if (txt.startsWith('[')) txt = `<span class="accion-texto">${txt}</span>`;

                    const res = (fOfi && ofi.toLowerCase() === fOfi) ? 'class="resaltado"' : "";
                    html += `<dt>${ofi}∴</dt><dd ${res} id="${idL}">${txt}</dd>`;
                });
            });
            contenedor.innerHTML = `<div style="counter-reset: line-counter;">${html}</div>`;
        }

        function irA(codigo, regreso) {
            if (regreso) localStorage.setItem('regreso', regreso);
            const g = codigo[0];
            const s = parseInt(codigo.substring(1), 10).toString();
            
            if (g !== numGradoActual) {
                window.location.href = "rituales.html?num=" + g + "&sec=" + s;
            } else {
                actualizarSelectorSecciones(s);
                cambioDeSeccion();
            }
        }
    </script>
</body>
</html>
