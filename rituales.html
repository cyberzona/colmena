<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.2; color: #000; margin: 0; padding: 10px; background-color: #fff; }
        
        /* IDENTIDAD */
        .identity-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
        }
        .logo-mini { width: 50px; height: auto; }
        .line-logia { font-size: 1.2rem; font-weight: bold; }
        
        /* TÍTULO DEL RITUAL */
        #titulo-ritual-header {
            display: block;
            font-size: 1.4rem;
            font-weight: 900;
            text-transform: uppercase;
            margin: 5px 0 10px 0;
            color: #000;
        }

        /* PANEL DE CONTROL PERSISTENTE */
        .sticky-controls {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1000;
            padding: 5px 0 10px 0;
            border-bottom: 2px solid #000;
        }

        #control-panel { 
            display: flex; 
            gap: 8px; 
            align-items: stretch; /* Asegura misma altura */
        }
        
        .container-select { display: flex; flex-direction: column; }
        .select-label { font-size: 0.65rem; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        
        /* Selectores con misma altura */
        .select-seccion, .select-oficiales {
            height: 45px; 
            box-sizing: border-box;
            border: 1px solid #000;
            border-radius: 6px;
            font-family: inherit;
        }

        .container-seccion { flex: 2; }
        .select-seccion { 
            width: 100%; 
            padding: 0 10px;
            font-size: 1.1rem; 
            font-weight: bold;
            background-color: #f9f9f9;
        }

        .container-oficial { flex: 1; }
        .select-oficiales { 
            width: 100%; 
            padding: 0 5px;
            font-size: 0.95rem; 
            background-color: #fff;
        }

        /* TEXTO RITUAL */
        #rituales-content { margin-top: 15px; }
        .apartado-header { background: #333; color: #fff; padding: 6px 12px; margin-top: 25px; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }
        dt { font-weight: bold; color: #000; margin-top: 18px; font-size: 1.1rem; }
        dd { margin-left: 45px; border-left: 2px solid #ddd; padding-left: 12px; position: relative; margin-bottom: 6px; counter-increment: line-counter; text-align: justify; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #999; font-size: 0.75rem; font-weight: bold; width: 30px; text-align: right; top: 2px; }
        
        .sigla-texto-azul { color: #0056b3; font-weight: bold; }
        .line-exec { display: block; font-style: italic; color: #555; margin: 4px 0; padding-left: 8px; border-left: 2px solid #eee; }
        .resaltado { background-color: #fff9c4 !important; border-left: 4px solid #fbc02d !important; }

        /* BOTONES REDONDEADOS */
        .nav-link-container { display: block; margin: 15px 0; text-align: left; }
        .btn-ritual { 
            background: #222 !important; color: #fff !important; 
            border: none; padding: 10px 22px; 
            cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; 
            border-radius: 50px;
        }
    </style>
</head>
<body onload="inicializar()">

    <div class="identity-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <span class="line-logia">RLS∴ COLMENA # 8</span>
    </div>

    <div class="sticky-controls">
        <span id="titulo-ritual-header">RITUAL</span>
        <div id="control-panel">
            <div class="container-select container-seccion">
                <span class="select-label">Sección</span>
                <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
            </div>
            <div class="container-select container-oficial">
                <span class="select-label">Oficial</span>
                <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
            </div>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, ritualActivo;
        let numGradoActual = "1";

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                numGradoActual = (urlParams.get('num') || "1").toString();
                
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Ritual de Maestro" };
                document.getElementById("titulo-ritual-header").textContent = (titulos[numGradoActual] || "Ritual").toUpperCase();

                await cargarDatos();
                ejecutarCargaRitual(numGradoActual, "1");
            } catch (e) { console.error(e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgia.xml?v=${v}`).then(r => r.text())
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
        }

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            if (ritualActivo) {
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function actualizarSelectorSecciones(idSel) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(sec => {
                sSel.add(new Option(sec.getAttribute("titulo"), sec.getAttribute("id")));
            });
            sSel.value = idSel;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter");
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const ofis = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofis.add(p.getAttribute("oficial").trim());
                });
            }
            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(i => {
                const sigla = i.getAttribute("sigla");
                if (ofis.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;
            let html = "";
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach((paso, i) => {
                    const ofi = (paso.getAttribute("oficial") || "Ofi").trim();
                    let txt = (paso.getAttribute("texto") || paso.textContent).trim();
                    txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (m, cod, tit) => 
                        `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${cod}')">${tit || 'Ir'} ➜</button></div>`);
                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    const esOfi = ofiSel && ofi === ofiSel;
                    html += `<dt>${ofi}∴</dt><dd class="${esOfi ? 'resaltado' : ''}">${txt}</dd>`;
                });
            });
            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;
        }

        window.irA = function(codigo) {
            const targetId = codigo.replace(/\D/g, '');
            actualizarSelectorSecciones(targetId);
            cambioDeSeccion();
            window.scrollTo(0, 0);
        };
    </script>
</body>
</html>
