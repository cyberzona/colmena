<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritual Colmena No. 8</title>
    <style>
        :root { --oro: #A87C00; --cafe: #5d4037; --fondo: #fdfbf7; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--fondo); color: #333; }
        
        /* MODO SCROLL (Default) */
        .interfaz-completa { padding: 20px; max-width: 800px; margin: auto; }
        .seccion-titulo { text-align: center; color: var(--cafe); border-bottom: 2px solid var(--oro); padding-bottom: 10px; }
        .parte-titulo { color: var(--oro); margin-top: 30px; border-left: 4px solid var(--oro); padding-left: 10px; font-size: 1.1em; }
        .acto-fila { padding: 12px; border-bottom: 1px solid #eee; line-height: 1.4; transition: 0.3s; }
        .resaltado-temporal { background-color: rgba(168, 124, 0, 0.15); border-left: 5px solid var(--oro); border-radius: 4px; }
        .acotacion { color: #7f8c8d; font-style: italic; font-size: 0.95em; }

        /* MODO FOCUS (Valor Pesado) */
        body.modo-focus-activo .interfaz-completa { display: none; }
        #vista-focus { 
            display: none; height: 100vh; width: 100vw; 
            align-items: center; justify-content: center; background: #1a1a1a; 
        }
        body.modo-focus-activo #vista-focus { display: flex; }
        .card-focus { 
            background: white; padding: 40px; border-radius: 12px; 
            max-width: 600px; width: 85%; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-top: 10px solid var(--oro);
        }
        .actor-focus { font-size: 1.5em; color: var(--cafe); font-weight: bold; display: block; margin-bottom: 20px; }
        .texto-focus { font-size: 1.9em; line-height: 1.3; color: #111; }
        .btn-volver { margin-top: 30px; padding: 10px 20px; background: var(--oro); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="interfaz-completa">
        <div id="rituales-content">Cargando Codex Alvearis...</div>
    </div>

    <div id="vista-focus">
        <div id="card-render" class="card-focus"></div>
    </div>

    <script>
        let xmlDoc = null;

        async function iniciar() {
            const params = new URLSearchParams(window.location.search);
            const libroId = params.get('num') || '1';
            const seccionId = params.get('sec') || '1';
            const actoPos = params.get('act'); 
            const modo = params.get('do') || 'scroll'; // 'scroll' es el default

            try {
                // Nombre corregido a liturgia.xml
                const response = await fetch('liturgia.xml'); 
                if (!response.ok) throw new Error("Archivo XML no encontrado");
                
                const text = await response.text();
                xmlDoc = new DOMParser().parseFromString(text, "text/xml");

                if (modo === 'focus' && actoPos) {
                    renderFocus(libroId, seccionId, actoPos);
                } else {
                    renderScroll(libroId, seccionId, actoPos);
                }
            } catch (e) {
                document.getElementById('rituales-content').innerHTML = 
                    `<div style="color:red; text-align:center; padding:50px;">
                        <strong>Error: No se pudo cargar 'liturgia.xml'</strong><br>
                        Verifica que el archivo esté en la misma carpeta que este HTML.
                    </div>`;
            }
        }

        function obtenerActo(libro, sec, pos) {
            const ritual = xmlDoc.querySelector(`ritual[libro="${libro}"]`);
            const seccion = ritual?.querySelector(`seccion[id="${sec}"]`);
            const actos = seccion?.querySelectorAll('acto');
            return actos ? actos[parseInt(pos) - 1] : null;
        }

        function formatearTexto(texto) {
            // Convierte [instrucciones] en itálicas grises
            return texto.replace(/\[(.*?)\]/g, '<span class="acotacion">[$1]</span>');
        }

        function renderFocus(libro, sec, pos) {
            const acto = obtenerActo(libro, sec, pos);
            if (!acto) {
                alert("Acto no encontrado para el modo focus.");
                return renderScroll(libro, sec, null);
            }

            document.body.classList.add('modo-focus-activo');
            const actor = acto.getAttribute('actor');
            const tema = formatearTexto(acto.getAttribute('tema'));

            document.getElementById('card-render').innerHTML = `
                <span class="actor-focus">${actor}∴</span>
                <div class="texto-focus">${tema}</div>
                <button class="btn-volver" onclick="window.location.search='?num=${libro}&sec=${sec}&act=${pos}'">
                    Regresar al contexto
                </button>
            `;
        }

        function renderScroll(libro, sec, actoDestino) {
            const ritual = xmlDoc.querySelector(`ritual[libro="${libro}"]`);
            const seccion = ritual?.querySelector(`seccion[id="${sec}"]`);
            if (!seccion) {
                document.getElementById('rituales-content').innerHTML = "Sección no encontrada.";
                return;
            }

            let html = `<h1 class="seccion-titulo">${seccion.getAttribute('titulo')}</h1>`;
            const partes = seccion.querySelectorAll('parte');
            let contadorGlobal = 1;

            partes.forEach(parte => {
                html += `<h2 class="parte-titulo">${parte.getAttribute('titulo')}</h2>`;
                parte.querySelectorAll('acto').forEach(acto => {
                    const actor = acto.getAttribute('actor');
                    const tema = formatearTexto(acto.getAttribute('tema'));
                    const esDestino = (contadorGlobal == actoDestino) ? 'resaltado-temporal' : '';

                    html += `
                        <div id="acto-${contadorGlobal}" class="acto-fila ${esDestino}">
                            <strong>${actor}∴</strong> — ${tema}
                        </div>`;
                    contadorGlobal++;
                });
            });

            document.getElementById('rituales-content').innerHTML = html;

            // Desplazamiento automático al punto resaltado
            if (actoDestino) {
                setTimeout(() => {
                    const el = document.getElementById(`acto-${actoDestino}`);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 400);
            }
        }

        window.onload = iniciar;
    </script>
</body>
</html>
