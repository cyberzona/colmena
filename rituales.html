<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex Alvearis v40 - Portal de Rituales</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 220px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 100px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { font-style: italic; font-size: 0.95em; color: rgba(0, 0, 0, 0.4); font-weight: normal; margin-left: 3px; }
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }
        
        /* Contenedor de texto con margen para numeración v19 */
        dd { margin-left: 55px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; text-justify: inter-word; hyphens: auto; }
        
        /* Numeración de Alto Impacto Estilo v19 */
        dd::before { 
            content: counter(line-counter); 
            position: absolute; 
            left: -48px; 
            color: #5d4037; 
            font-family: Arial, Helvetica, sans-serif; 
            font-size: 1.5em; 
            font-weight: 900; 
            line-height: 0.8; 
            width: 40px; 
            text-align: right; 
            opacity: 0.8; 
        }

        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-ritual, .btn-instancia-exec { border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.85em; margin: 4px 0; font-weight: bold; display: table !important; background: #A87C00 !important; color: #ffffff !important; text-decoration: none; text-align: center; width: auto !important; max-width: fit-content; box-sizing: border-box; }
        .instancia-botones { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        
        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .visor-close { position: absolute; top: 8px; right: 8px; background: #ff0000; color: #ffffff; border: 2px solid #ffffff; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 2001; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="inicializarPortal()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="gestionarCambioSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>
    <div id="rituales-content"></div>

    <script>
        /**
         * CANON ALVEARIS v40 - REVISIÓN ESTABLE
         */
        let RitualActual, GlosarioMaestro, BitacoraEventos;
        let gradoActivo = "1", fechaSesion = "";
        let SeccionesDesbloqueadas = new Set(["1", "2", "3"]);
        let PilaNavegacion = [];

        window.irA = function(codigoDestino) {
            if (!RitualActual) return;
            if (codigoDestino === 'VOLVER') {
                if (PilaNavegacion.length > 0) {
                    const estadoAnterior = PilaNavegacion.pop();
                    SeccionesDesbloqueadas = estadoAnterior.visibilidad;
                    actualizarSelectorSecciones(estadoAnterior.seccion);
                    gestionarCambioSeccion();
                    setTimeout(() => window.scrollTo(0, estadoAnterior.scroll), 150);
                } else {
                    const urlRetorno = sessionStorage.getItem('puntoRetornoLogia');
                    if (urlRetorno) {
                        sessionStorage.removeItem('puntoRetornoLogia');
                        window.location.href = urlRetorno;
                    }
                }
                return;
            }
            const idDestino = codigoDestino.length === 3 ? parseInt(codigoDestino.substring(1), 10).toString() : codigoDestino.replace(/\D/g, '');
            PilaNavegacion.push({
                seccion: document.getElementById("seccionFilter").value,
                scroll: window.scrollY,
                visibilidad: new Set(SeccionesDesbloqueadas)
            });
            SeccionesDesbloqueadas.add(idDestino);
            actualizarSelectorSecciones(idDestino);
            gestionarCambioSeccion();
            window.scrollTo(0, 0);
        };

        async function inicializarPortal() {
            try {
                const parametros = new URLSearchParams(window.location.search);
                fechaSesion = parametros.get('fecha') || new Date().toISOString().split('T')[0]; 
                gradoActivo = (parametros.get('num') || "1").toString();
                const seccionInicial = (parametros.get('sec') || "1").toString();
                
                await cargarArchivosBase();
                if (parseInt(seccionInicial) > 3) SeccionesDesbloqueadas.add(seccionInicial);
                
                const oficialPersistente = sessionStorage.getItem('oficialRetornoLogia');
                
                if (RitualActual) {
                    const DiccionarioTitulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                    document.getElementById("titulo-ritual-header").textContent = DiccionarioTitulos[gradoActivo] || "Ritual";
                    
                    actualizarSelectorSecciones(seccionInicial);
                    if (oficialPersistente) document.getElementById("oficialFilter").dataset.oficialPendiente = oficialPersistente;
                    
                    gestionarCambioSeccion();
                }

                setTimeout(() => {
                    const ancla = window.location.hash;
                    if (ancla) {
                        const destino = document.querySelector(ancla);
                        if (destino) { destino.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
                    }
                    const elementoResaltado = document.querySelector('.resaltado');
                    if (elementoResaltado) elementoResaltado.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 800);
            } catch (error) { console.error("Error Alvearis Portal:", error); }
        }

        async function cargarArchivosBase() {
            const marcaTiempo = new Date().getTime(); 
            const lector = url => fetch(`${url}?v=${marcaTiempo}`).then(r => r.text());
            const [dataGlosario, dataLiturgia, dataEventos] = await Promise.all([
                lector('glosario.xml'),
                lector('liturgia.xml'),
                lector('tenidas.xml').catch(() => '<bitacora/>')
            ]);
            const procesador = new DOMParser();
            GlosarioMaestro = procesador.parseFromString(dataGlosario, "text/xml");
            BitacoraEventos = procesador.parseFromString(dataEventos, "text/xml");
            const xmlCompleto = procesador.parseFromString(dataLiturgia, "text/xml");
            RitualActual = Array.from(xmlCompleto.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === gradoActivo);
        }

        function actualizarSelectorSecciones(idSeleccionada) {
            const comboSeccion = document.getElementById("seccionFilter");
            comboSeccion.innerHTML = "";
            Array.from(RitualActual.getElementsByTagName("seccion")).forEach(nodoSeccion => {
                const id = nodoSeccion.getAttribute("id");
                if (id === "1" || id === "2" || id === "3" || SeccionesDesbloqueadas.has(id)) {
                    comboSeccion.add(new Option(nodoSeccion.getAttribute("titulo"), id));
                }
            });
            comboSeccion.value = idSeleccionada;
        }

        function gestionarCambioSeccion() {
            const idActual = document.getElementById("seccionFilter").value;
            const comboOficial = document.getElementById("oficialFilter");
            const oficialPrevio = comboOficial.value || comboOficial.dataset.oficialPendiente || "";
            delete comboOficial.dataset.oficialPendiente;

            const nodoSeccion = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idActual);
            const OficialesPresentes = new Set();
            if (nodoSeccion) {
                Array.from(nodoSeccion.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) OficialesPresentes.add(p.getAttribute("oficial").trim());
                });
            }

            comboOficial.innerHTML = '<option value="">---</option>';
            Array.from(GlosarioMaestro.getElementsByTagName("item")).forEach(itemGlosario => {
                const sigla = itemGlosario.getAttribute("sigla");
                if (OficialesPresentes.has(sigla)) comboOficial.add(new Option(sigla + "∴", sigla));
            });

            if (OficialesPresentes.has(oficialPrevio)) comboOficial.value = oficialPrevio;
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const idSeccion = document.getElementById("seccionFilter").value;
            const oficialSeleccionado = document.getElementById("oficialFilter").value;
            const nodoSeccion = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idSeccion);
            if (!nodoSeccion) return;

            let bufferHtml = "";
            Array.from(nodoSeccion.getElementsByTagName("apartado")).forEach(nodoApartado => {
                bufferHtml += `<div class="apartado-header">${nodoApartado.getAttribute("titulo")}</div>`;
                Array.from(nodoApartado.getElementsByTagName("paso")).forEach((nodoPaso, indice) => {
                    const oficialPaso = (nodoPaso.getAttribute("oficial") || "Ofi").trim();
                    const idLinea = `l-${idSeccion}-${indice}`;
                    let textoPaso = (nodoPaso.getAttribute("texto") || nodoPaso.textContent).trim();
                    let MapaBotones = "";

                    // 1. Marcadores de Navegación e Instancia
                    textoPaso = textoPaso.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (match, codigo, etiqueta) => {
                        let nombreLink = etiqueta ? etiqueta.trim() : "";
                        if (!nombreLink) {
                            const tId = codigo.length === 3 ? parseInt(codigo.substring(1), 10).toString() : codigo;
                            const tNodo = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") === tId);
                            nombreLink = tNodo ? tNodo.getAttribute("titulo") : "Ir";
                        }
                        MapaBotones += `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${codigo}')">${nombreLink} ➜</button></div>`;
                        return "";
                    });

                    if (textoPaso.includes("[[VOLVER]]")) {
                        MapaBotones += `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('VOLVER')">⬅ Regresar</button></div>`;
                        textoPaso = textoPaso.replace("[[VOLVER]]", "");
                    }

                    if (textoPaso.includes("[[INSTANCIA]]")) {
                        MapaBotones += `<div class="instancia-botones">${inyectarInstanciaDinamica(oficialPaso, idSeccion, indice)}</div>`;
                        textoPaso = textoPaso.replace("[[INSTANCIA]]", "");
                    }

                    // 2. Blindaje Tipográfico y Siglas
                    let coleccionInstrucciones = [];
                    textoPaso = textoPaso.replace(/\[(.*?)\]/g, (match, contenido) => {
                        coleccionInstrucciones.push(contenido);
                        return `___TOKEN_ALVEARIS_${coleccionInstrucciones.length - 1}___`;
                    });

                    textoPaso = textoPaso.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');

                    textoPaso = textoPaso.replace(/___TOKEN_ALVEARIS_(\d+)___/g, (match, idx) => {
                        // Salida final con Paréntesis según Canon v40
                        return `<span class="line-exec">(${coleccionInstrucciones[idx]})</span>`;
                    });

                    const esOficialActivo = oficialSeleccionado && oficialPaso === oficialSeleccionado;
                    bufferHtml += `<dt>${oficialPaso}∴</dt><dd class="${esOficialActivo ? 'resaltado' : ''}" id="${idLinea}">${textoPaso}${MapaBotones}</dd>`;
                });
            });

            document.getElementById('rituales-content').innerHTML = `<dl>${bufferHtml}</dl>`;
            
            if (oficialSeleccionado) {
                setTimeout(() => {
                    const foco = document.querySelector('.resaltado');
                    if (foco) foco.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
        }

        function inyectarInstanciaDinamica(idOficial, idSec, idx) {
            if (!BitacoraEventos) return "";
            const eventoDelDia = Array.from(BitacoraEventos.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha").trim() === fechaSesion.trim());
            if (!eventoDelDia) return "";            
            
            const filtroActivo = document.getElementById("oficialFilter").value;
            let htmlInstancia = "";

            Array.from(eventoDelDia.getElementsByTagName("item")).forEach(nodoItem => {
                const tipoActo = (nodoItem.getAttribute("acto") || "").trim();
                const direccionUrl = nodoItem.getAttribute("url") || "";
                const etiquetaMemo = nodoItem.getAttribute("titulo") || "Memo";

                if (tipoActo === "balaustre" && idOficial === "Sec" && filtroActivo === "Sec") {
                    htmlInstancia += `<button class="btn-ritual" onclick="mostrarVisorExterno('${direccionUrl}')">📜: ${etiquetaMemo} ➜</button>`;
                } else if (tipoActo === "elevacion" && idOficial !== "Sec") {
                    const esCambioRitual = direccionUrl.indexOf('rituales.html') !== -1;
                    const retornoSeguro = `${window.location.pathname}?num=${gradoActivo}&sec=${idSec}&fecha=${fechaSesion}#l-${idSec}-${idx}`;
                    
                    let disparador;
                    if (esCambioRitual) {
                        const oficialActual = document.getElementById("oficialFilter").value;
                        disparador = `sessionStorage.setItem('oficialRetornoLogia', '${oficialActual}'); sessionStorage.setItem('puntoRetornoLogia', '${retornoSeguro}'); window.location.href='${direccionUrl}&fecha=${fechaSesion}'`;
                    } else {
                        disparador = `mostrarVisorExterno('${direccionUrl}')`;
                    }
                    htmlInstancia += `<button class="btn-instancia-exec" onclick="${disparador}">${etiquetaMemo}</button>`;
                }
            });
            return htmlInstancia;
        }

        function mostrarVisorExterno(url) {
            const capaBase = document.createElement('div');
            capaBase.className = 'visor-overlay';
            capaBase.innerHTML = `<div class=\"visor-content\"><button class=\"visor-close\" onclick=\"this.parentElement.parentElement.remove()\">✕</button><iframe src=\"${url}\" style=\"width:100%; height:100%; border:none;\"></iframe></div>`;
            document.body.appendChild(capaBase);
        }
    </script>
</body>
</html>
