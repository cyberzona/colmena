<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Contenedor principal de selectores (Referencia de color) */
        .contenedor-controles {
            background-color: #3e2723; /* Color café oscuro de fondo */
            padding: 20px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Estilo para las fechas: Fondo transparente para heredar el del contenedor */
        input[type="date"] {
            background-color: transparent;
            color: #d7ccc8; /* Color de texto suave para legibilidad */
            border: 1px solid rgba(215, 204, 200, 0.3);
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
            outline: none;
            transition: border 0.3s ease;
        }

        input[type="date"]:focus {
            border-color: #A87C00;
        }

        /* Ajuste del icono del calendario para fondos oscuros */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
            cursor: pointer;
        }

        /* Footer con Flechas Proporcionadas y Opuestas */
        .nav-footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 40px; 
            padding: 20px 15px; 
            border-top: 2px solid #d7ccc8; 
        }

        .btn-flecha { 
            background: #5d4037; 
            border: none; 
            width: 60px; 
            height: 60px; 
            border-radius: 12px; 
            color: #fff; 
            font-size: 2rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* Efecto activo y color resaltado */
        .btn-flecha:active { 
            transform: scale(0.9); 
            background: #A87C00; 
        }

        /* Estado deshabilitado (Para el inicio del ritual) */
        .btn-flecha:disabled { 
            background: #efebe9; 
            color: #d7ccc8; 
            cursor: default; 
            box-shadow: none; 
        }

        /* Inversión horizontal para la flecha opuesta */
        .flip-h { 
            transform: scaleX(-1); 
        }

        /* Mantiene el flip durante la animación de escala */
        .flip-h:active { 
            transform: scaleX(-1) scale(0.9); 
        }
    </style>
</head>
<body>

    <div class="contenedor-controles">
        <input type="date" id="fecha-inicio">
        <input type="date" id="fecha-fin">
    </div>

    <div class="nav-footer">
        <button id="btnAnterior" class="btn-flecha flip-h" disabled>
            ➜
        </button>
        
        <button id="btnSiguiente" class="btn-flecha" onclick="avanzarPaso()">
            ➜
        </button>
    </div>

    <script>
        let pasoActual = 0;

        function avanzarPaso() {
            pasoActual++;
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const btnAnterior = document.getElementById('btnAnterior');
            // Si el paso es mayor a 0, el botón se enciende
            if (pasoActual > 0) {
                btnAnterior.disabled = false;
            } else {
                btnAnterior.disabled = true;
            }
            
            console.log("Paso actual del ritual: " + pasoActual);
        }
    </script>

</body>
</html>
