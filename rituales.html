<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rituales</title>

<style>
body {
    background: #0d0d0d;
    color: #eee;
    font-family: Arial, sans-serif;
    padding: 20px;
}

.seccion {
    display: none;
    margin-bottom: 40px;
    padding: 15px;
    border-left: 4px solid transparent;
}

.seccion.activa {
    display: block;
    border-left: 4px solid gold;
    background: #1a1a1a;
}

a {
    color: #4da6ff;
    cursor: pointer;
    text-decoration: underline;
}
</style>
</head>

<body>

<div id="contenido"></div>

<script>
// =======================
// HISTORIAL
// =======================
let historial = [];

// =======================
// NAVEGACIÓN
// =======================
function irA(grado, seccion) {

    const actual = document.querySelector(".seccion.activa");
    if (actual) {
        historial.push({
            grado: actual.getAttribute("grado"),
            id: actual.getAttribute("id")
        });
    }

    const target = Array.from(document.querySelectorAll(".seccion"))
        .find(s =>
            s.getAttribute("grado") === grado &&
            s.getAttribute("id") === String(parseInt(seccion, 10))
        );

    if (target) {
        mostrarSeccion(target);
    } else {
        console.warn("No encontrada:", grado, seccion);
    }
}

function volver() {

    const anterior = historial.pop();
    if (!anterior) return;

    const target = Array.from(document.querySelectorAll(".seccion"))
        .find(s =>
            s.getAttribute("grado") === anterior.grado &&
            s.getAttribute("id") === anterior.id
        );

    if (target) {
        mostrarSeccion(target);
    }
}

function mostrarSeccion(target) {

    document.querySelectorAll(".seccion").forEach(s => {
        s.classList.remove("activa");
    });

    target.classList.add("activa");

    target.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });
}

// =======================
// PROCESAR TEXTO
// =======================
function procesarTexto(txt) {

    // LINKS GSS
    txt = txt.replace(/\[\[LINK:(\d)(\d{2})(?::([^\]]+))?\]\]/g,
    (match, grado, seccion, desc) => {

        const label = desc || `Ir a ${grado}.${seccion}`;

        return `<a onclick="irA('${grado}','${seccion}')">${label}</a>`;
    });

    // VOLVER
    txt = txt.replace(/\[\[VOLVER\]\]/g, () => {
        return `<a onclick="volver()">Volver</a>`;
    });

    return txt;
}

// =======================
// CARGAR XML
// =======================
async function cargarXML() {

    const res = await fetch("liturgia.xml");
    const xmlText = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText, "text/xml");

    // Validación
    const error = xml.querySelector("parsererror");
    if (error) {
        console.error("XML inválido:", error.textContent);
        return;
    }

    renderizar(xml);
}

// =======================
// RENDERIZAR
// =======================
function renderizar(xml) {

    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const secciones = xml.getElementsByTagName("seccion");

    Array.from(secciones).forEach(sec => {

        const div = document.createElement("div");
        div.className = "seccion";

        const grado = sec.getAttribute("grado") || "1";
        const id = sec.getAttribute("id");

        div.setAttribute("grado", grado);
        div.setAttribute("id", id);

        const pasos = sec.getElementsByTagName("paso");

        Array.from(pasos).forEach(paso => {

            let texto = "";

            const nodoTexto = paso.getElementsByTagName("texto")[0];

            if (nodoTexto) {
                texto = nodoTexto.textContent;
            } else {
                texto = paso.getAttribute("texto") || "";
            }

            texto = procesarTexto(texto);

            const p = document.createElement("p");
            p.innerHTML = texto;

            div.appendChild(p);
        });

        cont.appendChild(div);
    });

    // Mostrar primera sección
    const primera = document.querySelector(".seccion");
    if (primera) {
        primera.classList.add("activa");
    }
}

// =======================
// INICIO
// =======================
cargarXML();

</script>

</body>
</html>
