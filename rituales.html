<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 220px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 100px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { font-style: italic; font-size: 0.95em; color: rgba(0, 0, 0, 0.4); font-weight: normal; margin-left: 3px; }
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; text-justify: inter-word; hyphens: auto; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #5d4037; font-size: 1.0em; font-weight: 800; width: 30px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-ritual, .btn-instancia-exec { border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.85em; margin: 4px 0; font-weight: bold; display: table !important; background: #A87C00 !important; color: #ffffff !important; text-decoration: none; text-align: center; width: auto !important; max-width: fit-content; box-sizing: border-box; }
        .instancia-botones { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        
        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .visor-close { position: absolute; top: 8px; right: 8px; background: #ff0000; color: #ffffff; border: 2px solid #ffffff; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 2001; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="inicializar()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>
    <div id="rituales-content"></div>

     <script>
    /**
     * EDICTO DEL CANON ALVEARIS - v2026.3
     * Versión Final: Persistencia de Oficial y Formateo Blindado
     */

    // Variables de Estado (Estándar Canon Alvearis)
    let Liturgy, Glosry, Events; 
    let grados = "1", dateid = ""; 
    let Visibl = new Set(["1", "2", "3"]);
    let historialNavegacion = [];

    // --- NAVEGACIÓN Y PERSISTENCIA ---
    window.irA = function(codigo) {
        if (!Liturgy) return;
        
        if (codigo === 'VOLVER') {
            if (historialNavegacion.length > 0) {
                const ant = historialNavegacion.pop();
                Visibl = ant.visibilidad;
                actualizarSelectorSecciones(ant.seccion);
                cambioDeSeccion();
                setTimeout(() => window.scrollTo(0, ant.scroll), 150);
            } else {
                const retornoGrado = sessionStorage.getItem('puntoRetornoLogia');
                if (retornoGrado) {
                    sessionStorage.removeItem('puntoRetornoLogia');
                    window.location.href = retornoGrado;
                }
            }
            return;
        }

        const targetIdStr = codigo.length === 3 ? parseInt(codigo.substring(1), 10).toString() : codigo.replace(/\D/g, '');
        
        historialNavegacion.push({
            seccion: document.getElementById("seccionFilter").value,
            scroll: window.scrollY,
            visibilidad: new Set(Visibl)
        });

        Visibl.add(targetIdStr);
        actualizarSelectorSecciones(targetIdStr);
        cambioDeSeccion();
        window.scrollTo(0, 0);
    };

    // --- CARGA DE DATOS ---
    async function inicializar() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            dateid = urlParams.get('fecha') || new Date().toISOString().split('T')[0]; 
            grados = (urlParams.get('num') || "1").toString();
            const secUrl = (urlParams.get('sec') || "1").toString();

            await cargarDatos();
            
            if (parseInt(secUrl) > 3) Visibl.add(secUrl);
            
            if (Liturgy) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grados] || "Ritual";
                actualizarSelectorSecciones(secUrl);
                cambioDeSeccion();
            }

            setTimeout(() => {
                const hash = window.location.hash;
                if (hash) {
                    const target = document.querySelector(hash);
                    if (target) { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }
                }
                const el = document.querySelector('.resaltado');
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 800);
        } catch (e) { console.error("Error Alvearis Init:", e); }
    }

    async function cargarDatos() {
        const v = new Date().getTime(); 
        const fetchText = url => fetch(`${url}?v=${v}`).then(r => r.text());
        
        const [gls, lit, ten] = await Promise.all([
            fetchText('glosario.xml'),
            fetchText('liturgia.xml'),
            fetchText('tenidas.xml').catch(() => '<bitacora></bitacora>')
        ]);

        const parser = new DOMParser();
        Glosry = parser.parseFromString(gls, "text/xml");
        Events = parser.parseFromString(ten, "text/xml");
        
        const fullXml = parser.parseFromString(lit, "text/xml");
        Liturgy = Array.from(fullXml.getElementsByTagName("ritual"))
                       .find(r => r.getAttribute("grado") === grados);
    }

    // --- GESTIÓN DE INTERFAZ (Corrección de Persistencia) ---
    function actualizarSelectorSecciones(idSel) {
        const sSel = document.getElementById("seccionFilter");
        if (!sSel || !Liturgy) return;
        
        sSel.innerHTML = "";
        Array.from(Liturgy.getElementsByTagName("seccion")).forEach(sec => {
            const id = sec.getAttribute("id");
            if (id === "1" || id === "2" || id === "3" || Visibl.has(id)) {
                sSel.add(new Option(sec.getAttribute("titulo"), id));
            }
        });
        sSel.value = idSel;
    }

    window.cambioDeSeccion = function() {
        const sId = document.getElementById("seccionFilter").value;
        const oSel = document.getElementById("oficialFilter");
        
        // CORRECCIÓN: Captura el oficial antes de limpiar el selector
        const oficialPrevio = oSel.value; 

        const sectin = Array.from(Liturgy.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
        const ofisSet = new Set();
        
        if (sectin) {
            Array.from(sectin.getElementsByTagName("paso")).forEach(p => {
                if (p.getAttribute("oficial")) ofisSet.add(p.getAttribute("oficial").trim());
            });
        }
        
        oSel.innerHTML = '<option value="">---</option>';
        Array.from(Glosry.getElementsByTagName("item")).forEach(i => {
            const sigla = i.getAttribute("sigla");
            if (ofisSet.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
        });

        // CORRECCIÓN: Reasigna el oficial si aún tiene intervención
        if (oficialPrevio && ofisSet.has(oficialPrevio)) {
            oSel.value = oficialPrevio;
        }
        
        renderizarLiturgia();
    };

    // --- RENDERIZADO (Corrección de Formateo line-exec) ---
    window.renderizarLiturgia = function() {
        const sId = document.getElementById("seccionFilter").value;
        const ofiSel = document.getElementById("oficialFilter").value;
        const sectin = Array.from(Liturgy.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
        if (!sectin) return;

        let html = "";
        Array.from(sectin.getElementsByTagName("apartado")).forEach(apa => {
            html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
            
            Array.from(apa.getElementsByTagName("paso")).forEach((paso, i) => {
                const ofi = (paso.getAttribute("oficial") || "Ofi").trim();
                const idL = `l-${sId}-${i}`;
                let txt = (paso.getAttribute("texto") || paso.textContent).trim();

                // Botones dinámicos
                let botones = "";
                txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (match, cod, titulo) => {
                    let label = titulo ? titulo.trim() : "Ir ➜";
                    return `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${cod}')">${label}</button></div>`;
                });

                if (txt.includes("[[VOLVER]]")) {
                    txt = txt.replace("[[VOLVER]]", `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('VOLVER')">⬅ Regresar</button></div>`);
                }
                
                if (txt.includes("[[INSTANCIA]]")) {
                    txt = txt.replace("[[INSTANCIA]]", `<div class="instancia-botones">${procesarInstancia(ofi, sId, i)}</div>`);
                }

                // CORRECCIÓN: El formateo de corchetes se aplica antes de las siglas azules para evitar conflictos de tags
                txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                
                const esOfi = ofiSel && ofi === ofiSel;
                html += `<dt>${ofi}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
            });
        });

        document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;
        
        if (ofiSel) {
            const el = document.querySelector('.resaltado');
            if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        }
    };

    function procesarInstancia(oficialPaso, sIdActual, indexPaso) {
        if (!Events) return "";
        const tActiva = Array.from(Events.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha").trim() === dateid.trim());
        if (!tActiva) return "";            
        
        const filtroSuperior = document.getElementById("oficialFilter").value;
        let contenido = "";

        Array.from(tActiva.getElementsByTagName("item")).forEach(item => {
            const acto = (item.getAttribute("acto") || "").trim();
            const url = item.getAttribute("url") || "";
            const titulo = item.getAttribute("titulo") || "Memo";

            if (acto === "balaustre" && oficialPaso === "Sec" && filtroSuperior === "Sec") {
                contenido += `<button class="btn-ritual" onclick="abrirVisor('${url}')">📜: ${titulo} ➜</button>`;
            } else if (acto === "elevacion" && oficialPaso !== "Sec") {
                const esOtroRitual = url.indexOf('rituales.html') !== -1;
                const urlOrigen = `${window.location.href.split('?')[0]}?num=${grados}&sec=${sIdActual}&fecha=${dateid}#l-${sIdActual}-${indexPaso}`;
                const accion = esOtroRitual 
                    ? `sessionStorage.setItem('puntoRetornoLogia', '${urlOrigen}'); window.location.href='${url}&fecha=${dateid}'` 
                    : `abrirVisor('${url}')`;
                
                contenido += `<button class="btn-instancia-exec" onclick="${accion}">${titulo}</button>`;
            }
        });
        return contenido;
    }

    window.abrirVisor = function(url) {
        const overlay = document.createElement('div');
        overlay.className = 'visor-overlay';
        overlay.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
        document.body.appendChild(overlay);
    };
</script>
</body>
</html>
