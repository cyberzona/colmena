<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 100; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #8d6e63; background: #efebe9; font-size: 0.9rem; width: 100%; color: #3e2723; }
        
        .ritual-content { max-width: 800px; margin: 0 auto; padding-bottom: 50px; }
        .paso-container { margin-bottom: 12px; padding: 8px; border-radius: 4px; border-left: 3px solid transparent; transition: background 0.3s; }
        .paso-highlight { background-color: #e8f5e9; border-left-color: #2e7d32; }
        .oficial-label { font-weight: bold; color: #5d4037; display: block; margin-bottom: 2px; font-size: 0.85rem; text-transform: uppercase; }
        .texto-ritual { font-size: 1.05rem; display: block; }
        .rubrica { font-style: italic; color: #757575; font-size: 0.95rem; }
        .btn-ritual { background: #5d4037; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 5px; font-size: 0.85rem; display: inline-block; }
        .instancia-botones { margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-instancia-exec { background: #2e7d32; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        
        #loading { text-align: center; padding: 40px; font-weight: bold; color: #5d4037; }
        .tri-punto { color: #1565c0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="https://colmena8.org/wp-content/uploads/2024/02/cropped-logo-colmena-8-1.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">COLMENA No. 8</span>
            <span id="titulo-ritual-header">CARGANDO...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="filter-group">
            <select id="seccionFilter" onchange="cambioDeSeccion()"></select>
            <select id="oficialFilter" onchange="cambioDeOficial()">
                <option value="TODOS">-- Todos los Oficiales --</option>
            </select>
        </div>
    </div>

    <div id="loading">CARGANDO RITUAL...</div>
    <div id="ritual-display" class="ritual-content" style="display:none;"></div>

    <script>
        let xmlDoc = null;
        let tenidasXml = null;
        let ritualActivo = null;
        const urlParams = new URLSearchParams(window.location.search);
        const fechaTrabajo = urlParams.get('fecha') || new Date().toISOString().split('T')[0];

        // Función para manejar los saltos de sección (LINK)
       window.irA = function(idDestino) {
            const idStr = idDestino.toString();
            
            // Si es un ID de 3 dígitos (ej: 104), extraemos el grado (1)
            if (idStr.length === 3) {
                const gradoLink = idStr.charAt(0);
                // Si el grado es distinto al actual, recargamos la página completa
                if (gradoLink !== numGradoActual) {
                    window.location.href = `?num=${gradoLink}&sec=${idStr}&fecha=${fechaTrabajo}`;
                    return;
                }
            }

            // Agregamos la sección a las permitidas para que aparezca en el selector
            seccionesPermitidas.add(idStr);
            actualizarSelector();
            
            document.getElementById("seccionFilter").value = idStr;
            cambioDeSeccion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        async function cargarDatos() {
            try {
                const v = new Date().getTime();
                const [resRitual, resTenidas] = await Promise.all([
                    fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
                    fetch(`tenidas.xml?v=${v}`).then(r => r.text())
                ]);
                
                const parser = new DOMParser();
                xmlDoc = parser.parseFromString(resRitual, "text/xml");
                tenidasXml = parser.parseFromString(resTenidas, "text/xml");

                const g = urlParams.get('num') || "1";
                const s = urlParams.get('sec') || "1";
                
                inicializar(g, s);
            } catch (e) {
                document.getElementById("loading").textContent = "Error al cargar archivos XML.";
            }
        }

        function inicializar(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado.toString());

            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grado] || "Ritual";
                
                document.getElementById("loading").style.display = "none";
                document.getElementById("ritual-display").style.display = "block";

                const sFilter = document.getElementById("seccionFilter");
                const secciones = ritualActivo.getElementsByTagName("seccion");
                Array.from(secciones).forEach(s => {
                    const opt = document.createElement("option");
                    opt.value = s.getAttribute("id");
                    opt.textContent = s.getAttribute("titulo");
                    sFilter.appendChild(opt);
                });

                sFilter.value = seccionID;
                cambioDeSeccion();
            }
        }

        function cambioDeSeccion() {
            const seccionID = document.getElementById("seccionFilter").value;
            const oficialBusqueda = document.getElementById("oficialFilter").value;
            const seccionXml = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") === seccionID);
            
            const display = document.getElementById("ritual-display");
            display.innerHTML = "";

            if (!seccionXml) return;

            const todosLosPasos = Array.from(seccionXml.getElementsByTagName("paso"));
            const oficialesSet = new Set(todosLosPasos.map(p => p.getAttribute("oficial")));
            
            const oSel = document.getElementById("oficialFilter");
            const valPrevio = oSel.value;
            oSel.innerHTML = '<option value="TODOS">-- Todos los Oficiales --</option>';
            oficialesSet.forEach(of => {
                if(of) {
                    const opt = document.createElement("option");
                    opt.value = of; opt.textContent = of;
                    oSel.appendChild(opt);
                }
            });
            if (Array.from(oSel.options).some(o => o.value === valPrevio)) oSel.value = valPrevio;

            Array.from(seccionXml.getElementsByTagName("apartado")).forEach(ap => {
                const h = document.createElement("h3");
                h.style = "border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 20px; color: #5d4037;";
                h.textContent = ap.getAttribute("titulo");
                display.appendChild(h);

                Array.from(ap.getElementsByTagName("paso")).forEach(p => {
                    const of = p.getAttribute("oficial");
                    const contenedor = document.createElement("div");
                    contenedor.className = "paso-container";
                    if (oficialBusqueda !== "TODOS" && of === oficialBusqueda) contenedor.classList.add("paso-highlight");

                    let texto = (p.getAttribute("texto") || "")
                        .replace(/\[(.*?)\]/g, '<span class="rubrica">[$1]</span>')
                        .replace(/(\w+∴)/g, '<span class="tri-punto">$1</span>');

                    // Corrección para que los LINK llamen a irA()
                    texto = texto.replace(/\[\[LINK:(\d+):(.*?)\]\]/g, (match, id, label) => {
                        return `<button class="btn-ritual" onclick="irA('${id}')">${label} ➜</button>`;
                    });

                    if (texto.includes("[[INSTANCIA]]")) {
                        const btnInstancia = procesarInstancia(of);
                        texto = texto.replace("[[INSTANCIA]]", btnInstancia);
                    }

                    contenedor.innerHTML = `<span class="oficial-label">${of}:</span><span class="texto-ritual">${texto}</span>`;
                    display.appendChild(contenedor);
                });
            });

            if (oficialBusqueda !== "TODOS") {
                const primero = display.querySelector('.paso-highlight');
                if (primero) primero.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function cambioDeOficial() { cambioDeSeccion(); }

        function abrirVisor(url) {
            const overlay = document.createElement('div');
            overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;display:flex;flex-direction:column;";
            overlay.innerHTML = `
                <div style="background:#5d4037;padding:10px;text-align:right;"><button onclick="this.parentElement.parentElement.remove()" style="color:white;background:none;border:none;font-size:20px;cursor:pointer;">✕ Cerrar</button></div>
                <iframe src="${url}" style="flex-grow:1;border:none;"></iframe>`;
            document.body.appendChild(overlay);
        }

        function procesarInstancia(oficialPaso) {
            if (typeof tenidasXml === 'undefined' || !tenidasXml) return "";
            const tActiva = Array.from(tenidasXml.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha").trim() === fechaTrabajo.trim());
            if (!tActiva) return "";            
            
            const items = Array.from(tActiva.getElementsByTagName("item"));
            const filtroSuperior = document.getElementById("oficialFilter").value;
            let contenido = "";

            items.forEach(item => {
                const acto = (item.getAttribute("acto") || "").trim();
                const url = item.getAttribute("url") || "";
                const titulo = item.getAttribute("titulo") || "Trabajo";

                if (acto === "balaustre") {
                    if (oficialPaso === "Sec" && filtroSuperior === "Sec") {
                        contenido += `<button class="btn-ritual" onclick="abrirVisor('${url}')">📜: ${titulo} ➜</button>`;
                    }
                } else if (acto === "elevacion") {
                    if (oficialPaso !== "Sec") {
                        const acc = url.indexOf('rituales.html') !== -1 
                            ? `window.location.href='${url}&fecha=${fechaTrabajo}'` 
                            : `abrirVisor('${url}')`;
                        
                        contenido += `<button class="btn-instancia-exec" onclick="${acc}">${titulo}</button>`;
                    }
                }
            });
            
            return contenido ? `<div class="instancia-botones">${contenido}</div>` : "";
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
