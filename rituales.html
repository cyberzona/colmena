<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Codex Alvearis v42 - Portal de Rituales</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 220px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 100px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { font-style: italic; font-size: 0.95em; color: rgba(0, 0, 0, 0.4); font-weight: normal; margin-left: 3px; }
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }        
        dd { margin-left: 55px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; text-justify: inter-word; hyphens: auto; }
        dd::before { content: counter(line-counter); position: absolute; left: -45px; color: #666; font-size: 0.8rem; font-weight: bold; width: 35px; text-align: right; top: 2px; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-ritual, .btn-instancia-exec { border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.85em; margin: 4px 0; font-weight: bold; display: table !important; background: #A87C00 !important; color: #ffffff !important; text-decoration: none; text-align: center; width: auto !important; max-width: fit-content; box-sizing: border-box; }
        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .visor-close { position: absolute; top: 8px; right: 8px; background: #ff0000; color: #ffffff; border: 2px solid #ffffff; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 2001; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="inicializarPortal()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="gestionarCambioSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="actualizarOficialGlobal()"></select>
        </div>
    </div>
    <div id="rituales-content"></div>

    <script>
        let RitualActual, GlosarioMaestro, BitacoraEventos;
        let gradoActivo = "1", fechaSesion = "";
        let SeccionesDesbloqueadas = new Set(["1", "2", "3"]);
        let PilaNavegacion = [];

        function actualizarOficialGlobal() {
            const ofi = document.getElementById("oficialFilter").value;
            if (ofi) sessionStorage.setItem('oficialGlobalAlvearis', ofi);
            renderizarLiturgia();
        }

        async function inicializarPortal() {
            try {
                const params = new URLSearchParams(window.location.search);
                fechaSesion = params.get('fecha') || new Date().toISOString().split('T')[0];
                gradoActivo = (params.get('num') || "1").toString();
                const secIni = (params.get('sec') || "1").toString();

                await cargarArchivosBase();
                
                if (RitualActual) {
                    const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                    document.getElementById("titulo-ritual-header").textContent = titulos[gradoActivo] || "Ritual";
                    
                    if (parseInt(secIni) > 3) SeccionesDesbloqueadas.add(secIni);
                    actualizarSelectorSecciones(secIni);
                    
                    // Recuperar oficial previo
                    const ofiPrevio = sessionStorage.getItem('oficialGlobalAlvearis');
                    if (ofiPrevio) document.getElementById("oficialFilter").dataset.oficialPendiente = ofiPrevio;
                    
                    gestionarCambioSeccion();
                }
            } catch (e) { console.error("Error inicialización:", e); }
        }

        async function cargarArchivosBase() {
            const t = new Date().getTime();
            const fetcher = u => fetch(`${u}?v=${t}`).then(r => r.text());
            const [g, l, e] = await Promise.all([
                fetcher('glosario.xml'), fetcher('liturgia.xml'), 
                fetcher('tenidas.xml').catch(() => '<bitacora/>')
            ]);
            const parser = new DOMParser();
            GlosarioMaestro = parser.parseFromString(g, "text/xml");
            BitacoraEventos = parser.parseFromString(e, "text/xml");
            const xmlL = parser.parseFromString(l, "text/xml");
            RitualActual = Array.from(xmlL.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === gradoActivo);
        }

        function actualizarSelectorSecciones(sel) {
            const combo = document.getElementById("seccionFilter");
            combo.innerHTML = "";
            Array.from(RitualActual.getElementsByTagName("seccion")).forEach(s => {
                const id = s.getAttribute("id");
                if (id === "1" || id === "2" || id === "3" || SeccionesDesbloqueadas.has(id)) {
                    combo.add(new Option(s.getAttribute("titulo"), id));
                }
            });
            combo.value = sel;
        }

        function gestionarCambioSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const comboOfi = document.getElementById("oficialFilter");
            
            // Lógica de Oficial Recursivo
            const ofiObjetivo = comboOfi.dataset.oficialPendiente || comboOfi.value || sessionStorage.getItem('oficialGlobalAlvearis') || "";
            delete comboOfi.dataset.oficialPendiente;

            const nodoSec = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const ofisEnSec = new Set();
            if (nodoSec) {
                Array.from(nodoSec.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofisEnSec.add(p.getAttribute("oficial").trim());
                });
            }

            comboOfi.innerHTML = '<option value="">---</option>';
            Array.from(GlosarioMaestro.getElementsByTagName("item")).forEach(i => {
                const sigla = i.getAttribute("sigla");
                if (ofisEnSec.has(sigla)) comboOfi.add(new Option(sigla + "∴", sigla));
            });

            if (ofisEnSec.has(ofiObjetivo)) comboOfi.value = ofiObjetivo;
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const nodoSec = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!nodoSec) return;

            let html = "";
            Array.from(nodoSec.getElementsByTagName("apartado")).forEach(ap => {
                html += `<div class="apartado-header">${ap.getAttribute("titulo")}</div>`;
                Array.from(ap.getElementsByTagName("paso")).forEach((p, idx) => {
                    const ofiPaso = (p.getAttribute("oficial") || "Ofi").trim();
                    let txt = (p.getAttribute("texto") || p.textContent).trim();
                    let btns = "";

                    // Procesar Links y Volver
                    txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (m, cod, et) => {
                        btns += `<button class="btn-ritual" onclick="irA('${cod}')">${et || 'Ir'} ➜</button>`;
                        return "";
                    });
                    if (txt.includes("[[VOLVER]]")) {
                        btns += `<button class="btn-ritual" onclick="irA('VOLVER')">⬅ Regresar</button>`;
                        txt = txt.replace("[[VOLVER]]", "");
                    }
                    if (txt.includes("[[INSTANCIA]]")) {
                        btns += `<div class="instancia-botones">${inyectarInstancia(ofiPaso, sId, idx)}</div>`;
                        txt = txt.replace("[[INSTANCIA]]", "");
                    }

                    // Formatear instrucciones [...] y siglas
                    let instrs = [];
                    txt = txt.replace(/\[(.*?)\]/g, (m, c) => { instrs.push(c); return `_TKN_${instrs.length-1}_`; });
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    txt = txt.replace(/_TKN_(\d+)_/g, (m, i) => `<span class="line-exec">(${instrs[i]})</span>`);

                    const esFoco = ofiSel && ofiPaso === ofiSel;
                    html += `<dt>${ofiPaso}∴</dt><dd class="${esFoco ? 'resaltado' : ''}" id="l-${sId}-${idx}">${txt}${btns}</dd>`;
                });
            });

            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;
            if (ofiSel) {
                setTimeout(() => {
                    const el = document.querySelector('.resaltado');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            }
        }

        window.irA = function(dest) {
            const comboOfi = document.getElementById("oficialFilter");
            if (dest === 'VOLVER') {
                if (PilaNavegacion.length > 0) {
                    const ant = PilaNavegacion.pop();
                    SeccionesDesbloqueadas = ant.vis;
                    comboOfi.dataset.oficialPendiente = ant.ofi;
                    actualizarSelectorSecciones(ant.sec);
                    gestionarCambioSeccion();
                } else {
                    window.location.href = sessionStorage.getItem('puntoRetornoLogia') || 'index.html';
                }
                return;
            }
            const nId = dest.replace(/\D/g, '');
            PilaNavegacion.push({ sec: document.getElementById("seccionFilter").value, ofi: comboOfi.value, vis: new Set(SeccionesDesbloqueadas) });
            SeccionesDesbloqueadas.add(nId);
            actualizarSelectorSecciones(nId);
            gestionarCambioSeccion();
            window.scrollTo(0,0);
        };

        function inyectarInstancia(ofiP, sId, idx) {
            const tenida = Array.from(BitacoraEventos.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha") === fechaSesion);
            if (!tenida) return "";
            let res = "";
            Array.from(tenida.getElementsByTagName("item")).forEach(i => {
                const acto = i.getAttribute("acto");
                const url = i.getAttribute("url");
                const tit = i.getAttribute("titulo") || "Memo";
                if (acto === "balaustre" && ofiP === "Sec") {
                    res += `<button class="btn-ritual" onclick="abrirV('${url}')">📜: ${tit} ➜</button>`;
                } else if (acto === "elevacion" && ofiP !== "Sec") {
                    const esRit = url.indexOf('rituales.html') !== -1;
                    let act = esRit ? `sessionStorage.setItem('oficialGlobalAlvearis', '${document.getElementById("oficialFilter").value}'); window.location.href='${url}&fecha=${fechaSesion}'` : `abrirV('${url}')`;
                    res += `<button class="btn-instancia-exec" onclick="${act}">${tit}</button>`;
                }
            });
            return res;
        }

        function abrirV(url) {
            const div = document.createElement('div');
            div.className = 'visor-overlay';
            div.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
            document.body.appendChild(div);
        }
    </script>
</body>
</html>
