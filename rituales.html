<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .logo-mini { width: 65px; height: auto; }
        
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; }
        .container-select { display: flex; flex-direction: column; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        
        .select-seccion, .select-oficiales { padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #a1887f; font-weight: bold; outline: none; background: #fff; }
        .select-seccion { width: 200px; }
        .select-oficiales { width: 100px; }

        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; }
        
        dl { counter-reset: line-counter; }
        dt { font-weight: bold; color: #5d4037; margin-top: 12px; font-size: 0.9rem; }
        dd { margin-left: 55px; border-left: 3px solid #d7ccc8; padding-left: 10px; position: relative; margin-bottom: 8px; text-align: justify; counter-increment: line-counter; min-height: 1.2em; }
        dd::before { content: counter(line-counter); position: absolute; left: -45px; color: #8d6e63; font-size: 0.75rem; font-weight: bold; width: 35px; text-align: right; top: 0; }
        
        .resaltado { background: rgba(168, 124, 0, 0.12) !important; border-left: 5px solid #A87C00 !important; }
        
        .btn-ritual, .btn-instancia-exec { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; background: #A87C00 !important; color: #fff !important; margin: 4px 2px; }
        
        .nav-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; padding: 10px 15px; border-top: 1px solid #d7ccc8; }
        .btn-nav-neutro { background: transparent !important; color: #A87C00 !important; width: 45px; height: 32px; border-radius: 10px; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease; cursor: pointer; }
        .btn-nav-neutro:active { background: rgba(168, 124, 0, 0.1) !important; transform: scale(0.9); }
        .flip-h { transform: scaleX(-1); }

        .btn-cerrar-x { color: #A87C00; font-weight: bold; cursor: pointer; font-size: 1.4rem; padding: 5px; }

        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; position: relative; }
        .visor-close { position: absolute; top: -10px; right: -10px; background: #ff0000; color: #fff; border: 2px solid #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; z-index: 2001; }
    </style>
</head>
<body onload="inicializarPortal()">

    <div class="header-container">
        <img src="./images/logo-mini.png" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 250px;">
                <span id="titulo-ritual-header">Cargando...</span>
            </div>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="actualizarSeccionGlobal()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="actualizarOficialGlobal()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let RitualActual, GlosarioMaestro, BitacoraEventos;
        let gradoActivo = "1", fechaSesion = "";
        let SeccionesDesbloqueadas = new Set(["1", "2", "3"]);

        async function inicializarPortal() {
            try {
                const parametros = new URLSearchParams(window.location.search);
                fechaSesion = parametros.get('fecha') || new Date().toLocaleDateString('en-CA');
                gradoActivo = (parametros.get('num') || "1").toString();
                
                let seccionInicial = "1";
                if (gradoActivo === "1") {
                    seccionInicial = parametros.get('sec') || sessionStorage.getItem('seccionRetornoLogia') || "1";
                }

                await cargarArchivosBase();
                
                if (RitualActual) {
                    const Dic = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Ritual de Maestro" };
                    document.getElementById("titulo-ritual-header").textContent = Dic[gradoActivo];
                    
                    actualizarSelectorSecciones(seccionInicial);
                    
                    const ofiMemoria = sessionStorage.getItem('oficialRetornoLogia');
                    if (ofiMemoria) document.getElementById("oficialFilter").dataset.oficialPendiente = ofiMemoria;
                    
                    gestionarCambioSeccion();
                    
                    // Si viene de una transición, recuperamos el scroll de la memoria
                    const scrollPos = sessionStorage.getItem('lastScrollPos');
                    if(scrollPos) {
                        setTimeout(() => {
                            window.scrollTo(0, scrollPos);
                            sessionStorage.removeItem('lastScrollPos');
                        }, 400);
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function cargarArchivosBase() {
            const t = new Date().getTime();
            const f = u => fetch(`${u}?v=${t}`).then(r => r.text());
            const [dg, dl, de] = await Promise.all([f('glosario.xml'), f('liturgia.xml'), f('tenidas.xml').catch(() => '<bitacora/>')]);
            const dp = new DOMParser();
            GlosarioMaestro = dp.parseFromString(dg, "text/xml");
            BitacoraEventos = dp.parseFromString(de, "text/xml");
            const xmlLit = dp.parseFromString(dl, "text/xml");
            RitualActual = Array.from(xmlLit.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === gradoActivo);
        }

        function actualizarSelectorSecciones(sel) {
            const combo = document.getElementById("seccionFilter");
            combo.innerHTML = "";
            let existe = false;
            Array.from(RitualActual.getElementsByTagName("seccion")).forEach(s => {
                const id = s.getAttribute("id");
                if (gradoActivo !== "1" || id <= 3 || SeccionesDesbloqueadas.has(id)) {
                    combo.add(new Option(s.getAttribute("titulo"), id));
                    if (id === sel) existe = true;
                }
            });
            combo.value = existe ? sel : "1";
        }

        function actualizarSeccionGlobal() {
            if (gradoActivo === "1") sessionStorage.setItem('seccionRetornoLogia', document.getElementById("seccionFilter").value);
            gestionarCambioSeccion();
            window.scrollTo(0, 0);
        }

        function actualizarOficialGlobal() {
            sessionStorage.setItem('oficialRetornoLogia', document.getElementById("oficialFilter").value);
            renderizarLiturgia(true);
        }

        function gestionarCambioSeccion() {
            const idSec = document.getElementById("seccionFilter").value;
            const comboOfi = document.getElementById("oficialFilter");
            const ofiPendiente = comboOfi.dataset.oficialPendiente || comboOfi.value;
            delete comboOfi.dataset.oficialPendiente;

            const nodoSec = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idSec);
            const ofisEnSec = new Set();
            if (nodoSec) {
                Array.from(nodoSec.getElementsByTagName("paso")).forEach(p => {
                    if (p.getAttribute("oficial")) ofisEnSec.add(p.getAttribute("oficial").trim());
                });
            }

            comboOfi.innerHTML = '<option value="">---</option>';
            Array.from(GlosarioMaestro.getElementsByTagName("item")).forEach(i => {
                const s = i.getAttribute("sigla");
                if (ofisEnSec.has(s)) comboOfi.add(new Option(s + "∴", s));
            });

            if (ofisEnSec.has(ofiPendiente)) {
                comboOfi.value = ofiPendiente;
                renderizarLiturgia(true); 
            } else {
                renderizarLiturgia(false);
            }
        }

        function renderizarLiturgia(hacerScroll = false) {
            const idSec = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const nodoSec = Array.from(RitualActual.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == idSec);
            if (!nodoSec) return;

            let html = "";
            Array.from(nodoSec.getElementsByTagName("apartado")).forEach(apt => {
                html += `<div class="apartado-header">${apt.getAttribute("titulo")}</div>`;
                Array.from(apt.getElementsByTagName("paso")).forEach((paso, idx) => {
                    const ofiPaso = (paso.getAttribute("oficial") || "Ofi").trim();
                    let txt = (paso.getAttribute("texto") || paso.textContent).trim();
                    let btns = "";

                    if (txt.includes("[[INSTANCIA]]")) {
                        btns += inyectarInstancia(ofiPaso, idSec, idx);
                        txt = txt.replace("[[INSTANCIA]]", "");
                    }

                    txt = txt.replace(/(\b\S+∴)/gi, '<span style="color:#0277bd; font-weight:bold;">$1</span>');
                    txt = txt.replace(/\[(.*?)\]/g, '<span style="font-style:italic; color:rgba(0,0,0,0.4);">($1)</span>');

                    const esFoco = ofiSel && ofiPaso === ofiSel;
                    html += `<dt>${ofiPaso}∴</dt><dd class="${esFoco ? 'resaltado' : ''}">${txt}${btns}</dd>`;
                });
            });

            const sel = document.getElementById("seccionFilter");
            const i = sel.selectedIndex;
            let nav = `<div class="nav-footer">`;
            if (i > 0) nav += `<button class="btn-nav-neutro" onclick="navRelativa(-1)"><span class="flip-h">➤</span></button>`;
            else nav += `<span></span>`;

            if (i < sel.options.length - 1) nav += `<button class="btn-nav-neutro" onclick="navRelativa(1)">➤</button>`;
            else if (gradoActivo > "1") nav += `<button class="btn-nav-neutro" onclick="irA('VOLVER')">✖</button>`;
            else nav += `<span></span>`;
            nav += `</div>`;

            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>${nav}`;
            
            if (hacerScroll && ofiSel) {
                setTimeout(() => {
                    const el = document.querySelector('.resaltado');
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 350);
            }
        }

        function navRelativa(d) {
            const s = document.getElementById("seccionFilter");
            s.selectedIndex += d;
            actualizarSeccionGlobal();
        }

        window.irA = function(dest) {
            if (dest === 'VOLVER') {
                if (gradoActivo > "1") {
                    const secRet = sessionStorage.getItem('seccionRetornoLogia') || "1";
                    location.href = `rituales.html?num=1&fecha=${fechaSesion}&sec=${secRet}`;
                } else { location.href = 'index.html'; }
                return;
            }
            SeccionesDesbloqueadas.add(dest);
            actualizarSelectorSecciones(dest);
            gestionarCambioSeccion();
            window.scrollTo(0, 0);
        };

        function inyectarInstancia(ofiDelPaso, sec, idx) {
            const t = Array.from(BitacoraEventos.getElementsByTagName("tenida")).find(x => x.getAttribute("fecha") === fechaSesion);
            if (!t) return "";
            let h = "";
            const ofiActual = document.getElementById("oficialFilter").value;
            Array.from(t.getElementsByTagName("item")).forEach(i => {
                const acto = i.getAttribute("acto"), url = i.getAttribute("url"), tit = i.getAttribute("titulo") || "Memo";
                if (acto === "balaustre" && ofiDelPaso === "Sec" && ofiActual === "Sec") {
                    h += `<button class="btn-ritual" onclick="mostrarVisor('${url}')">📜 ${tit}</button>`;
                } else if (acto === "elevacion" && ofiDelPaso !== "Sec" && ofiActual !== "Sec") {
                    if (url.includes('rituales.html')) {
                        // Capturamos el scroll antes de la transición
                        const clickAction = `sessionStorage.setItem('lastScrollPos', window.scrollY); sessionStorage.setItem('oficialRetornoLogia', '${ofiActual}'); sessionStorage.setItem('seccionRetornoLogia', '${sec}'); window.location.href='${url}&sec=1';`;
                        h += `<button class="btn-instancia-exec" onclick="${clickAction}">${tit}</button>`;
                    } else { h += `<button class="btn-instancia-exec" onclick="mostrarVisor('${url}')">${tit}</button>`; }
                }
            });
            return h;
        }

        function mostrarVisor(url) {
            const v = document.createElement('div');
            v.className = 'visor-overlay';
            v.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
            document.body.appendChild(v);
        }
    </script>
</body>
</html>
