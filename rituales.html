<!doctype html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8">
    <title>Protected Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0"/>
    <meta http-equiv="cache-control" content="no-cache"/>
    <meta http-equiv="expires" content="0"/>
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT"/>
    <meta http-equiv="pragma" content="no-cache"/>

    <style>
    :root {
        --gold: #D4A017;
        --beige: #F5EFE6;
        --brown: #7A4F35;
        --dark: #37271E;
        --ff-medieval: 'MedievalSharp', serif;
    }

    body {
        margin: 0;
        height: 100vh;
        font-family: var(--ff-medieval), sans-serif;
        color: var(--dark);
        /* Degradado idéntico al de tu sitio principal */
        background: linear-gradient(180deg, var(--beige) 0%, #ffffff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .staticrypt-page {
        width: 100%;
        max-width: 400px;
        padding: 20px;
    }

    .staticrypt-form {
        background: #ffffff;
        border-radius: 14px; /* var(--radius) */
        padding: 40px;
        box-shadow: 0 8px 22px rgba(55, 39, 30, 0.15);
        text-align: center;
        border-top: 6px solid var(--gold);
    }

    h2 {
        color: var(--dark);
        margin-bottom: 10px;
        font-size: 1.8rem;
    }

    p {
        color: var(--brown);
        font-size: 1rem;
        margin-bottom: 25px;
    }

    .staticrypt-form input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 2px solid var(--beige);
        background: var(--beige);
        font-family: sans-serif; /* Mejor legibilidad para passwords */
        font-size: 1.1rem;
        margin-bottom: 20px;
        outline: none;
        transition: border-color 0.3s;
    }

    .staticrypt-form input:focus {
        border-color: var(--gold);
    }

    .staticrypt-form button {
        width: 100%;
        padding: 12px;
        background: var(--gold);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-family: var(--ff-medieval);
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 6px 12px rgba(212, 160, 23, 0.2);
        transition: transform 0.2s, background 0.3s;
    }

    .staticrypt-form button:hover {
        background: var(--brown);
        transform: translateY(-2px);
    }

    .staticrypt-hr {
        display: none; /* Quitamos la línea por estética limpia */
    }

    footer {
        margin-top: 20px;
        font-size: 0.8rem;
        color: var(--brown);
        opacity: 0.7;
    }
</style>
</head>

<body class="staticrypt-body">
<div class="staticrypt-page">
    <div class="staticrypt-form">
        <div class="staticrypt-instructions">
            <p class="staticrypt-title">Protected Page</p>
            <p></p>
        </div>

        <hr class="staticrypt-hr">

        <form id="staticrypt-form" action="#" method="post">
            <input id="staticrypt-password"
                   type="password"
                   name="password"
                   placeholder="password"
                   autofocus/>

            <input type="submit" class="staticrypt-decrypt-button" value="DECRYPT"/>
        </form>
    </div>

</div>
<footer class="staticrypt-footer">
</footer>
