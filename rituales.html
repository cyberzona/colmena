<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.4; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; border-bottom: 2px solid #5d4037; padding-bottom: 10px; }
        .logia-info { display: flex; flex-direction: column; text-align: left; }
        .logia-linea1 { font-size: 0.75rem; color: #8d6e63; letter-spacing: 0.5px; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; flex-shrink: 0; }
        #control-panel { background: #d7ccc8; padding: 12px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: flex-end; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container-select { display: flex; flex-direction: column; text-align: left; }
        #container-seccion { width: 65%; } #container-oficial { width: 28%; } 
        select { padding: 8px; font-size: 0.9em; border-radius: 4px; border: 1px solid #8d6e63; background: #ffffff; color: #2c2c2c; font-weight: bold; width: 100%; outline: none; }
        .select-label { font-size: 0.7rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        dt { font-weight: bold; color: #5d4037; margin-top: 15px; font-size: 0.95em; }
        dd { margin-left: 50px; border-left: 3px solid #d7ccc8; padding-left: 12px; font-size: 1em; position: relative; margin-bottom: 10px; counter-increment: line-counter; min-height: 1.2em; }
        dd::before { content: counter(line-counter); position: absolute; left: -45px; color: #5d4037; font-size: 1.2em; font-weight: 800; width: 35px; text-align: right; top: -2px; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 0.95em; border-bottom: 1px solid #d7ccc8; text-align: right; margin-top: 20px; padding-bottom: 5px; }
        .btn-ritual { border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 0.85em; margin-top: 10px; display: block; width: fit-content; font-weight: bold; }
        .color-cafe { background: #5d4037; color: #ffffff; }
        .color-gold { background: #D4AF37; color: #2c2c2c; }
        .color-verde { background: #1b5e20; color: #ffffff; }
        .accion-texto { font-style: italic; color: #5d4037; }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="logia-linea1">Resp∴ Log∴ Simb∴ Colmena Nº 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select" id="container-seccion">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select" id="container-oficial">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" onchange="renderizarLiturgia()"></select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1";

        async function inicializar() {
            try {
                await cargarDatos();
                const urlParams = new URLSearchParams(window.location.search);
                
                // 1. Obtener Grado
                const g = urlParams.get('num');
                if (g) numGradoActual = g.toString();
                
                // 2. Obtener Sección (Normalizar a número limpio)
                let s = urlParams.get('sec');
                if (s) s = parseInt(s.replace(/^0+/, "") || "1", 10).toString();
                
                cargarRitualPorGrado(numGradoActual, s);
            } catch (e) { console.error("Error al inicializar:", e); }
        }

        async function cargarDatos() {
            const fetchText = url => fetch(url).then(r => r.text());
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetchText('glosario.xml'),
                fetchText('liturgia.xml'),
                fetchText('tenidas.xml').catch(() => null)
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            if (tenidas) tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function cargarRitualPorGrado(grado, seccionInicial) {
            const rituales = Array.from(xmlDoc.getElementsByTagName("ritual"));
            ritualActivo = rituales.find(r => r.getAttribute("grado") === grado);
            
            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grado] || "Ritual";
                
                poblarSecciones(seccionInicial);
                cambioDeSeccion();
            } else {
                document.getElementById("titulo-ritual-header").textContent = "Ritual no encontrado";
            }
        }

        function poblarSecciones(idForzado) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            const secciones = Array.from(ritualActivo.getElementsByTagName("seccion"));
            
            secciones.forEach(sec => {
                const id = sec.getAttribute("id");
                // Mostramos 1, 2, 3 o la que se pida específicamente
                if (["1", "2", "3"].includes(id) || id === idForzado) {
                    sSel.add(new Option(sec.getAttribute("titulo"), id));
                }
            });
            
            if (idForzado) sSel.value = idForzado;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter");
            
            const seccionActual = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const oficiales = new Set();
            if (seccionActual) {
                Array.from(seccionActual.getElementsByTagName("paso")).forEach(p => {
                    const ofi = p.getAttribute("oficial");
                    if (ofi) oficiales.add(ofi.trim().toLowerCase());
                });
            }

            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(item => {
                const sigla = item.getAttribute("sigla").toLowerCase();
                if (oficiales.has(sigla)) oSel.add(new Option(item.getAttribute("sigla") + "∴", sigla));
            });
            
            renderizarLiturgia();
            window.scrollTo(0, 0);
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const fOfi = document.getElementById("oficialFilter").value;
            const contenedor = document.getElementById('rituales-content');
            
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "";
            let counter = 0;

            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach(paso => {
                    counter++;
                    const ofi = paso.getAttribute("oficial");
                    let txt = paso.getAttribute("texto");
                    const idL = `l-${sId}-${counter}`;

                    // LINK Lógica
                    txt = txt.replace(/\[\[LINK:(\d{3})(?::([^\]]+))?\]\]/g, (m, cod, desc) => {
                        const gD = cod[0], sD = parseInt(cod.substring(1), 10).toString();
                        let label = desc;
                        if (!label) {
                            const rDest = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === gD);
                            if (rDest) {
                                const sDest = Array.from(rDest.getElementsByTagName("seccion")).find(s => s.getAttribute("id") === sD);
                                label = sDest ? sDest.getAttribute("titulo") : "Ir";
                            }
                        }
                        return `<button class="btn-ritual color-cafe" onclick="irA('${cod}', '${idL}')">${label} ➜</button>`;
                    });

                    // Instancia, Volver, Siglas
                    if (fOfi && ofi.toLowerCase() === fOfi) txt = txt.replace(/\[\[INSTANCIA\]\]/gi, procesarInstancia(fOfi));
                    else txt = txt.replace(/\[\[INSTANCIA\]\]/gi, "");
                    
                    txt = txt.replace(/\[\[VOLVER:(\d+)\]\]/g, (m, c) => `<button class="btn-ritual color-cafe" onclick="irA('${c}')">Regresar</button>`);
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    if (txt.startsWith('[')) txt = `<span class="accion-texto">${txt}</span>`;

                    const res = (fOfi && ofi.toLowerCase() === fOfi) ? 'class="resaltado"' : "";
                    html += `<dt>${ofi}∴</dt><dd ${res} id="${idL}">${txt}</dd>`;
                });
            });
            contenedor.innerHTML = `<div style="counter-reset: line-counter;">${html}</div>`;
        }

        function irA(codigo, regreso) {
            if (regreso) localStorage.setItem('regreso', regreso);
            const g = codigo[0], s = parseInt(codigo.substring(1), 10).toString();
            
            if (g !== numGradoActual) {
                window.location.href = `?num=${g}&sec=${s}`;
            } else {
                poblarSecciones(s);
                cambioDeSeccion();
                setTimeout(() => {
                    const r = localStorage.getItem('regreso');
                    if (r) document.getElementById(r)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            }
        }

        function procesarInstancia(oficial) {
            if (!tenidasXml) return "";
            const hoy = new Date().toISOString().split('T')[0];
            const tHoy = Array.from(tenidasXml.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha") === hoy);
            let res = "";
            if (oficial === "vm" && tHoy) {
                Array.from(tHoy.getElementsByTagName("item")).forEach(i => {
                    const acto = i.getAttribute("acto").toLowerCase();
                    const d = { "iniciacion": "107", "elevacion": "201", "exaltacion": "301" };
                    if (d[acto]) res += `<button class="btn-ritual color-verde" onclick="irA('${d[acto]}')">PROCEDER A ${acto.toUpperCase()}</button>`;
                });
            }
            return res;
        }
    </script>
</body>
</html>
