<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 200px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 90px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { display: block; font-style: italic; font-size: 0.9em; color: rgba(0, 0, 0, 0.5); margin: 8px 0; padding-left: 8px; border-left: 2px solid #d7ccc8; }
        dt { font-weight: bold; color: #5d4037; margin-top: 12px; }
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #5d4037; font-size: 1.0em; font-weight: 800; width: 30px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; }
        .btn-ritual { border: 1px solid #7a5a00; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 0.85em; font-weight: bold; background: #A87C00 !important; color: #ffffff !important; display: inline-flex; align-items: center; margin: 5px 0; text-decoration: none; }
        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .visor-close { position: absolute; top: 8px; right: 8px; background: #ff0000; color: #ffffff; border: 2px solid #ffffff; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="inicializar()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Sección</span>
            <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>
    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1", fechaTrabajo = "";
        let seccionesVisibles = [];

        // --- SISTEMA DE NAVEGACIÓN Y REGRESO ---
        window.onpopstate = function(event) {
            if (event.state) {
                numGradoActual = event.state.grado;
                seccionesVisibles = event.state.visibilidad;
                ejecutarCargaRitual(numGradoActual, event.state.seccionActual);
                
                setTimeout(() => {
                    if (event.state.anchor) {
                        const el = document.getElementById(event.state.anchor);
                        if (el) el.scrollIntoView({ behavior: 'instant', block: 'center' });
                    } else {
                        window.scrollTo(0, event.state.scroll);
                    }
                }, 200);
            }
        };

        window.irA = function(codigo) {
            if (codigo === 'VOLVER') {
                window.history.back();
                return;
            }

            const pasoOrigen = window.event?.target?.closest('dd')?.id;

            // Guardar estado actual antes de saltar
            window.history.pushState({
                grado: numGradoActual,
                seccionActual: document.getElementById("seccionFilter").value,
                scroll: window.scrollY,
                visibilidad: [...seccionesVisibles],
                anchor: pasoOrigen
            }, "");

            // Procesar nuevo destino (Ej: "301")
            numGradoActual = codigo.charAt(0);
            const targetSec = parseInt(codigo.substring(1), 10).toString();
            seccionesVisibles = [targetSec];
            
            ejecutarCargaRitual(numGradoActual, targetSec);
            window.scrollTo(0, 0);
        };

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                fechaTrabajo = urlParams.get('fecha') || new Date().toISOString().split('T')[0]; 
                numGradoActual = (urlParams.get('num') || "1").toString();
                const secUrl = (urlParams.get('sec') || "1").toString();
                
                seccionesVisibles = (parseInt(secUrl) > 3) ? [secUrl] : ["1", "2", "3"];
                
                await cargarDatos();
                ejecutarCargaRitual(numGradoActual, secUrl);

                window.history.replaceState({ 
                    grado: numGradoActual, 
                    seccionActual: secUrl, 
                    scroll: 0, 
                    visibilidad: [...seccionesVisibles],
                    anchor: null 
                }, "");
            } catch (e) { console.error(e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgia.xml?v=${v}`).then(r => r.text()),
                fetch(`tenidas.xml?v=${v}`).then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado.toString());
            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grado] || "Ritual";
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function actualizarSelectorSecciones(idForzado) {
            const sSel = document.getElementById("seccionFilter");
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(sec => {
                const idXml = sec.getAttribute("id").toString();
                if (seccionesVisibles.includes(idXml)) {
                    sSel.add(new Option(sec.getAttribute("titulo"), idXml));
                }
            });
            if (idForzado) sSel.value = idForzado;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const oSel = document.getElementById("oficialFilter");
            const ofiPrevio = oSel.value;
            const oficialesSet = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => { 
                    if (p.getAttribute("oficial")) oficialesSet.add(p.getAttribute("oficial").trim()); 
                });
            }
            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(item => {
                const sigla = item.getAttribute("sigla");
                if (oficialesSet.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            if (oficialesSet.has(ofiPrevio)) oSel.value = ofiPrevio;
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const oficialSel = document.getElementById("oficialFilter").value; 
            const contenedor = document.getElementById('rituales-content');
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "", counter = 0, primeraID = null;
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach(paso => {
                    counter++;
                    const oficialTur = (paso.getAttribute("oficial") || "Ofi").trim();
                    const idL = `l-${sId}-${counter}`;
                    let txt = paso.getAttribute("texto") || paso.textContent || "";
                    
                    // PROCESAR LINKS CON TÍTULO AUTOMÁTICO DESDE EL XML
                    txt = txt.replace(/\[\[LINK:(\d{3})(?::([^\]]+))?\]\]/g, (match, cod, desc) => {
                        let textoBoton = desc;
                        if (!textoBoton) {
                            const g = cod.charAt(0);
                            const sIdBusca = parseInt(cod.substring(1), 10).toString();
                            const rRef = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === g);
                            if (rRef) {
                                const sRef = Array.from(rRef.getElementsByTagName("seccion")).find(s => s.getAttribute("id") === sIdBusca);
                                if (sRef) textoBoton = sRef.getAttribute("titulo");
                            }
                        }
                        return `<button class="btn-ritual" onclick="window.irA('${cod}')">${(textoBoton || cod).trim()} ➜</button>`;
                    });

                    if (txt.includes("[[VOLVER]]")) {
                        txt = txt.replace("[[VOLVER]]", `<button class="btn-ritual" onclick="window.irA('VOLVER')">⬅ Regresar</button>`);
                    }

                    if (txt.includes("[[INSTANCIA]]")) {
                        txt = txt.replace("[[INSTANCIA]]", `<div class="instancia-botones">${procesarInstancia(oficialTur)}</div>`);
                    }
                    
                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    
                    const esOfi = (oficialSel && oficialTur === oficialSel);
                    if (esOfi && !primeraID) primeraID = idL;
                    html += `<dt>${oficialTur}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
                });
            });
            contenedor.innerHTML = `<dl style="counter-reset: line-counter;">${html}</dl>`;
            if (primeraID) { 
                const el = document.getElementById(primeraID); 
                if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
            }
        }

        function abrirVisor(url) {
            const overlay = document.createElement('div');
            overlay.className = 'visor-overlay';
            overlay.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
            document.body.appendChild(overlay);
        }

        function procesarInstancia(oficialPaso) {
            if (typeof tenidasXml === 'undefined' || !tenidasXml) return "";
            const tActiva = Array.from(tenidasXml.getElementsByTagName("tenida")).find(t => t.getAttribute("fecha").trim() === fechaTrabajo.trim());
            if (!tActiva) return "";            
            const items = Array.from(tActiva.getElementsByTagName("item"));
            const filtroSuperior = document.getElementById("oficialFilter").value;
            let contenido = "";
            items.forEach(item => {
                const acto = (item.getAttribute("acto") || "").trim();
                const url = item.getAttribute("url") || "";
                const titulo = item.getAttribute("titulo") || "Trabajo";
                if (acto === "balaustre" && oficialPaso === "Sec" && filtroSuperior === "Sec") {
                    contenido += `<button class="btn-ritual" onclick="abrirVisor('${url}')">📜: ${titulo} ➜</button>`;
                } else if (acto === "elevacion" && oficialPaso !== "Sec") {
                    contenido += `<button class="btn-ritual" onclick="abrirVisor('${url}')">${titulo}</button>`;
                }
            });
            return contenido;
        }
    </script>
</body>
</html>
