<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        
        /* Panel de Control con anchos diferenciados */
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-seccion { width: 220px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 100px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .line-exec { font-style: italic; font-size: 0.8em; color: rgba(0, 0, 0, 0.4); font-weight: normal; margin-left: 3px; }
        
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        dt { font-weight: bold; color: #5d4037; margin-top: 8px; }
        
        /* Diálogos Justificados */
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; text-justify: inter-word; hyphens: auto; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #5d4037; font-size: 1.0em; font-weight: 800; width: 30px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        
        /* Título de Apartado Mayor */
        .apartado-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Botones Redondeados (Píldora) */
        .btn-ritual, .btn-instancia-exec { border: none; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-size: 0.85em; margin: 4px 0; font-weight: bold; display: table !important; background: #A87C00 !important; color: #ffffff !important; text-decoration: none; text-align: center; width: auto !important; max-width: fit-content; box-sizing: border-box; overflow: hidden; }
        .instancia-botones { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        
        .visor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .visor-content { width: 95%; height: 90%; background: #fff; border-radius: 8px; overflow: hidden; position: relative; }
        .visor-close { position: absolute; top: 8px; right: 8px; background: #ff0000; color: #ffffff; border: 2px solid #ffffff; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 2001; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body onload="inicializar()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA Nº 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select"><span class="select-label">Sección</span><select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select></div>
        <div class="container-select"><span class="select-label">Oficial</span><select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select></div>
    </div>
    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, tenidasXml, ritualActivo;
        let numGradoActual = "1", fechaTrabajo = "", seccionesVisibles = new Set(["1", "2", "3"]);

        async function inicializar() {
            try {
                await cargarDatos();
                const urlParams = new URLSearchParams(window.location.search);
                fechaTrabajo = urlParams.get('fecha') || new Date().toISOString().split('T')[0];
                numGradoActual = (urlParams.get('num') || "1").toString();
                const oficialUrl = urlParams.get('ofi') || "";
                
                let s = (urlParams.get('sec') || "1").replace(/^0+/, "");
                if (parseInt(s) > 3) seccionesVisibles.add(s);
                
                ejecutarCargaRitual(numGradoActual, s);

                if (oficialUrl) {
                    const oSel = document.getElementById("oficialFilter");
                    oSel.value = oficialUrl;
                    renderizarLiturgia();
                }
            } catch (e) { console.error(e); }
        }

        async function cargarDatos() {
            const [glosario, liturgia, tenidas] = await Promise.all([
                fetch('glosario.xml').then(r => r.text()),
                fetch('liturgia.xml').then(r => r.text()),
                fetch('tenidas.xml').then(r => r.text()).catch(() => '<bitacora></bitacora>')
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
            tenidasXml = parser.parseFromString(tenidas, "text/xml");
        }

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                document.getElementById("titulo-ritual-header").textContent = titulos[grado] || "Ritual";
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function actualizarSelectorSecciones(idForzado) {
            const sSel = document.getElementById("seccionFilter");
            const valAnterior = idForzado || sSel.value;
            sSel.innerHTML = "";
            Array.from(ritualActivo.getElementsByTagName("seccion")).forEach(sec => {
                const id = sec.getAttribute("id");
                if (seccionesVisibles.has(id)) sSel.add(new Option(sec.getAttribute("titulo"), id));
            });
            sSel.value = valAnterior;
        }

        function cambioDeSeccion() {
            const sId = document.getElementById("seccionFilter").value;
            const oSel = document.getElementById("oficialFilter"), ofiPrevio = oSel.value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            const oficialesSet = new Set();
            if (seccion) {
                Array.from(seccion.getElementsByTagName("paso")).forEach(p => { if (p.getAttribute("oficial")) oficialesSet.add(p.getAttribute("oficial").trim()); });
            }
            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(item => {
                const sigla = item.getAttribute("sigla");
                if (oficialesSet.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            
            // Mantiene al oficial si existe en la nueva sección
            if (oficialesSet.has(ofiPrevio)) oSel.value = ofiPrevio;
            
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value, oficialSel = document.getElementById("oficialFilter").value; 
            const contenedor = document.getElementById('rituales-content'), seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;
            let html = "", counter = 0, primeraID = null;
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach(paso => {
                    counter++;
                    const oficialTur = paso.getAttribute("oficial"), idL = `l-${sId}-${counter}`;
                    let txt = paso.getAttribute("texto") || paso.textContent || "";
                    txt = txt.replace(/\[\[LINK:(\d{3})(?::([^\]]+))?\]\]/g, (match, cod, desc) => {
                        const targetId = parseInt(cod.substring(1), 10).toString();
                        const targetSec = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") === targetId);
                        return `<br><button class="btn-ritual" onclick="irA('${cod}')">${(desc || (targetSec ? targetSec.getAttribute("titulo") : "Ir")).trim()} ➜</button>`;
                    });
                    if (txt.includes("[[INSTANCIA]]")) txt = txt.replace("[[INSTANCIA]]", (oficialSel && oficialTur === oficialSel) ? `<br>${procesarInstancia(oficialSel.toLowerCase())}` : "");
                    if (txt.includes("[[VOLVER]]")) txt = txt.replace("[[VOLVER]]", `<br><button class="btn-ritual" onclick="volver()">⬅ Regresar</button>`);
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    const esOfi = (oficialSel && oficialTur === oficialSel);
                    if (esOfi && !primeraID) primeraID = idL;
                    html += `<dt>${oficialTur}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
                });
            });
            contenedor.innerHTML = `<div style="counter-reset: line-counter;">${html}</div>`;
            if (primeraID) { const el = document.getElementById(primeraID); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        function irA(codigo) {
            const g = codigo[0], s = parseInt(codigo.substring(1), 10).toString();
            const ofiActual = document.getElementById("oficialFilter").value;
            window.location.href = `rituales.html?num=${g}&sec=${s}&fecha=${fechaTrabajo}&ofi=${ofiActual}`;
        }

        function volver() {
            if (window.history.length > 1) { window.history.back();
               setTimeout(() => { renderizarLiturgia(); }, 100);
            } else { window.location.href = `rituales.html?num=${numGradoActual}&sec=1&fecha=${fechaTrabajo}`; }
        }

        function abrirVisor(url) {
            const overlay = document.createElement('div');
            overlay.className = 'visor-overlay';
            overlay.innerHTML = `<div class="visor-content"><button class="visor-close" onclick="this.parentElement.parentElement.remove()">✕</button><iframe src="${url}" style="width:100%; height:100%; border:none;"></iframe></div>`;
            document.body.appendChild(overlay);
        }

        function procesarInstancia(ofi) {
            if (!tenidasXml) return "";
            const listaTenidas = Array.from(tenidasXml.getElementsByTagName("tenida"));
            const tActiva = listaTenidas.find(t => t.getAttribute("fecha") === fechaTrabajo) || listaTenidas[listaTenidas.length - 1];
            if (!tActiva) return "";
            let contenido = "";
            if (ofi === "sec") {
                const itemB = Array.from(tActiva.getElementsByTagName("item")).find(i => i.getAttribute("acto") === "balaustre");
                if (itemB) contenido = `<button class="btn-ritual" onclick="abrirVisor('${itemB.getAttribute("url")}')">📜: ${itemB.getAttribute("titulo")} ➜</button>`;
            } else if (ofi === "vm") {
                Array.from(tActiva.getElementsByTagName("item")).forEach(i => {
                    if (i.getAttribute("acto") !== "balaustre") {
                        const url = i.getAttribute("url"), acc = url.includes('rituales.html') ? `window.location.href='${url}&fecha=${tActiva.getAttribute("fecha")}'` : `abrirVisor('${url}')`;
                        contenido += `<button class="btn-instancia-exec" onclick="${acc}">${i.getAttribute("titulo")}</button>`;
                    }
                });
            }
            return contenido ? `<div class="instancia-botones">${contenido}</div>` : "";
        }
    </script>
</body>
</html>
