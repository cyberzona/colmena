<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        /* PALETA DE COLORES CONSIDERA LA WEB PRINCIPAL */
        :root {
            --dorado-colmena: #f1c40f; /* Amarillo de la web principal */
            --negro-fondo: #1a1a1a;
            --gris-suave: #f9f9f9;
        }

        body { 
            font-family: 'Cinzel', serif; /* Fuente institucional */
            line-height: 1.4; 
            color: #2c3e50; 
            margin: 0; 
            padding: 10px; 
            background-color: var(--gris-suave); 
        }
        
        /* ENCABEZADO ESTILO WEB PRINCIPAL */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #fff;
            z-index: 1000;
            padding: 12px;
            box-sizing: border-box;
            border-bottom: 3px solid var(--dorado-colmena);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-container { display: flex; align-items: center; gap: 15px; margin-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.2rem; color: #000; font-weight: bold; letter-spacing: 1px; }
        #titulo-ritual-header { font-size: 1rem; color: #7f8c8d; text-transform: uppercase; font-weight: 700; }
        .logo-mini { width: 55px; height: auto; border-radius: 50%; }
        
        #control-panel { 
            background: #fff; padding: 5px; border: 1px solid #eee; 
            display: flex; gap: 8px; border-radius: 50px; /* Estilo píldora como botones web */
        }
        
        #rituales-content { margin-top: 155px; padding-bottom: 30px; }

        .container-select { display: flex; flex-direction: column; flex: 1; }
        .select-label { font-size: 0.65rem; color: #95a5a6; font-weight: bold; text-transform: uppercase; margin-left: 15px; }
        
        .select-seccion, .select-oficiales { 
            width: 100%; padding: 8px; font-size: 0.95rem; border: none; 
            background: transparent; font-weight: bold; color: #2c3e50;
        }

        /* TEXTO Y SIGLAS */
        .apartado-header { 
            background: var(--negro-fondo); color: var(--dorado-colmena); 
            padding: 8px 15px; margin-top: 30px; font-weight: bold; 
            text-transform: uppercase; font-size: 0.85rem; border-radius: 4px;
            border-left: 5px solid var(--dorado-colmena);
        }
        
        dt { font-weight: bold; color: #000; margin-top: 20px; font-size: 1.1rem; }
        dd { 
            margin-left: 45px; border-left: 2px solid var(--dorado-colmena); 
            padding-left: 12px; position: relative; margin-bottom: 8px; 
            counter-increment: line-counter; text-align: justify;
        }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #bdc3c7; font-size: 0.75rem; width: 30px; text-align: right; }
        
        .sigla-texto-azul { color: #2980b9; font-weight: bold; }
        .line-exec { display: block; font-style: italic; color: #7f8c8d; margin: 6px 0; font-size: 0.9rem; }
        .resaltado { background-color: #fef9e7 !important; border-left-color: var(--dorado-colmena) !important; }

        /* BOTONES ESTILO PRINCIPAL */
        .nav-link-container { margin: 20px 0; }
        .btn-ritual { 
            background: var(--dorado-colmena) !important; color: #000 !important; 
            border: none; padding: 12px 30px; cursor: pointer; 
            font-weight: bold; text-transform: uppercase; font-size: 0.8rem; 
            border-radius: 50px; transition: 0.3s;
        }
    </style>
</head>
<body onload="inicializar()">

    <div class="fixed-header">
        <div class="header-container">
            <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
            <div class="logia-info">
                <span class="line-logia">COLMENA No. 8</span>
                <span id="titulo-ritual-header">LIBRO: CARGANDO...</span>
            </div>
        </div>
        
        <div id="control-panel">
            <div class="container-select">
                <span class="select-label">Sección</span>
                <select id="seccionFilter" class="select-seccion" onchange="cambioDeSeccion()"></select>
            </div>
            <div class="container-select">
                <span class="select-label">Oficial</span>
                <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
            </div>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        // ... (Logica de carga de datos e inicialización se mantiene igual) ...

        function ejecutarCargaRitual(grado, seccionID) {
            ritualActivo = Array.from(xmlDoc.getElementsByTagName("ritual")).find(r => r.getAttribute("grado") === grado);
            if (ritualActivo) {
                const titulos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Maestría" };
                // Incorporamos "LIBRO:" en mayúsculas
                document.getElementById("titulo-ritual-header").textContent = "LIBRO: " + (titulos[grado] || "Ritual").toUpperCase();
                actualizarSelectorSecciones(seccionID);
                cambioDeSeccion();
            }
        }

        function renderizarLiturgia() {
            const sId = document.getElementById("seccionFilter").value;
            const ofiSel = document.getElementById("oficialFilter").value;
            const seccion = Array.from(ritualActivo.getElementsByTagName("seccion")).find(s => s.getAttribute("id") == sId);
            if (!seccion) return;

            let html = "";
            Array.from(seccion.getElementsByTagName("apartado")).forEach(apa => {
                html += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>`;
                Array.from(apa.getElementsByTagName("paso")).forEach((paso, i) => {
                    const ofi = (paso.getAttribute("oficial") || "Ofi").trim();
                    const idL = `l-${sId}-${i}`;
                    let txt = (paso.getAttribute("texto") || paso.textContent).trim();

                    // CORRECCIÓN DEL ERROR DE CORCHETES
                    // Procesamos instrucciones limpiando cualquier posible duplicidad
                    txt = txt.replace(/\[\[?(.*?)\]\]?/g, '<span class="line-exec">[$1]</span>');

                    // LINKS
                    txt = txt.replace(/\[\[LINK:(\d+)(?::([^\]]+))?\]\]/g, (match, cod, titulo) => {
                        return `<div class="nav-link-container"><button class="btn-ritual" onclick="irA('${cod}')">${titulo || 'Ir'} ➜</button></div>`;
                    });

                    // SIGLAS
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');

                    const esOfi = ofiSel && ofi === ofiSel;
                    html += `<dt>${ofi}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idL}">${txt}</dd>`;
                });
            });
            document.getElementById('rituales-content').innerHTML = `<dl>${html}</dl>`;
        }
        
        // El resto de funciones (irA, abrirVisor, etc) se mantienen de tu versión estable
    </script>
</body>
</html>
