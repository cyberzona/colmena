<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Rituales - Colmena No. 8</title>
    <style>
        :root {
            --cafe-oscuro: #5d4037;
            --cafe-claro: #8d6e63;
            --crema: #fdfaf3;
            --dorado: #b8860b;
            --verde-instancia: #1b5e20;
        }

        body {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            background-color: #efebe9;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Título Interactivo sugerido por los compañeros */
        .section-header {
            background: var(--cafe-oscuro);
            color: var(--crema);
            padding: 15px;
            text-align: center;
            border-radius: 4px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid var(--dorado);
            transition: background 0.3s;
        }

        .section-header:hover { background: var(--cafe-claro); }
        .section-header::after { content: ' ▼'; font-size: 0.7em; opacity: 0.7; }

        /* Contenedor de Instancias (Balaustre/Propuestas) */
        .contenedor-instancias {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 5px;
        }

        .btn-doc {
            background: white;
            color: var(--cafe-oscuro);
            border: 1px solid var(--cafe-claro);
            padding: 12px;
            text-align: left;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-link-instancia {
            background: var(--verde-instancia);
            color: white;
            border: 2px solid var(--dorado);
            padding: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        /* Visor de Documentos */
        #modal-visor {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; display: flex; flex-direction: column;
        }
        .modal-header {
            background: var(--cafe-oscuro); color: white; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .accion-texto { font-style: italic; color: var(--cafe-claro); }
    </style>
</head>
<body>

    <div id="ritual-container">
        </div>

    <script>
        let xmlDoc, tenidasXml, ritualActivo;

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const numGrado = urlParams.get('num') || '1';
                const parteInicial = urlParams.get('p');

                const [resLiturgia, resTenidas] = await Promise.all([
                    fetch('liturgia.xml').then(r => r.text()),
                    fetch('tenidas.xml').then(r => r.text()).catch(() => null)
                ]);

                const parser = new DOMParser();
                xmlDoc = parser.parseFromString(resLiturgia, "text/xml");
                if (resTenidas) tenidasXml = parser.parseFromString(resTenidas, "text/xml");

                const rituales = xmlDoc.getElementsByTagName("ritual");
                for (let r of rituales) {
                    if (r.getAttribute("grado") === numGrado) { ritualActivo = r; break; }
                }

                if (ritualActivo) {
                    // Si se pasó una instancia (parte) por URL, cargarla directamente
                    renderizarParte(parteInicial || "1");
                }
            } catch (e) { console.error("Error inicializando:", e); }
        }

        function renderizarParte(parteId) {
            const partes = ritualActivo.getElementsByTagName("parte");
            let parteSeleccionada;
            for (let p of partes) {
                if (p.getAttribute("id") === parteId) { parteSeleccionada = p; break; }
            }

            if (!parteSeleccionada) return;

            const titulo = parteSeleccionada.getAttribute("titulo");
            let html = `
                <div class="section-header" onclick="abrirSelectorPartes()">
                    ${titulo}
                </div>
                <div class="contenido-ritual">
            `;

            // Procesar pasos y la etiqueta de instancia
            const pasos = parteSeleccionada.getElementsByTagName("paso");
            for (let paso of pasos) {
                let texto = paso.getAttribute("texto") || paso.textContent;
                
                // Inyectar Botón de Instancia
                texto = texto.replace(/\[\[INSTANCIA\]\]/g, () => generarHtmlInstancia());
                
                html += `<p><strong>${paso.getAttribute("oficial")}:</strong> ${texto}</p>`;
            }

            html += `</div>`;
            document.getElementById("ritual-container").innerHTML = html;
        }

        function generarHtmlInstancia() {
            if (!tenidasXml) return "<span class='accion-texto'>(Bitácora no disponible)</span>";
            
            const hoyStr = new Date().toISOString().split('T')[0];
            const sesion = Array.from(tenidasXml.getElementsByTagName("tenida"))
                                .find(s => s.getAttribute("fecha") === hoyStr);
            
            if (!sesion) return "<span class='accion-texto'>(No hay actos programados hoy)</span>";

            const items = Array.from(sesion.getElementsByTagName("item"));
            let html = "<div class='contenedor-instancias'>";

            items.forEach(item => {
                const acto = item.getAttribute("acto");
                const titulo = item.getAttribute("titulo");
                const url = item.getAttribute("url");

                if (acto === "balaustre") {
                    html += `<button class="btn-doc" onclick="abrirVisor('${url}', '${titulo}')">📜 LEER: ${titulo}</button>`;
                } else if (acto === "nuevo_grado") {
                    html += `<button class="btn-link-instancia" onclick="window.location.href='${url}'">⚖️ EJECUTAR: ${titulo}</button>`;
                } else {
                    html += `<button class="btn-doc" onclick="abrirVisor('${url}', '${titulo}')">📄 ${titulo}</button>`;
                }
            });

            return html + "</div>";
        }

        function abrirVisor(url, titulo) {
            const urlPreview = url.replace('/view', '/preview');
            const visorHtml = `
                <div id="modal-visor">
                    <div class="modal-header">
                        <span>${titulo}</span>
                        <button onclick="document.getElementById('modal-visor').remove()">CERRAR ✕</button>
                    </div>
                    <iframe src="${urlPreview}" style="flex-grow:1; border:none; background:white;"></iframe>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', visorHtml);
        }

        function abrirSelectorPartes() {
            // Aquí puedes llamar a tu selector existente o mostrar un menú simple
            alert("Selecciona una nueva parte del ritual en el panel de control.");
            window.scrollTo(0,0);
        }

        window.onload = inicializar;
    </script>
</body>
</html>
