<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.4; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        
        /* Cabecera Medieval */
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; border-bottom: 2px solid #5d4037; padding-bottom: 15px; }
        .logia-linea1 { font-size: 0.75rem; color: #8d6e63; letter-spacing: 0.5px; }
        .logia-linea2 { font-size: 1.15rem; color: #5d4037; margin: 1px 0; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.85rem; color: #795548; text-transform: uppercase; letter-spacing: 1.5px; font-style: italic; }
        .logo-mini { width: 75px; height: auto; flex-shrink: 0; }
        .logia-info { display: flex; flex-direction: column; text-align: left; }

        /* Panel Sticky */
        #control-panel { background: #efebe9; padding: 10px; border-radius: 8px; border: 1px solid #d7ccc8; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .container-select { display: inline-block; margin: 5px; text-align: left; }
        #container-parte { width: 55%; }
        #container-oficial { width: 35%; }
        .select-label { display: block; font-size: 0.7em; color: #795548; font-weight: bold; text-transform: uppercase; }
        select { padding: 8px; font-size: 0.9em; width: 100%; border-radius: 4px; border: 1px solid #ccc; background: white; }

        /* Estilos Ritual y Enumeración */
        .parte-ritual { counter-reset: line-counter; }
        .sigla-en-dialogo { font-weight: bold; color: #0056b3; }
        dt { font-weight: bold; color: #5d4037; margin-top: 15px; font-size: 0.9em; }
        
        dd { 
            margin-left: 35px; border-left: 2px solid #d7ccc8; padding-left: 10px; 
            font-size: 0.95em; position: relative; counter-increment: line-counter; 
        }
        
        dd::before { 
            content: counter(line-counter); position: absolute; left: -30px; 
            color: #8d6e63; font-size: 0.8em; font-weight: bold; width: 20px; text-align: right;
        }

        .section-header { background: #5d4037; color: white; padding: 8px; text-align: center; border-radius: 4px; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        .apartado-header { font-weight: bold; color: #795548; font-size: 0.9em; border-bottom: 1px solid #d7ccc8; text-align: right; margin-top: 20px; }
        .accion-siguiente-linea { font-size: 0.85em; color: #5d4037; font-style: italic; margin-left: 45px; display: block; }
    </style>
</head>
<body onload="inicializar()">

    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="logia-linea1">Resp∴ Log∴ Simb∴ Colmena Nº 8</span>
            <span id="titulo-ritual-header">Identificando Grado...</span>
        </div>
    </div>

    <div id="control-panel">
        <div class="container-select" id="container-parte">
            <span class="select-label">Parte</span>
            <select id="parteFilter" onchange="renderizarLiturgia()"></select>
        </div>
        <div class="container-select" id="container-oficial">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" onchange="renderizarLiturgia()">
                <option value="todos">Todos</option>
            </select>
        </div>
    </div>

    <div id="rituales-content"></div>

    <script>
        let xmlDoc = null;
        const recursos = {
            definiciones: {
                "VM∴": "Venerable Maestro", "1V∴": "Primer Vigilante", "2V∴": "Segundo Vigilante",
                "HH∴": "Hermanos", "RL∴": "Respetable Logia", "GADU∴": "Gran Arquitecto Del Universo",
                "QQHH∴": "Queridos Hermanos", "ALGDGADU∴": "A la Gloria del Gran Arquitecto Del Universo"
            }
        };

        async function inicializar() {
            try {
                const res = await fetch('liturgia.xml');
                const text = await res.text();
                xmlDoc = new DOMParser().parseFromString(text, "text/xml");

                const ritualNode = xmlDoc.querySelector("ritual");
                const grado = ritualNode.getAttribute("grado"); // "1", "2" o "3"
                
                const ritos = { "1": "Ritual de Aprendiz", "2": "Ritual de Compañero", "3": "Ritual de Maestro" };
                document.getElementById("titulo-ritual-header").textContent = ritos[grado] || "Ritual Masónico";
                
                // Limpiar selectores antes de poblar
                document.getElementById("parteFilter").innerHTML = "";
                document.getElementById("oficialFilter").innerHTML = '<option value="todos">Todos</option>';

                poblarSelectores();
                renderizarLiturgia();
            } catch (e) {
                document.getElementById('rituales-content').innerHTML = "Error: liturgia.xml no disponible.";
            }
        }

        function poblarSelectores() {
            const pSel = document.getElementById("parteFilter");
            const oSel = document.getElementById("oficialFilter");
            const oficialesSet = new Set();

            xmlDoc.querySelectorAll("parte").forEach(p => {
                pSel.add(new Option(p.getAttribute("titulo"), p.getAttribute("id")));
            });

            xmlDoc.querySelectorAll("paso").forEach(paso => {
                const ofi = paso.getAttribute("oficial");
                if (ofi) oficialesSet.add(ofi);
            });

            Array.from(oficialesSet).sort().forEach(sigla => {
                oSel.add(new Option(sigla + "∴", sigla));
            });
        }

        function renderizarLiturgia() {
            if (!xmlDoc) return;
            const pId = document.getElementById("parteFilter").value;
            const fOfi = document.getElementById("oficialFilter").value;
            const contenedor = document.getElementById('rituales-content');
            
            const parte = Array.from(xmlDoc.querySelectorAll("parte")).find(p => p.getAttribute("id") === pId);
            if (!parte) { contenedor.innerHTML = ""; return; }

            let htmlFinal = ""; 
            
            parte.querySelectorAll("apartado").forEach(apa => {
                let pasosHtml = "";
                apa.querySelectorAll("paso").forEach(paso => {
                    const oficial = paso.getAttribute("oficial");
                    const textoOriginal = paso.getAttribute("texto") || "";
                    
                    // REGLA DE INVISIBILIDAD: Si no hay texto, no se renderiza nada
                    if (!textoOriginal.trim()) return;
                    if (fOfi !== "todos" && oficial !== fOfi) return;

                    let texto = textoOriginal;
                    let acciones = [];
                    
                    texto = texto.replace(/\[(.*?)\]/g, (m, p1) => { acciones.push(p1); return ""; });
                    
                    for (const sigla in recursos.definitions) {
                        const regex = new RegExp(sigla.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                        texto = texto.replace(regex, `<span class="sigla-en-dialogo">${sigla}</span>`);
                    }

                    const resaltar = (fOfi !== "todos") ? "style='background:rgba(180,255,100,0.25); border-left:3px solid #5d4037;'" : "";
                    
                    pasosHtml += `<dt>${oficial}∴</dt><dd ${resaltar}>${texto}</dd>`;
                    acciones.forEach(a => pasosHtml += `<span class="accion-siguiente-linea">[${a}]</span>`);
                });

                if (pasosHtml !== "") {
                    htmlFinal += `<div class="apartado-header">${apa.getAttribute("titulo")}</div>` + pasosHtml;
                }
            });

            if (htmlFinal === "") {
                contenedor.innerHTML = ""; 
            } else {
                const header = `<div class="parte-ritual"><div class="section-header">${parte.getAttribute("titulo")}</div>`;
                contenedor.innerHTML = header + htmlFinal + `</div>`;
            }
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
