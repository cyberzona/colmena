<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ritual - Colmena No. 8</title>
    <style>
        body { font-family: 'Palatino Linotype', serif; line-height: 1.1; color: #2c2c2c; margin: 0; padding: 10px; background-color: #fdfaf3; }
        .header-container { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; border-bottom: 2px solid #5d4037; padding-bottom: 8px; }
        .logia-info { display: flex; flex-direction: column; }
        .line-logia { font-size: 1.0rem; color: #5d4037; letter-spacing: 0.5px; font-weight: bold; }
        #titulo-ritual-header { font-size: 0.95rem; color: #5d4037; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .logo-mini { width: 65px; height: auto; }
        #control-panel { background: #d7ccc8; padding: 10px; border-radius: 8px; border: 1px solid #a1887f; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: flex-start; gap: 10px; }
        .container-select { display: flex; flex-direction: column; width: auto; }
        .select-label { font-size: 0.65rem; color: #4e342e; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .select-capitulo { width: 180px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .select-oficiales { width: 90px; padding: 8px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #8d6e63; background: #fff; font-weight: bold; outline: none; }
        .sigla-texto-azul { color: #0277bd; font-weight: bold; }
        .line-exec { display: block; font-style: italic; font-size: 0.9em; color: rgba(0, 0, 0, 0.5); margin: 8px 0; padding-left: 8px; border-left: 2px solid #d7ccc8; }
        dt { font-weight: bold; color: #5d4037; margin-top: 12px; }
        dd { margin-left: 45px; border-left: 3px solid #d7ccc8; padding-left: 10px; padding-right: 10px; position: relative; margin-bottom: 4px; counter-increment: line-counter; text-align: justify; }
        dd::before { content: counter(line-counter); position: absolute; left: -40px; color: #5d4037; font-size: 1.0em; font-weight: 800; width: 30px; text-align: right; }
        .resaltado { background: rgba(180, 255, 100, 0.4) !important; border-left: 5px solid #2e7d32 !important; }
        .section-header { font-weight: bold; color: #795548; font-size: 1.1rem; border-bottom: 2px solid #d7ccc8; text-align: right; margin-top: 20px; margin-bottom: 10px; text-transform: uppercase; }
        .btn-ritual { border: 1px solid #7a5a00; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 0.85em; font-weight: bold; background: #A87C00 !important; color: #ffffff !important; text-decoration: none; display: inline-flex; align-items: center; margin: 5px 0; }
    </style>
</head>
<body onload="inicializar()">
    <div class="header-container">
        <img src="./images/logo-mini.png" alt="Logo" class="logo-mini">
        <div class="logia-info">
            <span class="line-logia">RLS∴ COLMENA # 8</span>
            <span id="titulo-ritual-header">Cargando...</span>
        </div>
    </div>
    <div id="control-panel">
        <div class="container-select">
            <span class="select-label">Capítulo</span>
            <select id="chapterFilter" class="select-capitulo" onchange="cambioDeCapitulo()"></select>
        </div>
        <div class="container-select">
            <span class="select-label">Oficial</span>
            <select id="oficialFilter" class="select-oficiales" onchange="renderizarLiturgia()"></select>
        </div>
    </div>
    <div id="rituales-content"></div>

    <script>
        let xmlDoc, glosarioDoc, libroActivo;
        let numLibroActual = "1";
        let capitulosVisibles = ["1", "2", "3"]; // RESTRICCIÓN: Solo los 3 primeros al inicio
        let historialNavegacion = [];

        async function inicializar() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                numLibroActual = (urlParams.get('num') || "1").toString();
                const capUrl = (urlParams.get('cap') || "1").toString();
                
                // Si venimos de un LINK externo a un cap > 3, lo agregamos a la lista permitida
                if (parseInt(capUrl) > 3 && !capitulosVisibles.includes(capUrl)) {
                    capitulosVisibles.push(capUrl);
                }

                await cargarDatos();
                ejecutarCargaRitual(numLibroActual, capUrl);
            } catch (e) { console.error("Error inicializando:", e); }
        }

        async function cargarDatos() {
            const v = new Date().getTime(); 
            const [glosario, liturgia] = await Promise.all([
                fetch(`glosario.xml?v=${v}`).then(r => r.text()),
                fetch(`liturgy.xml?v=${v}`).then(r => r.text())
            ]);
            const parser = new DOMParser();
            glosarioDoc = parser.parseFromString(glosario, "text/xml");
            xmlDoc = parser.parseFromString(liturgia, "text/xml");
        }

        function ejecutarCargaRitual(libroNum, capituloID) {
            // Busca <libro> (nuevo) o <book> (viejo) para evitar errores de carga
            const libros = xmlDoc.getElementsByTagName("libro").length > 0 ? 
                           xmlDoc.getElementsByTagName("libro") : 
                           xmlDoc.getElementsByTagName("book");

            libroActivo = Array.from(libros).find(b => 
                (b.getAttribute("numero") || b.getAttribute("number")) == libroNum.toString()
            );

            if (libroActivo) {
                const txtLibro = libroActivo.getAttribute("titulo") || libroActivo.getAttribute("title") || "Ritual";
                document.getElementById("titulo-ritual-header").textContent = txtLibro;
                actualizarSelectorCapitulos(capituloID);
                cambioDeCapitulo();
            }
        }

        function actualizarSelectorCapitulos(idForzado) {
            const cSel = document.getElementById("chapterFilter");
            cSel.innerHTML = "";
            
            // Busca <capitulo> o <chapter>
            const caps = libroActivo.getElementsByTagName("capitulo").length > 0 ? 
                         libroActivo.getElementsByTagName("capitulo") : 
                         libroActivo.getElementsByTagName("chapter");
            
            Array.from(caps).forEach(chap => {
                const idXml = chap.getAttribute("id");
                const tituloBoton = chap.getAttribute("titulo") || chap.getAttribute("title") || "Sin Título";
                
                // Solo mostramos si está en la lista de permitidos (inicialmente 1, 2, 3)
                if (capitulosVisibles.includes(idXml.toString())) {
                    cSel.add(new Option(tituloBoton, idXml));
                }
            });
            if (idForzado) cSel.value = idForzado;
        }

        function cambioDeCapitulo() {
            const cId = document.getElementById("chapterFilter").value;
            const oSel = document.getElementById("oficialFilter");
            const ofiPrevio = oSel.value;
            
            const caps = libroActivo.getElementsByTagName("capitulo").length > 0 ? 
                         libroActivo.getElementsByTagName("capitulo") : 
                         libroActivo.getElementsByTagName("chapter");
            
            const chapter = Array.from(caps).find(c => c.getAttribute("id") == cId);
            const oficialesSet = new Set();
            
            if (chapter) {
                const versos = chapter.getElementsByTagName("versiculo").length > 0 ? 
                               chapter.getElementsByTagName("versiculo") : 
                               chapter.getElementsByTagName("verse");

                Array.from(versos).forEach(v => { 
                    const ofi = v.getAttribute("oficial");
                    if (ofi) oficialesSet.add(ofi.trim()); 
                });
            }

            oSel.innerHTML = '<option value="">---</option>';
            Array.from(glosarioDoc.getElementsByTagName("item")).forEach(item => {
                const sigla = item.getAttribute("sigla");
                if (oficialesSet.has(sigla)) oSel.add(new Option(sigla + "∴", sigla));
            });
            
            if (oficialesSet.has(ofiPrevio)) oSel.value = ofiPrevio;
            renderizarLiturgia();
        }

        function renderizarLiturgia() {
            const cId = document.getElementById("chapterFilter").value;
            const oficialSel = document.getElementById("oficialFilter").value; 
            const contenedor = document.getElementById('rituales-content');
            
            const caps = libroActivo.getElementsByTagName("capitulo").length > 0 ? 
                         libroActivo.getElementsByTagName("capitulo") : 
                         libroActivo.getElementsByTagName("chapter");
            
            const chapter = Array.from(caps).find(c => c.getAttribute("id") == cId);
            if (!chapter) return;

            let html = "", verseCounter = 0, primeraID = null;
            
            const secciones = chapter.getElementsByTagName("seccion").length > 0 ? 
                              chapter.getElementsByTagName("seccion") : 
                              chapter.getElementsByTagName("section");

            Array.from(secciones).forEach(sec => {
                const tituloSec = sec.getAttribute("titulo") || sec.getAttribute("title") || "";
                html += `<div class="section-header">${tituloSec}</div>`;
                
                const versos = sec.getElementsByTagName("versiculo").length > 0 ? 
                               sec.getElementsByTagName("versiculo") : 
                               sec.getElementsByTagName("verse");

                Array.from(versos).forEach(v => {
                    verseCounter++;
                    const officerName = (v.getAttribute("oficial") || "Ofi").trim(); 
                    const idV = `v-${cId}-${verseCounter}`;
                    let txt = v.getAttribute("dialogo") || v.getAttribute("texto") || "";
                    
                    // REGLA: LINK:LCC (Libro + Capitulo de 2 digitos)
                    txt = txt.replace(/\[\[LINK:(\d{3,5})(?::([^\]]+))?\]\]/g, (m, cod, desc) => {
                        let label = desc ? desc.trim() : "Ir ➜";
                        return `<span class="nav-link-container"><button class="btn-ritual" onclick="window.irA('${cod}')">${label}</button></span>`;
                    });

                    if (txt.includes("[[VOLVER]]")) {
                        txt = txt.replace("[[VOLVER]]", `<span class="nav-link-container"><button class="btn-ritual" onclick="window.irA('VOLVER')">⬅ Regresar</button></span>`);
                    }
                    
                    txt = txt.replace(/\[(.*?)\]/g, '<span class="line-exec">[$1]</span>');
                    txt = txt.replace(/(\b\S+∴)/gi, '<span class="sigla-texto-azul">$1</span>');
                    
                    const esOfi = (oficialSel && officerName === oficialSel);
                    if (esOfi && !primeraID) primeraID = idV;
                    
                    html += `<dt>${officerName}∴</dt><dd class="${esOfi ? 'resaltado' : ''}" id="${idV}">${txt}</dd>`;
                });
            });
            
            contenedor.innerHTML = `<dl style="counter-reset: line-counter;">${html}</dl>`;
            
            if (primeraID) { 
                const el = document.getElementById(primeraID); 
                if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
            }
        }

        window.irA = function(codigo) {
            if (codigo === 'VOLVER') {
                if (historialNavegacion.length > 0) {
                    const ant = historialNavegacion.pop();
                    numLibroActual = ant.libro;
                    capitulosVisibles = ant.visibilidad;
                    ejecutarCargaRitual(numLibroActual, ant.capitulo);
                    setTimeout(() => window.scrollTo(0, ant.scroll), 150);
                }
                return;
            }
            
            historialNavegacion.push({
                libro: numLibroActual,
                capitulo: document.getElementById("chapterFilter").value,
                scroll: window.scrollY,
                visibilidad: [...capitulosVisibles]
            });

            // Extraer Libro (1er digito) y Capitulo (siguientes)
            const g = codigo.charAt(0);
            const c = parseInt(codigo.substring(1, 3), 10).toString();
            
            numLibroActual = g;
            
            // Al navegar vía LINK, permitimos ver ese capítulo específico aunque sea > 3
            if (!capitulosVisibles.includes(c)) {
                capitulosVisibles.push(c);
            }
            
            ejecutarCargaRitual(numLibroActual, c);
        };
    </script>
</body>
</html>
