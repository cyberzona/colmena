<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guía de Bolsillo Panini 2026</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 8px; color: #333; background-color: #f4f6f7; }
        h1 { text-align: center; font-size: 13px; margin: 5px 0 2px 0; text-transform: uppercase; color: #1a5276; letter-spacing: 0.5px; }
        .instrucciones { text-align: center; font-style: italic; margin-bottom: 8px; color: #666; font-size: 10px; }
        
        .grupo-title { background-color: #1a5276; color: white; padding: 4px 8px; font-size: 11px; font-weight: bold; margin-top: 8px; border-radius: 4px; text-transform: uppercase; sticky; top: 0; z-index: 10; }
        .pais-block { background: #fff; margin: 4px 0; padding: 6px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .pais-name { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .contador { font-size: 10px; color: #7f8c8d; font-weight: 600; background: #eaeded; padding: 1px 5px; border-radius: 10px; }
        
        /* Ajuste de cuadrícula táctil para dedos en móviles */
        .casillas { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .casilla { border: 1px solid #bdc3c7; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; background-color: #fff; border-radius: 4px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: background 0.1s; }
        .casilla.poseido { background-color: #27ae60 !important; color: white !important; border-color: #1e8449 !important; }
    </style>
</head>
<body>

    <h1>📋 GUÍA DE BOLSILLO – PANINI 2026</h1>
    <div class="instrucciones">Toca cada número para marcar tus stickers. Autoguardado activado.</div>

    <div id="guia-contenedor"></div>

    <script>
        // Distribución oficial exacta de tus 12 grupos[cite: 1]
        const estructuraGrupos = [
            {
                nombre: "Grupo A",
                paises: [
                    { sigla: "MEX", nombre: "México" }, { sigla: "RSA", nombre: "Sudáfrica" },
                    { sigla: "KOR", nombre: "Corea del Sur" }, { sigla: "CZE", nombre: "República Checa" }
                ]
            },
            {
                nombre: "Grupo B",
                paises: [
                    { sigla: "CAN", nombre: "Canadá" }, { sigla: "BIH", nombre: "Bosnia y Herzegovina" },
                    { sigla: "QAT", nombre: "Qatar" }, { sigla: "SUI", nombre: "Suiza" }
                ]
            },
            {
                nombre: "Grupo C",
                paises: [
                    { sigla: "BRA", nombre: "Brasil" }, { sigla: "MAR", nombre: "Marruecos" },
                    { sigla: "HAI", nombre: "Haití" }, { sigla: "SCO", nombre: "Escocia" }
                ]
            },
            {
                nombre: "Grupo D",
                paises: [
                    { sigla: "USA", nombre: "Estados Unidos" }, { sigla: "PAR", nombre: "Paraguay" },
                    { sigla: "AUS", nombre: "Australia" }, { sigla: "TUR", nombre: "Turquía" }
                ]
            },
            {
                nombre: "Grupo E",
                paises: [
                    { sigla: "GER", nombre: "Alemania" }, { sigla: "CUW", nombre: "Curazao" },
                    { sigla: "CIV", nombre: "Costa de Marfil" }, { sigla: "ECU", nombre: "Ecuador" }
                ]
            },
            {
                nombre: "Grupo F",
                paises: [
                    { sigla: "NED", nombre: "Países Bajos" }, { sigla: "JPN", nombre: "Japón" },
                    { sigla: "SWE", nombre: "Suecia" }, { sigla: "TUN", nombre: "Túnez" }
                ]
            },
            {
                nombre: "Grupo G",
                paises: [
                    { sigla: "BEL", nombre: "Bélgica" }, { sigla: "EGY", nombre: "Egipto" },
                    { sigla: "IRN", nombre: "Irán" }, { sigla: "NZL", nombre: "Nueva Zelanda" }
                ]
            },
            {
                nombre: "Grupo H",
                paises: [
                    { sigla: "ESP", nombre: "España" }, { sigla: "CPV", nombre: "Cabo Verde" },
                    { sigla: "KSA", nombre: "Arabia Saudita" }, { sigla: "URU", nombre: "Uruguay" }
                ]
            },
            {
                nombre: "Grupo I",
                paises: [
                    { sigla: "FRA", nombre: "Francia" }, { sigla: "SEN", nombre: "Senegal" },
                    { sigla: "IRQ", nombre: "Irak" }, { sigla: "NOR", nombre: "Noruega" }
                ]
            },
            {
                nombre: "Grupo J",
                paises: [
                    { sigla: "ARG", nombre: "Argentina" }, { sigla: "ALG", nombre: "Argelia" },
                    { sigla: "AUT", nombre: "Austria" }, { sigla: "JOR", nombre: "Jordania" }
                ]
            },
            {
                nombre: "Grupo K",
                paises: [
                    { sigla: "POR", nombre: "Portugal" }, { sigla: "COD", nombre: "RD Congo" },
                    { sigla: "UZB", nombre: "Uzbekistán" }, { sigla: "COL", nombre: "Colombia" }
                ]
            },
            {
                nombre: "Grupo L",
                paises: [
                    { sigla: "ENG", nombre: "Inglaterra" }, { sigla: "CRO", nombre: "Croacia" },
                    { sigla: "GHA", nombre: "Ghana" }, { sigla: "PAN", nombre: "Panamá" }
                ]
            }
        ];

        const contenedor = document.getElementById('guia-contenedor');

        estructuraGrupos.forEach(g => {
            const divGrupo = document.createElement('div');
            divGrupo.className = 'grupo-title';
            divGrupo.textContent = g.nombre;
            contenedor.appendChild(divGrupo);

            g.paises.forEach(p => {
                const divPais = document.createElement('div');
                divPais.className = 'pais-block';
                
                divPais.innerHTML = `
                    <div class="pais-name">
                        <span>${p.sigla} - ${p.nombre}</span>
                        <span class="contador" id="cont-${p.sigla}">0 / 20</span>
                    </div>
                    <div class="casillas" id="casillas-${p.sigla}"></div>
                `;
                contenedor.appendChild(divPais);

                const divCasillas = divPais.querySelector(`#casillas-${p.sigla}`);
                
                for (let i = 1; i <= 20; i++) {
                    const numStr = String(i).padStart(2, '0');
                    const idSticker = `panini-${p.sigla}-${numStr}`;
                    const casilla = document.createElement('div');
                    casilla.className = 'casilla';
                    casilla.textContent = numStr;

                    if (localStorage.getItem(idSticker) === 'true') {
                        casilla.classList.add('poseido');
                    }

                    // Evento táctil optimizado para móviles
                    casilla.addEventListener('click', function(e) {
                        this.classList.toggle('poseido');
                        if (this.classList.contains('poseido')) {
                            localStorage.setItem(idSticker, 'true');
                        } else {
                            localStorage.removeItem(idSticker);
                        }
                        actualizarContador(p.sigla);
                    });

                    divCasillas.appendChild(casilla);
                }
                actualizarContador(p.sigla);
            });
        });

        function actualizarContador(sigla) {
            const total = document.querySelectorAll(`#casillas-${sigla} .casilla`).length;
            const poseidos = document.querySelectorAll(`#casillas-${sigla} .casilla.poseido`).length;
            document.getElementById(`cont-${sigla}`).textContent = `${poseidos} / ${total}`;
        }
    </script>
</body>
</html>
